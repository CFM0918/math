<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>九下 1-2 二次函數最大最小值｜互動教學平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@700;900&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--board:#16281c;--board2:#101f16;--chalk:#f3efe2;--soft:rgba(243,239,226,0.72);
--yellow:#f2d979;--pink:#eda0a8;--blue:#98c9dc;--green:#a6d6a0;--purple:#c9aee0;--wood:#6b4a32;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{background:#0a130d;font-family:'Noto Sans TC',sans-serif;color:var(--chalk);overscroll-behavior:none;}
.topbar{position:sticky;top:0;z-index:60;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  padding:10px 16px;background:linear-gradient(180deg,#1b2f21,#132218);border-bottom:2px solid var(--wood);box-shadow:0 4px 18px rgba(0,0,0,0.5);}
.brand{font-family:'Noto Serif TC',serif;font-weight:900;font-size:clamp(15px,2.2vw,20px);color:var(--yellow);white-space:nowrap;}
.brand small{display:block;font-family:'Caveat',cursive;font-size:14px;color:var(--soft);font-weight:400;}
.spacer{flex:1;}
.btn{background:rgba(243,239,226,0.08);border:1.5px solid rgba(243,239,226,0.28);color:var(--chalk);
  border-radius:10px;padding:7px 13px;font-family:inherit;font-size:14px;cursor:pointer;white-space:nowrap;transition:.15s;}
.btn:hover{background:rgba(243,239,226,0.16);}
.tabs{display:flex;gap:6px;overflow-x:auto;padding:10px 16px 0;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{background:rgba(243,239,226,0.06);border:1.5px solid rgba(243,239,226,0.2);border-bottom:none;
  color:var(--soft);border-radius:10px 10px 0 0;padding:9px 15px;font-size:14px;cursor:pointer;white-space:nowrap;font-family:inherit;}
.tab.on{background:var(--board);border-color:var(--yellow);color:var(--yellow);font-weight:700;}
.tab .n{font-family:'Caveat',cursive;font-size:18px;margin-right:5px;}
.wrap{max-width:1180px;margin:0 auto;padding:0 16px 60px;}
.panel{display:none;}.panel.on{display:block;}
.card{background:radial-gradient(ellipse at 20% 10%,rgba(255,255,255,0.05),transparent 45%),
   linear-gradient(160deg,var(--board),var(--board2));
  border:1.5px solid rgba(242,217,121,0.16);border-radius:14px;padding:18px;margin-bottom:16px;
  box-shadow:0 8px 26px rgba(0,0,0,0.45);position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 38px,rgba(255,255,255,0.012) 38px,rgba(255,255,255,0.012) 39px);}
.card>*{position:relative;}
.card h3{font-family:'Noto Serif TC',serif;font-size:clamp(17px,2.4vw,21px);color:var(--yellow);
  margin-bottom:12px;padding-bottom:8px;border-bottom:2px dashed rgba(242,217,121,0.35);display:flex;align-items:center;gap:8px;}
.card h3 .ic{font-size:20px;}
.goals{display:flex;flex-wrap:wrap;gap:9px;}
.goal{display:flex;align-items:center;gap:9px;background:rgba(242,217,121,0.07);
  border:1.5px dashed rgba(242,217,121,0.4);border-radius:22px;padding:8px 15px 8px 8px;
  font-size:clamp(13.5px,1.8vw,15px);color:var(--yellow);line-height:1.5;}
.goal .bdg{width:24px;height:24px;border-radius:50%;background:var(--yellow);color:#16281c;
  font-weight:900;font-size:13px;display:flex;align-items:center;justify-content:center;flex:none;}
.deck{position:relative;background:rgba(0,0,0,0.22);border-radius:12px;padding:clamp(16px,3vw,30px);
  min-height:clamp(260px,42vh,380px);display:flex;flex-direction:column;justify-content:center;}
.sl{display:none;animation:fade .25s;}.sl.on{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.sl .eyebrow{font-family:'Caveat',cursive;font-size:20px;color:var(--yellow);margin-bottom:6px;}
.sl h4{font-family:'Noto Serif TC',serif;font-size:clamp(19px,3vw,27px);margin-bottom:12px;line-height:1.35;}
.sl p{font-size:clamp(15px,2vw,18px);line-height:1.8;margin-bottom:9px;}
.sl ul{list-style:none;}
.sl li{font-size:clamp(15px,2vw,18px);line-height:1.85;padding-left:26px;position:relative;margin-bottom:4px;}
.sl li::before{content:'✦';position:absolute;left:2px;color:var(--yellow);font-size:14px;top:3px;}
.nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:14px;}
.nav .pg{font-family:'Caveat',cursive;font-size:20px;color:var(--soft);min-width:64px;text-align:center;}
.dots{display:flex;gap:6px;justify-content:center;margin-top:10px;flex-wrap:wrap;}
.dot{width:9px;height:9px;border-radius:50%;background:rgba(243,239,226,0.25);cursor:pointer;border:none;padding:0;}
.dot.on{background:var(--yellow);transform:scale(1.3);}
.hl{color:var(--yellow);font-weight:700;}.hl-b{color:var(--blue);font-weight:700;}
.hl-r{color:var(--pink);font-weight:700;}.hl-g{color:var(--green);font-weight:700;}
.fm{font-family:'Noto Serif TC',serif;}
.box{background:rgba(152,201,220,0.1);border:1.5px solid rgba(152,201,220,0.32);border-radius:10px;
  padding:11px 15px;margin:9px 0;font-size:clamp(14px,1.9vw,17px);line-height:1.7;}
.box.y{background:rgba(242,217,121,0.1);border-color:rgba(242,217,121,0.36);}
.box.r{background:rgba(237,160,168,0.1);border-color:rgba(237,160,168,0.36);}
.box.g{background:rgba(166,214,160,0.1);border-color:rgba(166,214,160,0.32);}
.two{display:flex;gap:12px;flex-wrap:wrap;}.two>*{flex:1;min-width:220px;}
.teach{background:rgba(201,174,224,0.12);border:1.5px dashed rgba(201,174,224,0.5);
  border-radius:10px;padding:11px 15px;margin:9px 0;font-size:clamp(14px,1.8vw,15px);line-height:1.7;}
.teach b{color:var(--purple);}
.tbl{width:100%;border-collapse:collapse;margin:9px 0;font-size:clamp(13.5px,1.8vw,16px);}
.tbl th,.tbl td{border:1.5px solid rgba(243,239,226,0.24);padding:8px 11px;text-align:center;}
.tbl th{background:rgba(242,217,121,0.16);color:var(--yellow);font-weight:700;}
.cv-wrap{background:rgba(0,0,0,0.25);border-radius:12px;padding:10px;}
canvas.viz{width:100%;display:block;border-radius:8px;touch-action:none;}
.ctrl{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center;}
.readout{font-family:'Noto Serif TC',serif;font-size:clamp(14px,1.9vw,18px);color:var(--chalk);
  background:rgba(242,217,121,0.1);border:1px solid rgba(242,217,121,0.3);border-radius:8px;
  padding:7px 12px;flex:1;min-width:220px;}
.readout b{color:var(--yellow);}
.q{background:rgba(0,0,0,0.2);border:1px solid rgba(242,217,121,0.18);border-radius:10px;padding:13px 15px;margin:10px 0;}
.q .qt{font-size:clamp(15px,2vw,17px);margin-bottom:10px;line-height:1.7;}
.q .qt .qn{font-family:'Caveat',cursive;color:var(--yellow);font-size:20px;margin-right:6px;}
.opts{display:flex;flex-direction:column;gap:7px;}
.opt{text-align:left;background:rgba(243,239,226,0.06);border:1.5px solid rgba(243,239,226,0.22);
  color:var(--chalk);border-radius:9px;padding:9px 13px;font-family:inherit;font-size:15px;cursor:pointer;transition:.15s;line-height:1.5;}
.opt:hover:not(:disabled){background:rgba(243,239,226,0.13);}
.opt.right{background:rgba(166,214,160,0.24);border-color:var(--green);color:#fff;font-weight:700;}
.opt.wrong{background:rgba(237,160,168,0.22);border-color:var(--pink);}
.opt:disabled{cursor:default;}
.fb{display:none;margin-top:9px;padding:9px 13px;border-radius:8px;font-size:14.5px;line-height:1.65;}
.fb.on{display:block;}
.fb.ok{background:rgba(166,214,160,0.14);border-left:3px solid var(--green);}
.fb.no{background:rgba(237,160,168,0.14);border-left:3px solid var(--pink);}
.fill{display:inline-block;background:rgba(0,0,0,0.3);border:none;border-bottom:2px solid var(--yellow);
  color:var(--yellow);font-family:'Noto Serif TC',serif;font-size:17px;width:110px;text-align:center;padding:3px 5px;margin:0 4px;}
.fill:focus{outline:none;background:rgba(242,217,121,0.12);}
.exq{background:rgba(0,0,0,0.26);border:1.5px solid rgba(242,217,121,0.28);border-radius:11px;padding:13px 15px;margin:10px 0;position:relative;}
.exq::before{content:'';position:absolute;top:-8px;left:32px;width:54px;height:14px;background:rgba(242,217,121,0.4);border-radius:2px;transform:rotate(-3deg);}
.exq .exq-q{font-size:clamp(14.5px,1.9vw,17px);line-height:1.75;margin-bottom:11px;}
.exo{text-align:left;background:rgba(243,239,226,0.06);border:1.5px solid rgba(243,239,226,0.22);
  color:var(--chalk);border-radius:9px;padding:9px 13px;font-family:inherit;font-size:clamp(14px,1.8vw,15.5px);
  cursor:pointer;transition:.15s;line-height:1.55;width:100%;margin-bottom:6px;display:block;}
.exo:hover:not(:disabled){background:rgba(243,239,226,0.13);}
.exo.right{background:rgba(166,214,160,0.26);border-color:var(--green);color:#fff;font-weight:700;}
.exo.wrong{background:rgba(237,160,168,0.2);border-color:var(--pink);opacity:.75;}
.exo:disabled{cursor:default;}
@keyframes shake{10%,90%{transform:translateX(-2px);}30%,70%{transform:translateX(4px);}50%{transform:translateX(-4px);}}
.exo.shake{animation:shake .4s;}
.exsol{display:none;margin-top:10px;padding:11px 14px;border-radius:9px;
  background:rgba(166,214,160,0.13);border-left:3px solid var(--green);font-size:clamp(14px,1.8vw,15.5px);line-height:1.75;}
.exsol.on{display:block;animation:fade .3s;}
.exsol .st{color:var(--soft);margin:3px 0;}
.exsol .an{color:var(--green);font-weight:700;margin-top:6px;}
.exlock{display:flex;align-items:center;gap:7px;margin-top:9px;font-size:13.5px;color:rgba(243,239,226,0.45);}
.exlock.hide{display:none;}
.info{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:11px;}
.icard{background:rgba(0,0,0,0.22);border:1.5px solid rgba(242,217,121,0.22);border-radius:11px;padding:14px;text-align:center;}
.icard .big{font-family:'Noto Serif TC',serif;font-size:clamp(17px,2.6vw,23px);font-weight:900;margin:6px 0;}
.icard .cap{font-size:13.5px;color:var(--soft);line-height:1.6;}
.frow{display:flex;gap:12px;align-items:center;padding:9px 12px;border-bottom:1px dashed rgba(243,239,226,0.16);}
.frow:last-child{border-bottom:none;}
.flab{color:var(--blue);font-weight:700;min-width:150px;font-size:clamp(13.5px,1.8vw,15.5px);flex:none;}
.fval{color:var(--yellow);font-weight:700;font-family:'Noto Serif TC',serif;font-size:clamp(14px,1.9vw,17px);}
@media(max-width:560px){.frow{flex-direction:column;align-items:flex-start;gap:3px;}.flab{min-width:0;}}
.hud{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:12px;}
.hud .st{background:rgba(0,0,0,0.3);border:1.5px solid rgba(242,217,121,0.28);border-radius:9px;
  padding:7px 13px;font-size:14px;flex:1;min-width:88px;text-align:center;}
.hud .st b{display:block;font-family:'Noto Serif TC',serif;font-size:20px;color:var(--yellow);}
.tbar{height:8px;background:rgba(0,0,0,0.35);border-radius:5px;overflow:hidden;margin-bottom:12px;}
.tfill{height:100%;background:linear-gradient(90deg,var(--green),var(--yellow),var(--pink));width:100%;transition:width .1s linear;}
.gscreen{display:none;}.gscreen.on{display:block;}
.lvchips{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin:14px 0;}
.lvchip{background:rgba(152,201,220,0.12);border:1.5px solid rgba(152,201,220,0.35);border-radius:18px;
  padding:6px 13px;font-size:13.5px;color:var(--blue);}
.lvchip.done{background:rgba(166,214,160,0.2);border-color:var(--green);color:var(--green);}
.lvchip.now{background:rgba(242,217,121,0.22);border-color:var(--yellow);color:var(--yellow);font-weight:700;}
.gq{font-size:clamp(16px,2.2vw,20px);line-height:1.7;margin:14px 0;text-align:center;font-family:'Noto Serif TC',serif;}
.gopts{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
@media(max-width:560px){.gopts{grid-template-columns:1fr;}}
.gopt{background:rgba(243,239,226,0.07);border:1.5px solid rgba(243,239,226,0.25);color:var(--chalk);
  border-radius:10px;padding:12px;font-family:'Noto Serif TC',serif;font-size:17px;cursor:pointer;transition:.15s;min-height:48px;}
.gopt:hover:not(:disabled){background:rgba(243,239,226,0.15);}
.gopt.right{background:rgba(166,214,160,0.3);border-color:var(--green);font-weight:900;}
.gopt.wrong{background:rgba(237,160,168,0.25);border-color:var(--pink);}
.gfb{margin-top:11px;padding:10px 13px;border-radius:8px;font-size:14.5px;line-height:1.6;display:none;}
.gfb.on{display:block;}
.gfb.ok{background:rgba(166,214,160,0.15);border-left:3px solid var(--green);}
.gfb.no{background:rgba(237,160,168,0.15);border-left:3px solid var(--pink);}
.rank{font-size:54px;text-align:center;margin:10px 0;}
.hint{text-align:center;color:rgba(243,239,226,0.35);font-size:12.5px;padding:8px 0 0;}
@media (max-width:640px){.topbar{padding:8px 10px;gap:8px;}.wrap{padding:0 10px 70px;}.card{padding:13px;}}
</style></head><body>

<div class="topbar">
  <div class="brand">1-2　最大值與最小值<small>九下 · 第1章 二次函數</small></div>
  <div class="spacer"></div>
</div>

<div class="tabs" id="tabs">
  <button class="tab on" data-p="0"><span class="n">▽</span>頂點式最值</button>
  <button class="tab" data-p="1"><span class="n">ƒ</span>一般式</button>
  <button class="tab" data-p="2"><span class="n">◇</span>最佳化</button>
  <button class="tab" data-p="3"><span class="n">★</span>題型測驗</button>
  <button class="tab" data-p="4"><span class="n">🎮</span>闖關遊戲</button>
</div>

<div class="wrap">
  <div class="card" id="goalCard">
    <h3><span class="ic">🎯</span>本節學習目標</h3>
    <div class="goals" id="goals"></div>
  </div>
  <div id="wrap"></div>
</div>

<script>
const GOALS = [
  '頂點式 y=a(x−h)²+k：最值就是 k',
  'a>0 在 x=h 有最小值、a<0 有最大值',
  '一般式：x=−b/2a 代回或配方求最值',
  '最佳化：設變數→列二次式→求頂點',
  '應用要檢查變數的合理範圍',
];

const DATA = [
{ key:'minmax', viz:'minmax', vizTitle:'頂點式最值（4 題）',
  slides:[
    {eb:'核心 頂點式最值', h:'最值 = k', html:`
      <table class="tbl">
        <tr><td class="hl-b">a>0</td><td>x=h 有最小值 k</td></tr>
        <tr><td class="hl-b">a<0</td><td>x=h 有最大值 k</td></tr>
      </table>
      <div class="box r" style="text-align:center;">⚠️ 最值是 k（y 值），發生在 x=h。</div>
      <div class="box g">👉 用下方 Canvas：求最值。</div>`},
    {eb:'例題 ★☆☆', h:'最小值', html:`
      <div class="exq" data-a="2">
        <div class="exq-q"><span class="hl">Q</span>　y=(x−2)²+3 的最值？</div>
        <button class="exo" data-i="0">最大值3</button>
        <button class="exo" data-i="1">最小值2</button>
        <button class="exo" data-i="2">最小值3</button>
        <button class="exo" data-i="3">最大值2</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st">a>0 → 最小值 k=3</div>
          <div class="an">答：最小值 3</div>
        </div>
      </div>`},
    {eb:'例題 ★☆☆　最大值', h:'a<0', html:`
      <div class="exq" data-a="0">
        <div class="exq-q"><span class="hl">Q</span>　y=−(x−1)²+5 的最值？</div>
        <button class="exo" data-i="0">最大值5</button>
        <button class="exo" data-i="1">最小值5</button>
        <button class="exo" data-i="2">最大值1</button>
        <button class="exo" data-i="3">最小值1</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st">a<0 → 最大值 k=5</div>
          <div class="an">答：最大值 5</div>
        </div>
      </div>`}
  ],
  fa:[
    {q:'y=2(x−1)²−5 最值?', o:['最小值−5','最大值−5','最小值1','最大值1'], a:0, e:'a>0。'},
    {q:'y=−3x² 最值?', o:['最大值0','最小值0','最大值3','無'], a:0, e:'a<0。'},
    {q:'y=x²+2 最值?', o:['最小值2','最大值2','最小值0','無'], a:0, e:'a>0。'}
  ],
  info:[
    {big:'最值=k', cap:'頂點式', c:'var(--blue)'},
    {big:'a>0 最小', cap:'向上', c:'var(--green)'},
    {big:'a<0 最大', cap:'向下', c:'var(--pink)'}
  ]
},
{ key:'gen', viz:'gen', vizTitle:'一般式求最值（4 題）',
  slides:[
    {eb:'核心 一般式', h:'x = −b/2a', html:`
      <div class="box">頂點 x 座標 = −b/2a，代回求最值。</div>
      <div class="box">或配方成 y=a(x−h)²+k 直接讀 k。</div>
      <div class="box g">👉 用下方 Canvas：求最值。</div>`},
    {eb:'例題 ★★☆', h:'配方', html:`
      <div class="exq" data-a="1">
        <div class="exq-q"><span class="hl">Q</span>　y=x²−6x+11 的最小值？</div>
        <button class="exo" data-i="0">11</button>
        <button class="exo" data-i="1">2</button>
        <button class="exo" data-i="2">3</button>
        <button class="exo" data-i="3">−2</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st">(x−3)²+2 → 最小值 2</div>
          <div class="an">答：2</div>
        </div>
      </div>`},
    {eb:'例題 ★★★　公式', h:'x=−b/2a', html:`
      <div class="exq" data-a="2">
        <div class="exq-q"><span class="hl">Q</span>　y=−2x²+8x−3 的最大值？</div>
        <button class="exo" data-i="0">−3</button>
        <button class="exo" data-i="1">8</button>
        <button class="exo" data-i="2">5</button>
        <button class="exo" data-i="3">2</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st">x=−8/(−4)=2；y=−8+16−3=5</div>
          <div class="an">答：5</div>
        </div>
      </div>`}
  ],
  fa:[
    {q:'y=x²−10x 最小值?', o:['−25','25','−5','0'], a:0, e:'x=5。'},
    {q:'y=3x²−12x+7 最小值?', o:['−5','7','2','−3'], a:0, e:'x=2。'},
    {q:'頂點 x 座標=?', o:['−b/2a','b/2a','−b/a','b/a'], a:0, e:'公式。'}
  ],
  info:[
    {big:'x=−b/2a', cap:'頂點x', c:'var(--green)'},
    {big:'代回求y', cap:'最值', c:'var(--blue)'},
    {big:'或配方', cap:'頂點式', c:'var(--yellow)'}
  ]
},
{ key:'apply', viz:'apply', vizTitle:'最佳化應用（4 題）',
  slides:[

const cur = DATA.map(()=>0);
function showSlide(si, i){
  const deck = document.querySelector(`[data-deck="${si}"]`);
  const sl = deck.querySelectorAll('.sl');
  i = Math.max(0, Math.min(sl.length-1, i));
  cur[si] = i;
  sl.forEach((s,k)=>s.classList.toggle('on', k===i));
  document.getElementById('pg-'+si).textContent = `${i+1} / ${sl.length}`;
  document.querySelectorAll(`#dots-${si} .dot`).forEach((d,k)=>d.classList.toggle('on', k===i));
}
document.addEventListener('click', e=>{
  const n = e.target.closest('[data-nav]');
  if(n){ const si=+n.dataset.s; showSlide(si, cur[si] + (n.dataset.nav==='next'?1:-1)); return; }
  const d = e.target.closest('.dot');
  if(d){ showSlide(+d.dataset.s, +d.dataset.i); return; }
});
document.addEventListener('keydown', e=>{
  const p = document.querySelector('.panel.on'); if(!p) return;
  const si = +p.dataset.p; if(si>=DATA.length) return;
  if(e.key==='ArrowRight') showSlide(si, cur[si]+1);
  if(e.key==='ArrowLeft') showSlide(si, cur[si]-1);

document.addEventListener('click', e=>{

    const box = o.closest('.exq');
    const ans = +box.dataset.a, pick = +o.dataset.i;
    if(pick === ans){
      box.querySelectorAll('.exo').forEach(b=>{ b.disabled=true; if(+b.dataset.i===ans) b.classList.add('right'); });

document.getElementById('gradeBtn').addEventListener('click', ()=>{
  let right=0;
  QUIZ.forEach((q,i)=>{
    const fb = document.getElementById('qfb-'+i);
    let ok=false, picked=null;
    if(q.type==='fill'){
      const inp = document.querySelector(`.fill[data-quiz="${i}"]`);
      const v = (inp.value||'').trim().replace(/−/g,'-').replace(/\s/g,'');
      ok = q.a.some(a=>a.replace(/−/g,'-').replace(/\s/g,'')===v);
      inp.style.borderBottomColor = ok?'var(--green)':'var(--pink)';
    } else {
      const sel = document.querySelector(`.opt[data-quiz="${i}"][data-sel="1"]`);
      if(sel){ picked=+sel.dataset.oi; ok = (q.type==='tf') ? (picked===1)===q.a : picked===q.a; }
      document.querySelectorAll(`.opt[data-quiz="${i}"]`).forEach(b=>{
        b.classList.remove('right','wrong');
        const bi=+b.dataset.oi;
        const isAns = (q.type==='tf') ? ((bi===1)===q.a) : (bi===q.a);
        if(isAns) b.classList.add('right'); else if(picked===bi) b.classList.add('wrong');
      });
    }
    if(ok) right++;
    fb.className='fb on '+(ok?'ok':'no');
    fb.innerHTML = (ok?'✅ <b>正確</b> ':'❌ <b>錯誤</b> ') + q.e;
  });
  const s = document.getElementById('score');
  const pct = Math.round(right/QUIZ.length*100);
  s.style.display='block';
  s.innerHTML = `成績：<b>${right} / ${QUIZ.length}</b>　（${pct} 分）　${pct>=80?'🏆 很棒！':pct>=60?'💪 再加油':'📖 建議重看重點'}`;
});
document.getElementById('resetQuiz').addEventListener('click', ()=>{
  document.querySelectorAll('.opt[data-quiz]').forEach(b=>{b.classList.remove('right','wrong'); delete b.dataset.sel;});
  document.querySelectorAll('.fill').forEach(i=>{i.value=''; i.style.borderBottomColor='var(--yellow)';});
  document.querySelectorAll('[id^="qfb-"]').forEach(f=>f.className='fb');
  document.getElementById('score').style.display='none';
});

/* ===== 闖關遊戲 ===== */
const G = {lv:0, score:0, streak:0, best:0, t:20, timer:null, cur:null, answered:false};
function gShow(id){ ['gStart','gPlay','gEnd'].forEach(x=>document.getElementById(x).classList.toggle('on', x===id)); }
function gChips(){
  document.getElementById('gChips').innerHTML = GAME.map((g,i)=>
    `<div class="lvchip ${i<G.lv?'done':i===G.lv?'now':''}">${i+1}. ${g.name}</div>`).join('');
}
function gLoad(){
  if(G.lv>=GAME.length){ gFinish(); return; }
  G.answered=false; G.t=20;
  const bank = GAME[G.lv].qs;
  G.cur = bank[Math.floor(Math.random()*bank.length)];
  document.getElementById('hLv').textContent = (G.lv+1)+'/'+GAME.length;
  document.getElementById('hSc').textContent = G.score;
  document.getElementById('hStk').textContent = G.streak;
  document.getElementById('gQ').innerHTML = `<span style="color:var(--blue);font-size:15px;">第 ${G.lv+1} 關 · ${GAME[G.lv].name}</span><br>${G.cur.q}`;
  document.getElementById('gO').innerHTML = G.cur.o.map((o,i)=>
    `<button class="gopt" data-g="${i}">${'ABCD'[i]}. ${o}</button>`).join('');
  document.getElementById('gFb').className='gfb';
  document.getElementById('gNext').style.display='none';
  gChips();
  clearInterval(G.timer);
  G.timer = setInterval(()=>{
    G.t -= 0.1;
    document.getElementById('hT').textContent = Math.max(0,G.t).toFixed(0);
    document.getElementById('tFill').style.width = Math.max(0,G.t/20*100)+'%';
    if(G.t<=0){ clearInterval(G.timer); gAnswer(-1); }
  },100);
}
function gAnswer(pick){
  if(G.answered) return;
  G.answered = true; clearInterval(G.timer);
  const ans = G.cur.a, ok = pick===ans;
  document.querySelectorAll('.gopt').forEach((b,i)=>{
    b.disabled=true;
    if(i===ans) b.classList.add('right'); else if(i===pick) b.classList.add('wrong');
  });
  let gain=0, sb=0, tb=0;
  if(ok){
    G.streak++; G.best=Math.max(G.best,G.streak);
    sb = Math.min(5, G.streak-1); tb = Math.min(5, Math.floor(G.t/4));
    gain = 10+sb+tb; G.score += gain;
  } else { G.streak = 0; }
  document.getElementById('hSc').textContent = G.score;
  document.getElementById('hStk').textContent = G.streak;
  const fb = document.getElementById('gFb');
  fb.className = 'gfb on '+(ok?'ok':'no');
  fb.innerHTML = (ok? `✅ <b>答對！+${gain} 分</b>（基礎10 + 連擊${sb} + 速度${tb}）<br>`
                    : (pick===-1?'⏰ <b>時間到！</b><br>':'❌ <b>答錯了</b><br>')) + G.cur.e;
  document.getElementById('gNext').style.display='inline-block';
  document.getElementById('gNext').textContent = (G.lv>=GAME.length-1)?'看成績 🏁':'下一關 ▶';
}
function gFinish(){
  clearInterval(G.timer);
  const max = GAME.length*20, pct = Math.round(G.score/max*100);
  const rank = pct>=85?['🏆','數論大師']:pct>=70?['🥇','高手']:pct>=50?['🥈','不錯']:['📖','再加油'];
  document.getElementById('gRank').textContent = rank[0];
  document.getElementById('gFinal').innerHTML = `<b class="hl">${G.score}</b> / ${max} 分　·　${rank[1]}`;
  document.getElementById('gStats').innerHTML = `最高連擊 <b class="hl">${G.best}</b>　·　完成 ${GAME.length} 關`;
  gShow('gEnd');
}
document.getElementById('gGo').addEventListener('click', ()=>{ G.lv=0;G.score=0;G.streak=0;G.best=0; gShow('gPlay'); gLoad(); });
document.getElementById('gAgain').addEventListener('click', ()=>{ G.lv=0;G.score=0;G.streak=0;G.best=0; gShow('gPlay'); gLoad(); });
document.getElementById('gNext').addEventListener('click', ()=>{ G.lv++; gLoad(); });
document.addEventListener('click', e=>{ const b=e.target.closest('.gopt'); if(!b||b.disabled) return; gAnswer(+b.dataset.g); });

/* ===== Canvas ===== */
const VIZ = {}; let DPR=1;

/* ① 頂點式最值 */
const MINMAX=[
  {q:'y=(x−2)²+3 最值', r:'最小值3', why:'a>0'},
  {q:'y=−(x−1)²+5 最值', r:'最大值5', why:'a<0'},
  {q:'y=2(x−1)²−5 最值', r:'最小值−5', why:'a>0'},
  {q:'y=−3x² 最值', r:'最大值0', why:'a<0'},
];
/* ② 一般式求最值 */
const GEN=[
  {q:'y=x²−6x+11 最小值', r:'2', why:'(x−3)²+2'},
  {q:'y=−2x²+8x−3 最大值', r:'5', why:'x=2'},
  {q:'y=x²−10x 最小值', r:'−25', why:'x=5'},
  {q:'y=3x²−12x+7 最小值', r:'−5', why:'x=2'},
];
/* ③ 最佳化應用 */
const APPLY=[
  {q:'長20圍矩形 最大面積', r:'25', why:'邊5正方形'},
  {q:'籬笆24靠牆 最大面積', r:'72', why:'寬6長12'},
  {q:'h=−5t²+20t 最高', r:'20m', why:'t=2'},
  {q:'兩數和12 乘積最大', r:'36', why:'各6'},
];

function initViz(cv){
  const si=+cv.dataset.si, kind=cv.dataset.viz;
  const ctx=cv.getContext('2d');
  const st=VIZ[si]={kind,cv,ctx};
  const ctrl=document.querySelector(`[data-ctrl="${si}"]`);
  const revLabel = kind==='minmax' ? '🔍 求最值' : kind==='gen' ? '🔍 求最值' : '🔍 求最佳';
  st.i=0; st.show=false;
  ctrl.innerHTML=`<div class="readout" id="ro-${si}"></div>
    <button class="btn" data-t="rev" data-si="${si}" style="background:rgba(242,217,121,.2);border-color:var(--yellow);color:var(--yellow);font-weight:700;">${revLabel}</button>
    <button class="btn" data-t="next" data-si="${si}">下一題 ▶</button>`;
  draw(si);
}

function drawCard(st, ctx, w, h, ro, E, title, col){
  ctx.textAlign='center';
  ctx.fillStyle='rgba(242,217,121,.85)'; ctx.font='bold 13px "Noto Sans TC"';
  ctx.fillText(title, w/2, 18);
  ctx.fillStyle='#f3efe2'; ctx.font='15px "Noto Serif TC"';
  ctx.fillText(E.q, w/2, 54);
  if(!st.show){
    ctx.fillStyle='rgba(243,239,226,.4)'; ctx.font='13px "Noto Sans TC"';
    ctx.fillText('🔒 先自己算算看', w/2, 98);
  } else {
    ctx.fillStyle=col; ctx.font='bold 22px "Noto Serif TC"';
    ctx.fillText(E.r, w/2, 96);
    ctx.fillStyle='rgba(243,239,226,.72)'; ctx.font='12px "Noto Sans TC"';
    ctx.fillText(E.why, w/2, 122);
  }
  ro.innerHTML = st.show ? `${E.q} → <b style="color:${col}">${E.r}</b>（${E.why}）`
    : `${E.q}　<span style="color:rgba(243,239,226,.5)">—— 求解</span>`;
}
function drawMinmax(st,c,w,h,ro){ drawCard(st,c,w,h,ro,MINMAX[st.i],'頂點式最值','#98c9dc'); }
function drawGen(st,c,w,h,ro){ drawCard(st,c,w,h,ro,GEN[st.i],'一般式求最值','#a6d6a0'); }
function drawApply(st,c,w,h,ro){ drawCard(st,c,w,h,ro,APPLY[st.i],'最佳化應用','#f2d979'); }

function draw(si){
  const st=VIZ[si]; if(!st) return;
  const {cv,ctx,kind}=st, w=cv.width/DPR, h=cv.height/DPR;
  ctx.clearRect(0,0,w,h);
  const ro=document.getElementById('ro-'+si);
  if(kind==='minmax') drawMinmax(st,ctx,w,h,ro);
  else if(kind==='gen') drawGen(st,ctx,w,h,ro);
  else if(kind==='apply') drawApply(st,ctx,w,h,ro);
}

document.addEventListener('click', e=>{
  const btn=e.target.closest('[data-t]'); if(!btn) return;
  const si=+btn.dataset.si, st=VIZ[si]; if(!st) return;
  const t=btn.dataset.t;
  const arr = st.kind==='minmax'?MINMAX : st.kind==='gen'?GEN : APPLY;
  if(t==='rev') st.show=true;
  if(t==='next'){ st.i=(st.i+1)%arr.length; st.show=false; }
  draw(si);
});

function resizeAll(){
  DPR = Math.min(2, window.devicePixelRatio||1);
  document.querySelectorAll('canvas.viz').forEach(cv=>{
    const w = cv.clientWidth || cv.parentElement.clientWidth;
    const h = (cv.dataset.viz==='gen') ? 176 : (cv.dataset.viz==='apply' ? 176 : 176);
    cv.width=w*DPR; cv.height=h*DPR; cv.style.height=h+'px';
    cv.getContext('2d').setTransform(DPR,0,0,DPR,0,0);
  });
  Object.keys(VIZ).forEach(k=>draw(+k));
}
document.querySelectorAll('canvas.viz').forEach(initViz);
window.addEventListener('resize', resizeAll);
resizeAll();
</script>
<div class="hint">← → 鍵可翻頁　·　Canvas 用按鈕互動　·　支援平板觸控</div>
