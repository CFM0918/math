<script>
const GOALS = [
  '理解「有幾個未知數，就要幾條方程式」',

  '能檢查合理性（重量、年齡不能為負）',

const DATA = [
{ key:'pair', viz:'pair', vizTitle:'兩條方程式偵測器 —— 先自己想「哪兩件事不變？」，想好再揭曉（7 題）',
  slides:[
    {eb:'🔑 本節唯一的新規則', h:'有幾個未知數，就要幾條方程式', html:`
      <table class="tbl">

        <tr><td>需要的方程式</td><td class="hl-b" style="font-size:18px;"><b>1 條</b></td><td class="hl-g" style="font-size:18px;"><b>2 條</b></td></tr>
        <tr><td>追問句</td><td>「<b>什麼</b>不變？」</td><td class="hl">「<b>哪兩件事</b>不變？」</td></tr>
      </table>
      <div class="box y" style="text-align:center;">💡 <span class="hl">這就是本節唯一的升級。</span>七上你已經會找<b>一個</b>不變量了 —— 現在只是要找<b>兩個</b>。</div>`},
    {eb:'觀念', h:'為什麼一條不夠？（1-1 已經說了）', html:`
      <div class="box r"><b class="hl-r">只有一條</b>　<span class="fm" style="font-size:18px;">x + y = 20</span><br>
        解有<span class="hl-r">無限多組</span>：<span class="fm">(1,19)、(2,18)、(12,8)…</span> 根本鎖不定</div>
      <div class="box g"><b class="hl-g">再給一條</b>　<span class="fm" style="font-size:18px;">15x + 25y = 380</span><br>

      <div class="box y"><b>⚠️「獨立」很重要：</b><span class="fm">x+y=20</span> 和 <span class="fm">2x+2y=40</span> <span class="hl-r">不算兩條</span> ——

    {eb:'流程', h:'解題五步驟', html:`
      <div class="box y" style="text-align:center;font-size:15px;padding:12px;">

        <tr><th style="width:9%;">　</th><th style="width:28%;">動作</th><th>關鍵</th></tr>

        <tr><td class="hl-b"><b>投資利息</b></td><td><b>總本金</b></td><td><b>總利息</b></td></tr>
      </table>
      <div class="box y" style="text-align:center;">💡 <b>看出規律了嗎？</b>第 1 條幾乎都是「<span class="hl">總數量</span>」，第 2 條幾乎都是「<span class="hl">總價值</span>」</div>`},
    {eb:'例題 1 ★☆☆', h:'和差問題', html:`
      <div class="exq" data-a="2">
        <div class="exq-q"><span class="hl">Q</span>　兩個數的和是 50，差是 12。較大的數是？</div>
        <button class="exo" data-i="0">19</button>
        <button class="exo" data-i="1">25</button>
        <button class="exo" data-i="2">31</button>
        <button class="exo" data-i="3">38</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st">設較大 x、較小 y</div>
          <div class="st fm">x + y = 50（和）　；　x − y = 12（差）</div>
          <div class="st">y 的係數是 +1 與 −1（互為相反）→ <b>加減消去法（相加）</b></div>
          <div class="st fm">兩式相加：2x = 62 → x = 31；y = 50 − 31 = 19</div>
          <div class="st fm">驗算：31 + 19 = 50 ✓；31 − 19 = 12 ✓　<b>（兩條都要驗！）</b></div>
          <div class="st">(A) 19 是<b>較小</b>的數 —— 題目問的是<b>較大</b>的！</div>
          <div class="an">答：較大的數是 31（較小的是 19）</div>
        </div>
      </div>`},
    {eb:'例題 2 ★★☆', h:'年齡問題（和七上同一個坑）', html:`
      <div class="exq" data-a="1">
        <div class="exq-q"><span class="hl">Q</span>　父親是兒子的 4 倍；<b>5 年後</b>父親是兒子的 3 倍多 5 歲。設兒子 x 歲、父親 y 歲，第二條方程式是？</div>
        <button class="exo" data-i="0">y + 5 = 3x + 5</button>
        <button class="exo" data-i="1">y + 5 = 3(x + 5) + 5</button>
        <button class="exo" data-i="2">y = 3(x + 5) + 5</button>
        <button class="exo" data-i="3">y + 5 = 3x</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st">5 年後：父親 <b>y + 5</b>、兒子 <b>x + 5</b>　—— <span class="hl-r">兩人都要加 5！</span></div>
          <div class="st fm">條件：父親 = 兒子的 3 倍多 5 → y + 5 = 3(x+5) + 5</div>
          <div class="st fm">配上第一條 y = 4x（代入）：4x + 5 = 3x + 20 → x = 15；y = 60</div>
          <div class="st fm">驗算：5 年後父 65、子 20；3×20 + 5 = 65 ✓</div>
          <div class="st">(A) 的錯誤：<span class="hl-r">只給父親加了 5，忘記兒子也會長大</span>。<br>
            這和七上 3-2 年齡題是<b>同一個坑</b> —— <b>時間對兩個人是公平的</b>。</div>
          <div class="an">答：y + 5 = 3(x + 5) + 5</div>
        </div>
      </div>`},
    {eb:'觀念', h:'回頭看「雞兔同籠」：為什麼七上那麼難？', html:`
      <div class="box r"><b class="hl-r">七上（只能設一個 x）</b><br>
        「雞兔共 20 隻，腳共 56 隻」→ 設雞 x 隻，兔就是 <span class="fm">(20 − x)</span> 隻<br>
        <span class="fm">2x + 4(20 − x) = 56</span><br>
        <span style="font-size:13px;color:var(--soft)">要先在腦中把「兔 = 20 − x」轉一次 —— 這一步就卡住很多人</span></div>
      <div class="box g"><b class="hl-g">七下（設兩個）</b><br>
        設雞 <span class="fm">x</span> 隻、兔 <span class="fm">y</span> 隻<br>
        <span class="fm">x + y = 20</span>（總隻數）　；　<span class="fm">2x + 4y = 56</span>（總腳數）<br>
        <span style="font-size:13px;color:var(--soft)">直接照著題目寫，<b>不用在腦中轉任何東西</b></span></div>
      <div class="box y" style="text-align:center;"><span class="hl">多設一個未知數，換來的是「不用動腦轉換」。</span><br>這就是聯立方程式存在的理由。</div>`}
  ],
  fa:[
    {q:'兩個未知數，最少需要幾條「獨立」的方程式才解得出來？', o:['1 條','2 條','3 條','不一定'], a:1, e:'有幾個未知數就要幾條獨立的方程式。'},
    {q:'<span class="fm">x+y=20</span> 和 <span class="fm">2x+2y=40</span> 算兩條獨立的方程式嗎？', o:['算','不算，第二條是第一條乘2','算，係數不同','不一定'], a:1, e:'第二條沒給任何新資訊 → 不獨立 → 會有無限多解。'},
    {q:'看到 <span class="fm">y = 4x</span> 這種形式，該用哪個方法？', o:['代入消去法','加減消去法','都不行','畫圖'], a:0, e:'已經解出 y 了，直接代入另一條最快。'}

    {big:'總數量 + 總價值', cap:'兩條的<br>共同結構', c:'var(--green)'}
  ]
},
{ key:'cross', viz:'cross', vizTitle:'兩條直線的交點 —— 你解的 (x, y) 其實是這個（2-2 的伏筆）',
  slides:[
    {eb:'題型 3 ⚠️ 本節新題型', h:'順逆風（順逆水）', html:`
      <div class="box y" style="text-align:center;font-size:20px;padding:16px;">

        <div class="box g"><b class="hl-g">順風</b>　輕鬆・快<br><span class="fm" style="font-size:18px;">x + y</span><br>

        <b>生活類比：</b>順風騎車<span class="hl-g">輕鬆快</span>、逆風<span class="hl-r">吃力慢</span> —— <span class="hl">想一下騎車的感覺就不會反了。</span></div>`},
    {eb:'例題 3 ★★★', h:'順逆風', html:`
      <div class="exq" data-a="2">
        <div class="exq-q"><span class="hl">Q</span>　順風 2 小時走 36km，逆風 3 小時走 36km。<b>風速</b>是多少？</div>
        <button class="exo" data-i="0">15 公里/時</button>
        <button class="exo" data-i="1">18 公里/時</button>
        <button class="exo" data-i="2">3 公里/時</button>
        <button class="exo" data-i="3">12 公里/時</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st">設靜風 x、風速 y</div>
          <div class="st fm">2(x + y) = 36（順風）　；　3(x − y) = 36（逆風）</div>
          <div class="st"><b>💡 先化簡！</b> <span class="fm">x + y = 18</span>；<span class="fm">x − y = 12</span>　← 數字小很多</div>
          <div class="st fm">相加：2x = 30 → x = 15；y = 18 − 15 = 3</div>
          <div class="st fm">驗算：順風 (15+3)×2 = 36 ✓；逆風 (15−3)×3 = 36 ✓</div>
          <div class="st">(A) 15 是<b>靜風速度</b>，不是風速 —— 題目問哪一個要看清楚！</div>
          <div class="st">💡 <b>關鍵動作</b>：先把 2(x+y)=36 除掉係數變 x+y=18 再消去。<b>化簡完再解，永遠比硬幹快。</b></div>
          <div class="an">答：風速 3 公里/時（靜風 15 公里/時）</div>
        </div>
      </div>`},
    {eb:'例題 4 ★★☆', h:'採購分配（雞兔同籠型）', html:`
      <div class="exq" data-a="1">
        <div class="exq-q"><span class="hl">Q</span>　練習簿每本 15 元、彩色筆每支 25 元，共買 20 件、花了 380 元。彩色筆買幾支？</div>
        <button class="exo" data-i="0">12 支</button>
        <button class="exo" data-i="1">8 支</button>
        <button class="exo" data-i="2">10 支</button>
        <button class="exo" data-i="3">15 支</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st">設練習簿 x 本、彩色筆 y 支</div>
          <div class="st fm">x + y = 20（<b>總件數</b>）　；　15x + 25y = 380（<b>總金額</b>）</div>
          <div class="st fm">代入：x = 20 − y → 15(20 − y) + 25y = 380 → 300 + 10y = 380 → y = 8；x = 12</div>
          <div class="st fm">驗算：15×12 + 25×8 = 180 + 200 = 380 ✓</div>
          <div class="st">⑤ 檢查：12 本、8 支都是<b>正整數</b> ✓</div>
          <div class="st">(A) 12 是<b>練習簿</b>的本數 —— 題目問彩色筆！</div>
          <div class="an">答：彩色筆 8 支（練習簿 12 本）</div>
        </div>
      </div>`},
    {eb:'💡 2-2 的伏筆', h:'你解的 (x, y)，其實是平面上的一個點', html:`
      <div class="box">例題 4 解出「練習簿 <span class="hl">12</span> 本、彩色筆 <span class="hl">8</span> 支」——<br>
        在坐標平面上，就是<span class="hl">一個點 (12, 8)</span>。</div>
      <div class="box g" style="text-align:center;font-size:18px;">
        而下一章會讓你看到：<br>
        <span class="hl">那兩條方程式，是兩條直線；</span><br>
        <span class="hl">你解的答案，是它們的交點。</span></div>
      <div class="box y">👉 用下方的 <b>Canvas</b> 按「換一題」，親眼看三種題型的兩條直線，

  ],

    {q:'<span class="fm">2(x+y)=36</span> 該先做什麼？', o:['直接代入','先化簡成 x+y=18','先平方','先移項'], a:1, e:'先除掉係數變 x+y=18，數字小很多，比較不會算錯。'}

},
{ key:'mix', viz:'mix', vizTitle:'濃度混合槓桿 —— 調配比，看混合濃度怎麼在 10% 與 30% 之間滑動',
  slides:[

      <div class="two">

    {eb:'例題 5 ★★★', h:'濃度混合', html:`
      <div class="exq" data-a="0">
        <div class="exq-q"><span class="hl">Q</span>　30% 與 10% 的溶液混成 <b>18%</b>、共 500 公斤。30% 的溶液要幾公斤？</div>
        <button class="exo" data-i="0">200 公斤</button>
        <button class="exo" data-i="1">300 公斤</button>
        <button class="exo" data-i="2">250 公斤</button>
        <button class="exo" data-i="3">180 公斤</button>

        <div class="exsol">
          <div class="st">設 30% 溶液 x 公斤、10% 溶液 y 公斤</div>
          <div class="st fm">x + y = 500（總重量）　；　0.3x + 0.1y = 500×0.18 = 90（橡膠總重量）</div>
          <div class="st fm">代入：y = 500 − x → 0.3x + 50 − 0.1x = 90 → 0.2x = 40 → x = 200；y = 300</div>
          <div class="st fm">驗算：0.3×200 + 0.1×300 = 60 + 30 = 90 ✓</div>
          <div class="st"><b>估算檢查</b>：18% 比中間值 20% <b>偏低</b> → <b>10% 的溶液要比較多</b>（300 > 200）✓ 合理</div>
          <div class="st">(B) 300 是 <b>10%</b> 溶液的重量 —— 又是「問哪一個」的陷阱！</div>
          <div class="an">答：30% 溶液 200 公斤</div>
        </div>
      </div>`},
    {eb:'💡 技巧', h:'目標濃度在正中間 → 兩種等量', html:`
      <div class="two">
        <div class="box"><span class="fm" style="font-size:16px;">40% 與 10% → 混成 25%</span><br>
          <span class="hl-g">各 150 毫升（等量）</span><br><span style="font-size:13px;color:var(--soft)">25% 剛好是 40 和 10 的中間</span></div>
        <div class="box g"><span class="fm" style="font-size:16px;">50% 與 20% → 混成 35%</span><br>
          <span class="hl-g">各 300 公斤（等量）</span><br><span style="font-size:13px;color:var(--soft)">35% 剛好是 50 和 20 的中間</span></div>
      </div>
      <div class="box y" style="text-align:center;font-size:19px;"><span class="hl">目標濃度落在正中間 → 兩種等量混合</span></div>
      <div class="box g"><b>很好用的估算檢查：</b><br>

      <div class="teach"><b>先估再算，算完對照。</b>估算不會給你精確答案，但會在你算錯一位數的時候<b>大聲叫你</b>。</div>`},
    {eb:'素養 ★★★', h:'投資利息：全押 vs 分散', html:`
      <div class="box">10 萬元分兩部分：年利率 <span class="hl">5%</span> 定存、年利率 <span class="hl">8%</span> 基金。一年後共得利息 <span class="hl">6500 元</span>。</div>
      <div class="box g"><b>解</b>：<span class="fm">x + y = 100000</span>（總本金）；<span class="fm">0.05x + 0.08y = 6500</span>（總利息）<br>
        → <span class="fm">5000 + 0.03y = 6500 → y = 50000</span>；<span class="fm">x = 50000</span>　（各 5 萬）</div>
      <div class="exq" data-a="1">
        <div class="exq-q"><span class="hl">Q</span>　若<b>全部 10 萬</b>都投入 8% 的基金，比原本<b>多賺</b>多少？</div>
        <button class="exo" data-i="0">多賺 8000 元</button>
        <button class="exo" data-i="1">多賺 1500 元</button>
        <button class="exo" data-i="2">多賺 3000 元</button>
        <button class="exo" data-i="3">一樣多</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st fm">全押 8%：100000 × 0.08 = 8000 元</div>
          <div class="st fm">原本：6500 元　→　多賺 8000 − 6500 = <b>1500 元</b></div>
          <div class="st">(A) 8000 是<b>全押的總利息</b>，不是「多賺的」—— 題目問「多賺多少」！</div>
          <div class="st">💡 <b>全押高利率當然賺比較多</b> —— 但那也代表<b>風險全押在一邊</b>。<br>
            <b>數學算得出報酬，算不出風險。</b>分散投資的代價，就是這 1500 元。<br>
            要不要少賺 1500 換安心 —— 那是<b>人</b>要決定的事，不是數學。</div>
          <div class="an">答：多賺 1500 元</div>
        </div>
      </div>`},
    {eb:'總覽', h:'六大題型，一個結構', html:`
      <table class="tbl">
        <tr><th style="width:22%;">題型</th><th style="width:30%;">第 1 條（總數量）</th><th>第 2 條（總價值）</th></tr>

    {eb:'第 ⑤ 步', h:'檢查合理性（別跳過）', html:`

function gAnswer(pick){
  if(G.answered) return;
  G.answered = true; clearInterval(G.timer);
  const ans = G.cur.a, ok = pick===ans;
  document.querySelectorAll('.gopt').forEach((b,i)=>{
    b.disabled=true;
    if(i===ans) b.classList.add('right'); else if(i===pick) b.classList.add('wrong');
  });
  let gain=0, sb=0, tb=0;
  if(ok){
    G.streak++; G.best=Math.max(G.best,G.streak);
    sb = Math.min(5, G.streak-1); tb = Math.min(5, Math.floor(G.t/4));
    gain = 10+sb+tb; G.score += gain;
  } else { G.streak = 0; }
  document.getElementById('hSc').textContent = G.score;
  document.getElementById('hStk').textContent = G.streak;
  const fb = document.getElementById('gFb');
  fb.className = 'gfb on '+(ok?'ok':'no');

                    : (pick===-1?'⏰ <b>時間到！</b><br>':'❌ <b>答錯了</b><br>')) + G.cur.e;
  document.getElementById('gNext').style.display='inline-block';
  document.getElementById('gNext').textContent = (G.lv>=GAME.length-1)?'看成績 🏁':'下一關 ▶';
}
function gFinish(){
  clearInterval(G.timer);
  const max = GAME.length*20, pct = Math.round(G.score/max*100);
  const rank = pct>=85?['🏆','數論大師']:pct>=70?['🥇','高手']:pct>=50?['🥈','不錯']:['📖','再加油'];
  document.getElementById('gRank').textContent = rank[0];

  document.getElementById('gStats').innerHTML = `最高連擊 <b class="hl">${G.best}</b>　·　完成 ${GAME.length} 關`;
  gShow('gEnd');
}

function wrapText(ctx, txt, cx, y, maxw, lh){
  let line='', ly=y;
  for(const ch of txt){
    if(ctx.measureText(line+ch).width>maxw){ ctx.fillText(line, cx, ly); line=ch; ly+=lh; }
    else line+=ch;
  }
  ctx.fillText(line, cx, ly);
  return ly;
}

/* ② 兩條直線的交點（2-2 伏筆） */
const XL=[
  {k:'採購分配', a1:1,b1:1,c1:20, a2:15,b2:25,c2:380, sx:12, sy:8,
   l1:'x + y = 20', l2:'15x + 25y = 380', nx:'練習簿(本)', ny:'彩色筆(支)'},
  {k:'雞兔同籠', a1:1,b1:1,c1:20, a2:2,b2:4,c2:56, sx:12, sy:8,
   l1:'x + y = 20', l2:'2x + 4y = 56', nx:'雞(隻)', ny:'兔(隻)'},
  {k:'和差', a1:1,b1:1,c1:50, a2:1,b2:-1,c2:12, sx:31, sy:19,
   l1:'x + y = 50', l2:'x − y = 12', nx:'較大數', ny:'較小數'},
];
function drawCross(st, ctx, w, h, ro){
  const E=XL[st.pi];
  const M=Math.max(E.sx,E.sy)*1.9;
  const pad=32, L=pad+14, R=w-14, B=h-24, T=14;
  const X=v=>L+(v/M)*(R-L), Y=v=>B-(v/M)*(B-T);
  ctx.textAlign='center';
  ctx.fillStyle='rgba(242,217,121,.85)'; ctx.font='bold 12px "Noto Sans TC"';
  ctx.fillText(`【${E.k}】兩條方程式 ＝ 兩條直線　·　解 ＝ 交點`, w/2, 11);
  // 軸
  ctx.strokeStyle='rgba(243,239,226,.5)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(L,B); ctx.lineTo(R,B); ctx.moveTo(L,B); ctx.lineTo(L,T); ctx.stroke();
  ctx.fillStyle='rgba(243,239,226,.5)'; ctx.font='10px "Noto Sans TC"';
  ctx.textAlign='right'; ctx.fillText(E.nx, R, B+15);
  ctx.textAlign='left'; ctx.fillText(E.ny, L-4, T+2);
  ctx.textAlign='center';
  // 畫直線 a x + b y = c  → y = (c - a x)/b
  const line=(a,b,c,col,lab)=>{
    const pts=[];
    for(let i=0;i<=200;i++){
      const x=M*i/200, y=(c-a*x)/b;
      if(y>=0 && y<=M) pts.push([x,y]);
    }
    if(!pts.length) return;
    ctx.strokeStyle=col; ctx.lineWidth=2.2;
    ctx.beginPath(); ctx.moveTo(X(pts[0][0]),Y(pts[0][1]));
    pts.forEach(p=>ctx.lineTo(X(p[0]),Y(p[1]))); ctx.stroke();
    const mid=pts[Math.floor(pts.length*0.72)];
    ctx.fillStyle=col; ctx.font='bold 12px "Noto Serif TC"';
    ctx.fillText(lab, X(mid[0]), Y(mid[1])-7);
  };
  line(E.a1,E.b1,E.c1,'#98c9dc',E.l1);
  line(E.a2,E.b2,E.c2,'#a6d6a0',E.l2);
  // 交點
  ctx.strokeStyle='rgba(242,217,121,.55)'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(X(E.sx),B); ctx.lineTo(X(E.sx),Y(E.sy)); ctx.lineTo(L,Y(E.sy)); ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.arc(X(E.sx),Y(E.sy),5.5,0,7); ctx.fillStyle='#f2d979'; ctx.fill();
  ctx.strokeStyle='#16281c'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.fillStyle='#f2d979'; ctx.font='bold 14px "Noto Serif TC"';
  ctx.fillText(`(${E.sx}, ${E.sy})`, X(E.sx)+34, Y(E.sy)-8);
  ctx.font='10px "Noto Serif TC"';
  ctx.fillText(String(E.sx), X(E.sx), B+13);
  ctx.textAlign='right'; ctx.fillText(String(E.sy), L-3, Y(E.sy)+3);
  ro.innerHTML = `【${E.k}】<b style="color:var(--blue)">${E.l1}</b> 和 <b style="color:var(--green)">${E.l2}</b> 在坐標平面上是<b>兩條直線</b>`
    + `　｜　你解出的 <b style="color:var(--yellow)">(${E.sx}, ${E.sy})</b> 就是它們的<b>交點</b>`
    + `　<span style="color:rgba(243,239,226,.5)">（這是 2-2 的伏筆）</span>`;
}

/* ③ 濃度混合槓桿 */
function drawMix(st, ctx, w, h, ro){
  const x=st.x, y=MIX.total-x;
  const pct=(MIX.a*x + MIX.b*y)/MIX.total;
  ctx.textAlign='center';
  ctx.fillStyle='rgba(242,217,121,.85)'; ctx.font='bold 13px "Noto Sans TC"';
  ctx.fillText('30% 與 10% 混合，總重固定 500 公斤', w/2, 15);
  // 濃度尺
  const L=52, R=w-52, Y=52;
  ctx.strokeStyle='rgba(243,239,226,.5)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(L,Y); ctx.lineTo(R,Y); ctx.stroke();
  const P=p=>L+((p-MIX.b)/(MIX.a-MIX.b))*(R-L);
  [[MIX.b,'10%','#98c9dc'],[MIX.a,'30%','#eda0a8']].forEach(([p,lab,col])=>{
    ctx.strokeStyle=col; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(P(p),Y-8); ctx.lineTo(P(p),Y+8); ctx.stroke();
    ctx.fillStyle=col; ctx.font='bold 13px "Noto Serif TC"';
    ctx.fillText(lab, P(p), Y-14);
  });
  // 中點
  ctx.strokeStyle='rgba(152,201,220,.45)'; ctx.lineWidth=1.5; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(P(0.20),Y-6); ctx.lineTo(P(0.20),Y+6); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle='rgba(152,201,220,.6)'; ctx.font='10px "Noto Sans TC"';
  ctx.fillText('中點20%', P(0.20), Y+22);
  // 目標
  ctx.strokeStyle='rgba(166,214,160,.6)'; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
  ctx.beginPath(); ctx.moveTo(P(0.18),Y-16); ctx.lineTo(P(0.18),Y+16); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle='#a6d6a0'; ctx.font='bold 10px "Noto Sans TC"';
  ctx.fillText('目標18%', P(0.18), Y+34);
  // 目前
  const px=P(pct);
  ctx.beginPath(); ctx.arc(px,Y,6,0,7); ctx.fillStyle='#f2d979'; ctx.fill();
  ctx.strokeStyle='#16281c'; ctx.lineWidth=1.5; ctx.stroke();
  ctx.fillStyle='#f2d979'; ctx.font='bold 15px "Noto Serif TC"';
  ctx.fillText(fmtN(Math.round(pct*10000)/100)+'%', px, Y-22);
  // 重量條
  const BY=h-42, BW=R-L;
  const wx=BW*x/MIX.total;
  ctx.fillStyle='rgba(237,160,168,.45)'; ctx.fillRect(L,BY,wx,20);
  ctx.fillStyle='rgba(152,201,220,.45)'; ctx.fillRect(L+wx,BY,BW-wx,20);
  ctx.strokeStyle='rgba(243,239,226,.5)'; ctx.lineWidth=1.2; ctx.strokeRect(L,BY,BW,20);
  ctx.fillStyle='#f3efe2'; ctx.font='bold 11px "Noto Sans TC"';
  if(wx>52) ctx.fillText(`30%：${fmtN(x)}kg`, L+wx/2, BY+14);
  if(BW-wx>52) ctx.fillText(`10%：${fmtN(y)}kg`, L+wx+(BW-wx)/2, BY+14);
  ctx.fillStyle='rgba(243,239,226,.55)'; ctx.font='11px "Noto Sans TC"';
  ctx.fillText(`溶質 = 0.3×${fmtN(x)} + 0.1×${fmtN(y)} = ${fmtN(MIX.a*x+MIX.b*y)} kg`, w/2, h-8);
  const hit=Math.abs(pct-0.18)<0.0005;
  ro.innerHTML = `30%：<b>${fmtN(x)}kg</b>　10%：<b>${fmtN(y)}kg</b>　→　混合濃度 <b>${fmtN(Math.round(pct*10000)/100)}%</b>`
    + (hit ? '　<span style="color:var(--green)">✓ 達到目標 18%！（x=200、y=300）</span>' : '')
    + (Math.abs(pct-0.20)<0.0005 ? '　<span style="color:var(--blue)">⚖️ 正中間 20% → 兩種剛好等量！</span>' : '')
    + `　｜　<span style="color:rgba(243,239,226,.55)">濃度越靠近哪一端，那一端的溶液就越多</span>`;
}

function draw(si){
  const st=VIZ[si]; if(!st) return;
  const {cv,ctx,kind}=st, w=cv.width/DPR, h=cv.height/DPR;
  ctx.clearRect(0,0,w,h);
  const ro=document.getElementById('ro-'+si);
  if(kind==='pair') drawPair(st,ctx,w,h,ro);
  else if(kind==='cross') drawCross(st,ctx,w,h,ro);
  else if(kind==='mix') drawMix(st,ctx,w,h,ro);
}

document.addEventListener('click', e=>{
  const btn=e.target.closest('[data-t]'); if(!btn) return;
  const si=+btn.dataset.si, st=VIZ[si]; if(!st) return;
  const t=btn.dataset.t;
  if(st.kind==='pair'){
    if(t==='reveal') st.show=true;
    if(t==='next'){ st.i=(st.i+1)%PAIR.length; st.show=false; }
    if(t==='prev'){ st.i=(st.i-1+PAIR.length)%PAIR.length; st.show=false; }
  } else if(st.kind==='cross'){
    if(t==='next') st.pi=(st.pi+1)%XL.length;
  } else {
    if(t==='p') st.x=Math.min(MIX.total, st.x+25);
    if(t==='m') st.x=Math.max(0, st.x-25);
    if(t==='goal') st.x=200;
    if(t==='mid') st.x=250;
  }
  draw(si);
});

function resizeAll(){
  DPR = Math.min(2, window.devicePixelRatio||1);
  document.querySelectorAll('canvas.viz').forEach(cv=>{
    const w = cv.clientWidth || cv.parentElement.clientWidth;
    const h = (cv.dataset.viz==='pair') ? 214 : (cv.dataset.viz==='cross' ? 210 : 190);
    cv.width=w*DPR; cv.height=h*DPR; cv.style.height=h+'px';
    cv.getContext('2d').setTransform(DPR,0,0,DPR,0,0);
  });
  Object.keys(VIZ).forEach(k=>draw(+k));
}
document.querySelectorAll('canvas.viz').forEach(initViz);
window.addEventListener('resize', resizeAll);
resizeAll();
</script>
