<style>

.sl .eyebrow{font-family:'Caveat',cursive;font-size:20px;color:var(--yellow);margin-bottom:6px;}

.fm{font-family:'Noto Serif TC',serif;}
.box{background:rgba(152,201,220,0.1);border:1.5px solid rgba(152,201,220,0.32);border-radius:10px;

.two{display:flex;gap:12px;flex-wrap:wrap;}.two>*{flex:1;min-width:220px;}

.cv-wrap{background:rgba(0,0,0,0.25);border-radius:12px;padding:10px;}
canvas.viz{width:100%;display:block;border-radius:8px;touch-action:none;}

.readout{font-family:'Noto Serif TC',serif;font-size:clamp(14px,1.9vw,18px);color:var(--chalk);

.q{background:rgba(0,0,0,0.2);border:1px solid rgba(242,217,121,0.18);border-radius:10px;padding:13px 15px;margin:10px 0;}
.q .qt{font-size:clamp(15px,2vw,17px);margin-bottom:10px;line-height:1.7;}

.opts{display:flex;flex-direction:column;gap:7px;}
.opt{text-align:left;background:rgba(243,239,226,0.06);border:1.5px solid rgba(243,239,226,0.22);

.opt:hover:not(:disabled){background:rgba(243,239,226,0.13);}
.opt.right{background:rgba(166,214,160,0.24);border-color:var(--green);color:#fff;font-weight:700;}
.opt.wrong{background:rgba(237,160,168,0.22);border-color:var(--pink);}

.fb{display:none;margin-top:9px;padding:9px 13px;border-radius:8px;font-size:14.5px;line-height:1.65;}

.fb.ok{background:rgba(166,214,160,0.14);border-left:3px solid var(--green);}
.fb.no{background:rgba(237,160,168,0.14);border-left:3px solid var(--pink);}
.fill{display:inline-block;background:rgba(0,0,0,0.3);border:none;border-bottom:2px solid var(--yellow);

.fill:focus{outline:none;background:rgba(242,217,121,0.12);}
.exq{background:rgba(0,0,0,0.26);border:1.5px solid rgba(242,217,121,0.28);border-radius:11px;padding:13px 15px;margin:10px 0;position:relative;}
.exq::before{content:'';position:absolute;top:-8px;left:32px;width:54px;height:14px;background:rgba(242,217,121,0.4);border-radius:2px;transform:rotate(-3deg);}
.exq .exq-q{font-size:clamp(14.5px,1.9vw,17px);line-height:1.75;margin-bottom:11px;}
.exo{text-align:left;background:rgba(243,239,226,0.06);border:1.5px solid rgba(243,239,226,0.22);
  color:var(--chalk);border-radius:9px;padding:9px 13px;font-family:inherit;font-size:clamp(14px,1.8vw,15.5px);
  cursor:pointer;transition:.15s;line-height:1.55;width:100%;margin-bottom:6px;display:block;}
.exo:hover:not(:disabled){background:rgba(243,239,226,0.13);}
.exo.right{background:rgba(166,214,160,0.26);border-color:var(--green);color:#fff;font-weight:700;}
.exo.wrong{background:rgba(237,160,168,0.2);border-color:var(--pink);opacity:.75;}
.exo:disabled{cursor:default;}
@keyframes shake{10%,90%{transform:translateX(-2px);}30%,70%{transform:translateX(4px);}50%{transform:translateX(-4px);}}
.exo.shake{animation:shake .4s;}
.exsol{display:none;margin-top:10px;padding:11px 14px;border-radius:9px;

.exsol.on{display:block;animation:fade .3s;}
.exsol .st{color:var(--soft);margin:3px 0;}
.exsol .an{color:var(--green);font-weight:700;margin-top:6px;}
.exlock{display:flex;align-items:center;gap:7px;margin-top:9px;font-size:13.5px;color:rgba(243,239,226,0.45);}
.exlock.hide{display:none;}
.info{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:11px;}
.icard{background:rgba(0,0,0,0.22);border:1.5px solid rgba(242,217,121,0.22);border-radius:11px;padding:14px;text-align:center;}
.icard .big{font-family:'Noto Serif TC',serif;font-size:clamp(17px,2.6vw,23px);font-weight:900;margin:6px 0;}
.icard .cap{font-size:13.5px;color:var(--soft);line-height:1.6;}
.frow{display:flex;gap:12px;align-items:center;padding:9px 12px;border-bottom:1px dashed rgba(243,239,226,0.16);}
.frow:last-child{border-bottom:none;}
.flab{color:var(--blue);font-weight:700;min-width:150px;font-size:clamp(13.5px,1.8vw,15.5px);flex:none;}
.fval{color:var(--yellow);font-weight:700;font-family:'Noto Serif TC',serif;font-size:clamp(14px,1.9vw,17px);}

.hud{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:12px;}
.hud .st{background:rgba(0,0,0,0.3);border:1.5px solid rgba(242,217,121,0.28);border-radius:9px;
  padding:7px 13px;font-size:14px;flex:1;min-width:88px;text-align:center;}
.hud .st b{display:block;font-family:'Noto Serif TC',serif;font-size:20px;color:var(--yellow);}
.tbar{height:8px;background:rgba(0,0,0,0.35);border-radius:5px;overflow:hidden;margin-bottom:12px;}
.tfill{height:100%;background:linear-gradient(90deg,var(--green),var(--yellow),var(--pink));width:100%;transition:width .1s linear;}
.gscreen{display:none;}.gscreen.on{display:block;}
.lvchips{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin:14px 0;}
.lvchip{background:rgba(152,201,220,0.12);border:1.5px solid rgba(152,201,220,0.35);border-radius:18px;
  padding:6px 13px;font-size:13.5px;color:var(--blue);}
.lvchip.done{background:rgba(166,214,160,0.2);border-color:var(--green);color:var(--green);}
.lvchip.now{background:rgba(242,217,121,0.22);border-color:var(--yellow);color:var(--yellow);font-weight:700;}
.gq{font-size:clamp(16px,2.2vw,20px);line-height:1.7;margin:14px 0;text-align:center;font-family:'Noto Serif TC',serif;}
.gopts{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
@media(max-width:560px){.gopts{grid-template-columns:1fr;}}
.gopt{background:rgba(243,239,226,0.07);border:1.5px solid rgba(243,239,226,0.25);color:var(--chalk);
  border-radius:10px;padding:12px;font-family:'Noto Serif TC',serif;font-size:17px;cursor:pointer;transition:.15s;min-height:48px;}
.gopt:hover:not(:disabled){background:rgba(243,239,226,0.15);}
.gopt.right{background:rgba(166,214,160,0.3);border-color:var(--green);font-weight:900;}
.gopt.wrong{background:rgba(237,160,168,0.25);border-color:var(--pink);}
.gfb{margin-top:11px;padding:10px 13px;border-radius:8px;font-size:14.5px;line-height:1.6;display:none;}
.gfb.on{display:block;}
.gfb.ok{background:rgba(166,214,160,0.15);border-left:3px solid var(--green);}
.gfb.no{background:rgba(237,160,168,0.15);border-left:3px solid var(--pink);}
.rank{font-size:54px;text-align:center;margin:10px 0;}
.hint{text-align:center;color:rgba(243,239,226,0.35);font-size:12.5px;padding:8px 0 0;}
@media (max-width:640px){.topbar{padding:8px 10px;gap:8px;}.wrap{padding:0 10px 70px;}.card{padding:13px;}}
</style></head><body>

<div class="wrap">
  <div class="card" id="goalCard">
    <h3><span class="ic">🎯</span>本節學習目標</h3>

<script>
const GOALS = [
  '理解不等式的意義（描述大小關係）',
  '能把文字條件列成不等式',
  '能判斷一個數是不是解（代入）',
  '能用數線表示解集合（實心/空心、箭頭）',
  '知道加減、乘除正數方向不變',
  '⚠️ 乘除負數要翻轉不等號（本章最重要）',
];

const DATA = [
{ key:'nline', viz:'nline', vizTitle:'數線繪製器 —— 換不等式，看實心/空心圓與箭頭方向',
  slides:[
    {eb:'核心觀念', h:'不等式的解是「範圍」', html:`
      <table class="tbl">
        <tr><th style="width:22%;">　</th><th style="width:39%;">方程式</th><th>不等式</th></tr>
        <tr><td>符號</td><td class="fm">=</td><td class="fm hl">&gt; &lt; ≥ ≤</td></tr>
        <tr><td>解</td><td>一個數 (x=4)</td><td class="hl">一個<b>範圍</b> (x&gt;2)</td></tr>
        <tr><td>數線</td><td>一個點</td><td class="hl">一段<b>區間</b></td></tr>
      </table>
      <div class="box y" style="text-align:center;">💡 「x &gt; 2」代表 <span class="hl">2.1、3、100…無限多個數</span>都符合。</div>`},
    {eb:'細目 ① 列式', h:'關鍵詞翻譯', html:`
      <table class="tbl">
        <tr><th style="width:52%;">中文</th><th style="width:22%;">不等號</th><th>含端點</th></tr>
        <tr><td><b>超過、多於</b></td><td class="fm hl">&gt;</td><td class="hl-r">❌</td></tr>
        <tr><td><b>不足、少於</b></td><td class="fm hl">&lt;</td><td class="hl-r">❌</td></tr>
        <tr><td><b>至少、不少於</b></td><td class="fm hl">≥</td><td class="hl-g">✅</td></tr>
        <tr><td><b>至多、不超過</b></td><td class="fm hl">≤</td><td class="hl-g">✅</td></tr>
      </table>
      <div class="box r" style="text-align:center;">⚠️ 「超過 5」→ x&gt;5（不含）；「至少 5」→ x≥5（含）。<span class="hl">有沒有「等於」味道決定。</span></div>`},
    {eb:'細目 ② 數線', h:'實心/空心、箭頭方向', html:`
      <table class="tbl">
        <tr><th style="width:24%;">要素</th><th>規則</th></tr>
        <tr><td class="hl-b">圓點</td><td>有等號 → <b>實心 ●</b>；沒等號 → <b>空心 ○</b></td></tr>
        <tr><td class="hl-b">箭頭</td><td>大於 → 向<b>右</b>；小於 → 向<b>左</b></td></tr>
      </table>
      <div class="box y" style="text-align:center;">記法：<span class="hl">有等號填滿（實心）、沒等號留空（空心）</span></div>
      <div class="box g">👉 用下方 Canvas 換不等式，看圓點種類與箭頭方向怎麼變。</div>`},
    {eb:'例題 ★☆☆', h:'列式', html:`
      <div class="exq" data-a="1">
        <div class="exq-q"><span class="hl">Q</span>　「年齡<b>超過</b> 18 歲」的不等式是？（設年齡 x）</div>
        <button class="exo" data-i="0">x ≥ 18</button>
        <button class="exo" data-i="1">x > 18</button>
        <button class="exo" data-i="2">x ≤ 18</button>
        <button class="exo" data-i="3">x < 18</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st">「<b>超過</b> 18」= 大於 18，<b>不含</b> 18 本身 → x > 18</div>
          <div class="st">(A) x≥18 是「<b>至少</b> 18」（含 18），不是「超過」。</div>
          <div class="st">💡 「超過」不含端點，「至少」含端點 —— 差一條等號線。</div>
          <div class="an">答：x > 18</div>
        </div>
      </div>`},
    {eb:'例題 ★☆☆', h:'數線表示', html:`
      <div class="exq" data-a="2">
        <div class="exq-q"><span class="hl">Q</span>　x ≤ −1 的數線表示是？</div>
        <button class="exo" data-i="0">−1 空心，向左</button>
        <button class="exo" data-i="1">−1 空心，向右</button>
        <button class="exo" data-i="2">−1 實心，向左</button>
        <button class="exo" data-i="3">−1 實心，向右</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st">≤ 有等號 → <b>實心 ●</b>（含 −1）</div>
          <div class="st">「小於」→ 向<b>左</b></div>
          <div class="st">(A) 空心是錯的（≤ 有等號要實心）；(C) 向右是錯的（小於向左）。</div>
          <div class="an">答：−1 實心，向左</div>
        </div>
      </div>`}
  ],
  fa:[
    {q:'不等式的解是？', o:['一個數','一個範圍','兩個數','沒有解'], a:1, e:'解是一個範圍。'},
    {q:'「至少 5」的不等式？', o:['x>5','x≥5','x<5','x≤5'], a:1, e:'至少 = ≥（含 5）。'},
    {q:'≥ 在數線上用？', o:['實心，向左','實心，向右','空心，向右','空心，向左'], a:1, e:'有等號實心、大於向右。'}

/* ===== Canvas ===== */
const VIZ = {}; let DPR=1;

function numberline(ctx, w, y, lo, hi){
  const L=26, R=w-26;
  const X=v=>L+(v-lo)/(hi-lo)*(R-L);
  ctx.strokeStyle='rgba(243,239,226,.7)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(L,y); ctx.lineTo(R,y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(R,y); ctx.lineTo(R-8,y-4); ctx.moveTo(R,y); ctx.lineTo(R-8,y+4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(L,y); ctx.lineTo(L+8,y-4); ctx.moveTo(L,y); ctx.lineTo(L+8,y+4); ctx.stroke();
  ctx.fillStyle='rgba(243,239,226,.55)'; ctx.font='10px "Noto Serif TC"'; ctx.textAlign='center';
  for(let v=lo+1; v<hi; v++){
    ctx.strokeStyle='rgba(243,239,226,.35)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(X(v),y-3); ctx.lineTo(X(v),y+3); ctx.stroke();
    if(v%2===0) ctx.fillText(String(v), X(v), y+16);
  }
  return X;
}
/* ① 數線繪製器 */
const INEQ=[
  {op:'>', val:2,  s:'x > 2'},
  {op:'>=',val:-1, s:'x ≥ −1'},
  {op:'<', val:3,  s:'x < 3'},
  {op:'<=',val:-3, s:'x ≤ −3'},
  {op:'>', val:0,  s:'x > 0'},
  {op:'<=',val:4,  s:'x ≤ 4'},
];
/* ② 性質判斷 */
const PROP=[
  {q:'a > b，則 a+3 ? b+3', op:'加 3（不變）', ans:'a+3 > b+3', ok:true, flip:false},
  {q:'a > b，則 −2a ? −2b', op:'乘 −2（負數，翻轉！）', ans:'−2a < −2b', ok:false, flip:true},
  {q:'a > b，則 a/3 ? b/3', op:'除 3（正數，不變）', ans:'a/3 > b/3', ok:true, flip:false},
  {q:'a > b，則 a−5 ? b−5', op:'減 5（不變）', ans:'a−5 > b−5', ok:true, flip:false},
  {q:'a > b，則 −3a ? −3b', op:'乘 −3（負數，翻轉！）', ans:'−3a < −3b', ok:false, flip:true},
  {q:'a < b、c < 0，ac ? bc', op:'乘 c（c<0 負數，翻轉！）', ans:'ac > bc', ok:false, flip:true},
];
/* ③ 範圍運算 */
const RANGE=[
  {lo:-3, hi:5, loOp:'<', hiOp:'<=', k:-2, rs:'−2x', calc:'兩邊乘 −2（負數，翻轉！）'},
  {lo:2, hi:6, loOp:'<=', hiOp:'<', k:-1, rs:'−x', calc:'兩邊乘 −1（負數，翻轉！）'},
  {lo:-4, hi:2, loOp:'<', hiOp:'<', k:3, rs:'3x', calc:'兩邊乘 3（正數，不變）'},
  {lo:-1, hi:3, loOp:'<', hiOp:'<=', k:2, rs:'2x', calc:'兩邊乘 2（正數，不變）'},
];

function initViz(cv){
  const si=+cv.dataset.si, kind=cv.dataset.viz;
  const ctx=cv.getContext('2d');
  const st=VIZ[si]={kind,cv,ctx};
  const ctrl=document.querySelector(`[data-ctrl="${si}"]`);
  if(kind==='nline'){
    st.i=0;
    ctrl.innerHTML=`<div class="readout" id="ro-${si}"></div>
      <button class="btn" data-t="next" data-si="${si}" style="background:rgba(242,217,121,.2);border-color:var(--yellow);color:var(--yellow);font-weight:700;">🔀 換一個不等式</button>`;
  } else if(kind==='prop'){
    st.i=0; st.show=false;
    ctrl.innerHTML=`<div class="readout" id="ro-${si}"></div>
      <button class="btn" data-t="rev" data-si="${si}" style="background:rgba(242,217,121,.2);border-color:var(--yellow);color:var(--yellow);font-weight:700;">🔍 揭曉（會翻轉嗎？）</button>
      <button class="btn" data-t="next" data-si="${si}">下一題 ▶</button>`;
  } else {
    st.i=0; st.show=false;
    ctrl.innerHTML=`<div class="readout" id="ro-${si}"></div>
      <button class="btn" data-t="rev" data-si="${si}" style="background:rgba(242,217,121,.2);border-color:var(--yellow);color:var(--yellow);font-weight:700;">🔍 求範圍</button>
      <button class="btn" data-t="next" data-si="${si}">下一題 ▶</button>`;
  }
  draw(si);
}

function drawNline(st, ctx, w, h, ro){
  const E=INEQ[st.i], lo=-6, hi=6;
  ctx.textAlign='center';
  ctx.fillStyle='rgba(242,217,121,.85)'; ctx.font='bold 14px "Noto Sans TC"';
  ctx.fillText(`${E.s} 的解集合`, w/2, 20);
  const X=numberline(ctx, w, h*0.5, lo, hi);
  const ge = (E.op==='>=' || E.op==='<=');
  const right = (E.op==='>' || E.op==='>=');
  const col = right? '#a6d6a0' : '#98c9dc';
  const px=X(E.val), y=h*0.5;
  // 箭頭方向
  ctx.strokeStyle=col; ctx.lineWidth=4;
  ctx.beginPath();
  if(right) ctx.moveTo(px, y), ctx.lineTo(w-30, y);
  else ctx.moveTo(px, y), ctx.lineTo(30, y);
  ctx.stroke();
  // 圓點
  ctx.beginPath(); ctx.arc(px, y, 6.5, 0, 7);
  if(ge){ ctx.fillStyle=col; ctx.fill(); }
  else { ctx.fillStyle='#16281c'; ctx.fill(); ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.stroke(); }
  ctx.fillStyle=col; ctx.font='bold 13px "Noto Serif TC"';
  ctx.fillText(String(E.val), px, y-14);
  // 說明
  ctx.fillStyle='rgba(243,239,226,.8)'; ctx.font='13px "Noto Sans TC"';
  ctx.fillText(`${ge?'有等號 → 實心 ●':'沒等號 → 空心 ○'}　·　${right?'大於 → 向右':'小於 → 向左'}`, w/2, h-10);
  ro.innerHTML=`<b>${E.s}</b>　→　${ge?'<b style="color:var(--green)">實心 ●</b>（含端點）':'<b style="color:var(--blue)">空心 ○</b>（不含端點）'}，向<b>${right?'右':'左'}</b>`;
}

function drawProp(st, ctx, w, h, ro){
  const E=PROP[st.i];
  ctx.textAlign='center';
  ctx.fillStyle='rgba(242,217,121,.85)'; ctx.font='bold 13px "Noto Sans TC"';
  ctx.fillText(`第 ${st.i+1} / ${PROP.length} 題`, w/2, 16);
  ctx.fillStyle='#f3efe2'; ctx.font='bold 20px "Noto Serif TC"';
  ctx.fillText(E.q, w/2, 52);
  if(!st.show){
    ctx.fillStyle='rgba(243,239,226,.4)'; ctx.font='13px "Noto Sans TC"';
    ctx.fillText('🔒 先想：這一步乘除的是正數還是負數？', w/2, 90);
    ctx.fillText('負數 → 不等號翻轉！再按「揭曉」', w/2, 112);
  } else {
    const col = E.flip? '#eda0a8':'#a6d6a0';
    ctx.fillStyle='rgba(243,239,226,.75)'; ctx.font='14px "Noto Sans TC"';
    ctx.fillText(E.op, w/2, 86);
    ctx.fillStyle=col; ctx.font='bold 22px "Noto Serif TC"';
    ctx.fillText(E.ans, w/2, 120);
    ctx.fillStyle=col; ctx.font='bold 13px "Noto Sans TC"';
    ctx.fillText(E.flip? '⚠️ 方向翻轉了！':'方向不變', w/2, 146);
  }
  ro.innerHTML = st.show
    ? `<b>${E.q}</b>　→　${E.op}　→　<b style="color:${E.flip?'var(--pink)':'var(--green)'}">${E.ans}</b>${E.flip?'（翻轉！）':'（不變）'}`
    : `<b>${E.q}</b>　<span style="color:rgba(243,239,226,.5)">—— 先想「乘除的是正數還是負數？」再揭曉</span>`;
}

function drawRange(st, ctx, w, h, ro){
  const E=RANGE[st.i];
  // 原範圍與新範圍
  const nlo=E.lo*E.k, nhi=E.hi*E.k;
  const flip = E.k<0;
  // 新範圍排序
  let a=nlo, b=nhi, aOp=E.loOp, bOp=E.hiOp;
  if(flip){ // 翻轉：小的變大，端點符號跟著端點走
    a=nhi; b=nlo;
    // 原 lo 那端(loOp) 對應到 nlo，翻轉後 nlo 是較大端(b)
    aOp = E.hiOp==='<'?'<':'<='; // 較小端來自原 hi 端
    bOp = E.loOp==='<'?'<':'<='; // 較大端來自原 lo 端
  }
  const oOp = s=>s;
  ctx.textAlign='center';
  ctx.fillStyle='rgba(242,217,121,.85)'; ctx.font='bold 13px "Noto Sans TC"';
  ctx.fillText(`已知 ${E.lo} ${E.loOp==='<'?'<':'≤'} x ${E.hiOp==='<'?'<':'≤'} ${E.hi}，求 ${E.rs}`, w/2, 18);
  ctx.fillStyle='#f3efe2'; ctx.font='16px "Noto Serif TC"';
  ctx.fillText(`原範圍：${E.lo} ${E.loOp==='<'?'<':'≤'} x ${E.hiOp==='<'?'<':'≤'} ${E.hi}`, w/2, 50);
  if(!st.show){
    ctx.fillStyle='rgba(243,239,226,.4)'; ctx.font='13px "Noto Sans TC"';
    ctx.fillText('🔒 先自己算（乘負數要翻！），再按「求範圍」', w/2, 92);
    ctx.fillText(E.calc, w/2, 114);
  } else {
    const col = flip?'#eda0a8':'#a6d6a0';
    ctx.fillStyle='rgba(243,239,226,.7)'; ctx.font='13px "Noto Sans TC"';
    ctx.fillText(E.calc, w/2, 78);
    ctx.fillStyle=col; ctx.font='bold 20px "Noto Serif TC"';
    const res = `${a} ${aOp==='<'?'<':'≤'} ${E.rs} ${bOp==='<'?'<':'≤'} ${b}`;
    ctx.fillText(res, w/2, 112);
    ctx.fillStyle=col; ctx.font='bold 13px "Noto Sans TC"';
    ctx.fillText(flip?'⚠️ 乘負數 → 方向與端點都翻轉':'乘正數 → 方向不變', w/2, 138);
  }
  const res = `${a} ${aOp==='<'?'<':'≤'} ${E.rs} ${bOp==='<'?'<':'≤'} ${b}`;
  ro.innerHTML = st.show
    ? `原 ${E.lo} ${E.loOp==='<'?'<':'≤'} x ${E.hiOp==='<'?'<':'≤'} ${E.hi}　→　${E.calc}　→　<b style="color:${flip?'var(--pink)':'var(--green)'}">${res}</b>`
    : `已知 ${E.lo} ${E.loOp==='<'?'<':'≤'} x ${E.hiOp==='<'?'<':'≤'} ${E.hi}，求 ${E.rs}　<span style="color:rgba(243,239,226,.5)">—— 先自己算（乘負要翻！）</span>`;
}

function draw(si){
  const st=VIZ[si]; if(!st) return;
  const {cv,ctx,kind}=st, w=cv.width/DPR, h=cv.height/DPR;
  ctx.clearRect(0,0,w,h);
  const ro=document.getElementById('ro-'+si);
  if(kind==='nline') drawNline(st,ctx,w,h,ro);
  else if(kind==='prop') drawProp(st,ctx,w,h,ro);
  else if(kind==='range') drawRange(st,ctx,w,h,ro);
}

document.addEventListener('click', e=>{
  const btn=e.target.closest('[data-t]'); if(!btn) return;
  const si=+btn.dataset.si, st=VIZ[si]; if(!st) return;
  const t=btn.dataset.t;
  if(st.kind==='nline'){
    if(t==='next') st.i=(st.i+1)%INEQ.length;
  } else if(st.kind==='prop'){
    if(t==='rev') st.show=true;
    if(t==='next'){ st.i=(st.i+1)%PROP.length; st.show=false; }
  } else {
    if(t==='rev') st.show=true;
    if(t==='next'){ st.i=(st.i+1)%RANGE.length; st.show=false; }
  }
  draw(si);
});

function resizeAll(){
  DPR = Math.min(2, window.devicePixelRatio||1);
  document.querySelectorAll('canvas.viz').forEach(cv=>{
    const w = cv.clientWidth || cv.parentElement.clientWidth;
    const h = (cv.dataset.viz==='nline') ? 176 : (cv.dataset.viz==='prop' ? 176 : 176);
    cv.width=w*DPR; cv.height=h*DPR; cv.style.height=h+'px';
    cv.getContext('2d').setTransform(DPR,0,0,DPR,0,0);
  });
  Object.keys(VIZ).forEach(k=>draw(+k));
}
document.querySelectorAll('canvas.viz').forEach(initViz);
window.addEventListener('resize', resizeAll);
resizeAll();
</script>
