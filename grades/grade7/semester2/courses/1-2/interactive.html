.exo:hover:not(:disabled){background:rgba(243,239,226,0.13);}

.info{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:11px;}

.icard .big{font-family:'Noto Serif TC',serif;font-size:clamp(17px,2.6vw,23px);font-weight:900;margin:6px 0;}

.frow{display:flex;gap:12px;align-items:center;padding:9px 12px;border-bottom:1px dashed rgba(243,239,226,0.16);}

.gopts{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
@media(max-width:560px){.gopts{grid-template-columns:1fr;}}
.gopt{background:rgba(243,239,226,0.07);border:1.5px solid rgba(243,239,226,0.25);color:var(--chalk);
  border-radius:10px;padding:12px;font-family:'Noto Serif TC',serif;font-size:17px;cursor:pointer;transition:.15s;min-height:48px;}
.gopt:hover:not(:disabled){background:rgba(243,239,226,0.15);}
.gopt.right{background:rgba(166,214,160,0.3);border-color:var(--green);font-weight:900;}
.gopt.wrong{background:rgba(237,160,168,0.25);border-color:var(--pink);}
.gfb{margin-top:11px;padding:10px 13px;border-radius:8px;font-size:14.5px;line-height:1.6;display:none;}
.gfb.on{display:block;}
.gfb.ok{background:rgba(166,214,160,0.15);border-left:3px solid var(--green);}
.gfb.no{background:rgba(237,160,168,0.15);border-left:3px solid var(--pink);}
.rank{font-size:54px;text-align:center;margin:10px 0;}

</style></head><body>

<div class="topbar">
  <div class="brand">1-2　聯立方程式的解<small>七下 · 第1章 二元一次聯立方程式</small></div>
  <div class="spacer"></div>
</div>

<div class="tabs" id="tabs">
  <button class="tab on" data-p="0"><span class="n">🎯</span>消去法</button>
  <button class="tab" data-p="1"><span class="n">➕➖</span>加減消去</button>
  <button class="tab" data-p="2"><span class="n">🔀</span>三種解的情形</button>
  <button class="tab" data-p="3"><span class="n">★</span>題型測驗</button>
  <button class="tab" data-p="4"><span class="n">🎮</span>闖關遊戲</button>
</div>

<div class="wrap">
  <div class="card" id="goalCard">
    <h3><span class="ic">🎯</span>本節學習目標</h3>
    <div class="goals" id="goals"></div>
  </div>
  <div id="wrap"></div>
</div>

<script>
const GOALS = [
  '理解聯立方程式的解：同時滿足兩條的唯一一組 (x,y)',
  '能用代入消去法求解',
  '能用加減消去法求解（含先乘倍數再消）',
  '能判斷哪種方法比較快',
  '知道三種情形：唯一解／無解／無限多解',
  '知道三情形對應幾何：相交／平行／重合',
];

const DATA = [
{ key:'pick', viz:'pick', vizTitle:'選方法建議器 —— 先自己想「哪個係數最好消？」，再揭曉（6 題）',
  slides:[
    {eb:'核心思想', h:'解聯立的唯一祕訣：消去', html:`
      <div class="box y" style="text-align:center;font-size:19px;">
        兩個未知數太難 → <span class="hl">先消掉一個</span> → 變成七上的一元一次方程式</div>
      <table class="tbl">
        <tr><th style="width:16%;">步驟</th><th>動作</th></tr>
        <tr><td class="hl">① 消去</td><td>用<b>代入</b>或<b>加減</b>，把一個未知數消掉</td></tr>
        <tr><td class="hl">② 解一元</td><td>剩下一個未知數 → 七上的一元一次</td></tr>
        <tr><td class="hl">③ 回代</td><td>把解出的值代回去，<b>求另一個未知數</b></td></tr>
        <tr><td class="hl">④ 驗算</td><td>代回<span class="hl-r">兩條</span>原方程式</td></tr>
      </table>
      <div class="box r" style="text-align:center;">⚠️ 最常漏的是 ③ <b>回代</b> —— 消去後解出一個，就以為做完了。</div>`},
    {eb:'細目 ②', h:'代入消去法：從一條解出 y=…', html:`
      <div class="box y"><b>適用：</b>其中一條<span class="hl">已經是</span> <span class="fm">y = …</span>，或<span class="hl">容易解出</span>（有係數 1 的未知數）</div>
      <div class="box"><b>{ y = 2x，x + y = 12 }</b><br>
        代入：<span class="fm">x + 2x = 12 → 3x = 12 → x = 4</span>；回代 y = 8</div>
      <div class="box"><b>{ 2x + y = 10，x − y = 2 }</b><br>
        第二式解出 <span class="fm">x = y+2</span> → 代入：<span class="fm">2(y+2)+y = 10 → 3y = 6 → y = 2</span>；x = 4</div>
      <div class="box g" style="text-align:center;">💡 <span class="hl">這就是 1-1 的「解出 y = …」派上用場的地方</span> —— 那時的「入場券」，現在兌現了。</div>`},
    {eb:'細目 ③', h:'加減消去法：同號相減、異號相加', html:`
      <div class="box y" style="text-align:center;"><b>適用：</b>某未知數的<span class="hl">係數相同</span>或<span class="hl">互為相反數</span></div>
      <table class="tbl">
        <tr><th style="width:50%;">係數</th><th>怎麼消</th></tr>
        <tr><td><b>相同</b>（都是 +2y）</td><td class="hl-g" style="font-size:18px;"><b>相減</b>（+2y − 2y = 0）</td></tr>
        <tr><td><b>互為相反</b>（+3y 與 −3y）</td><td class="hl-g" style="font-size:18px;"><b>相加</b>（+3y + (−3y) = 0）</td></tr>
      </table>
      <div class="box r" style="text-align:center;font-size:19px;">
        ⚠️ <b>最常搞反：同號要「減」、異號要「加」</b><br>
        記法：<span class="hl">要讓那項變 0，就想「怎樣加減會抵消」。</span></div>`},
    {eb:'細目 ③ 進階', h:'係數都很醜 → 先乘倍數', html:`
      <div class="box r" style="text-align:center;">「加減消去法只能用在係數完全相同的情況」→ <span class="hl-r">錯</span></div>
      <div class="box"><b>{ 3x + 2y = 7，2x + 3y = 8 }</b> —— y 係數 2 和 3，不同也不相反<br>
        <b>先湊成一樣</b>：第一式 ×3、第二式 ×2 → y 係數都變 <span class="hl">6</span><br>
        <span class="fm">9x + 6y = 21；4x + 6y = 16</span> → 相減 <span class="fm">5x = 5 → x = 1</span>；y = 2</div>
      <div class="box y" style="text-align:center;">💡 這叫<span class="hl">擴分的逆用</span> —— 和 2-2 通分「湊成共同分母」是同一個腦子。<br>
        所以加減消去法<b>幾乎任何聯立都能用</b>。</div>`},
    {eb:'例題 1 ★☆☆', h:'代入（現成的 y=…）', html:`
      <div class="exq" data-a="2">
        <div class="exq-q"><span class="hl">Q</span>　解 { y = 3x，x + y = 16 }，x = ?</div>
        <button class="exo" data-i="0">2</button>
        <button class="exo" data-i="1">8</button>
        <button class="exo" data-i="2">4</button>
        <button class="exo" data-i="3">12</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st fm">y = 3x 直接代入 x + y = 16：x + 3x = 16</div>
          <div class="st fm">4x = 16 → x = 4；回代 y = 12</div>
          <div class="st">(D) 12 是 <b>y</b> 的值 —— 題目問 x！</div>
          <div class="an">答：x = 4（y = 12）</div>
        </div>
      </div>`},
    {eb:'例題 2 ★★☆', h:'加減（相同 → 相減）', html:`
      <div class="exq" data-a="0">

const G = {lv:0, score:0, streak:0, best:0, t:20, timer:null, cur:null, answered:false};
function gShow(id){ ['gStart','gPlay','gEnd'].forEach(x=>document.getElementById(x).classList.toggle('on', x===id)); }
function gChips(){
  document.getElementById('gChips').innerHTML = GAME.map((g,i)=>
    `<div class="lvchip ${i<G.lv?'done':i===G.lv?'now':''}">${i+1}. ${g.name}</div>`).join('');
}
function gLoad(){
  if(G.lv>=GAME.length){ gFinish(); return; }
  G.answered=false; G.t=20;
  const bank = GAME[G.lv].qs;
  G.cur = bank[Math.floor(Math.random()*bank.length)];
  document.getElementById('hLv').textContent = (G.lv+1)+'/'+GAME.length;
  document.getElementById('hSc').textContent = G.score;
  document.getElementById('hStk').textContent = G.streak;
  document.getElementById('gQ').innerHTML = `<span style="color:var(--blue);font-size:15px;">第 ${G.lv+1} 關 · ${GAME[G.lv].name}</span><br>${G.cur.q}`;
  document.getElementById('gO').innerHTML = G.cur.o.map((o,i)=>
    `<button class="gopt" data-g="${i}">${'ABCD'[i]}. ${o}</button>`).join('');
  document.getElementById('gFb').className='gfb';
  document.getElementById('gNext').style.display='none';
  gChips();
  clearInterval(G.timer);
  G.timer = setInterval(()=>{
    G.t -= 0.1;
    document.getElementById('hT').textContent = Math.max(0,G.t).toFixed(0);
    document.getElementById('tFill').style.width = Math.max(0,G.t/20*100)+'%';
    if(G.t<=0){ clearInterval(G.timer); gAnswer(-1); }
  },100);
}
function gAnswer(pick){
  if(G.answered) return;
  G.answered = true; clearInterval(G.timer);
  const ans = G.cur.a, ok = pick===ans;
  document.querySelectorAll('.gopt').forEach((b,i)=>{
    b.disabled=true;
    if(i===ans) b.classList.add('right'); else if(i===pick) b.classList.add('wrong');
  });
  let gain=0, sb=0, tb=0;
  if(ok){
    G.streak++; G.best=Math.max(G.best,G.streak);
    sb = Math.min(5, G.streak-1); tb = Math.min(5, Math.floor(G.t/4));
    gain = 10+sb+tb; G.score += gain;
  } else { G.streak = 0; }
  document.getElementById('hSc').textContent = G.score;
  document.getElementById('hStk').textContent = G.streak;
  const fb = document.getElementById('gFb');
  fb.className = 'gfb on '+(ok?'ok':'no');
  fb.innerHTML = (ok? `✅ <b>答對！+${gain} 分</b>（基礎10 + 連擊${sb} + 速度${tb}）<br>`
                    : (pick===-1?'⏰ <b>時間到！</b><br>':'❌ <b>答錯了</b><br>')) + G.cur.e;
  document.getElementById('gNext').style.display='inline-block';
  document.getElementById('gNext').textContent = (G.lv>=GAME.length-1)?'看成績 🏁':'下一關 ▶';
}
function gFinish(){
  clearInterval(G.timer);
  const max = GAME.length*20, pct = Math.round(G.score/max*100);
  const rank = pct>=85?['🏆','數論大師']:pct>=70?['🥇','高手']:pct>=50?['🥈','不錯']:['📖','再加油'];
  document.getElementById('gRank').textContent = rank[0];
  document.getElementById('gFinal').innerHTML = `<b class="hl">${G.score}</b> / ${max} 分　·　${rank[1]}`;
  document.getElementById('gStats').innerHTML = `最高連擊 <b class="hl">${G.best}</b>　·　完成 ${GAME.length} 關`;
  gShow('gEnd');
}
document.getElementById('gGo').addEventListener('click', ()=>{ G.lv=0;G.score=0;G.streak=0;G.best=0; gShow('gPlay'); gLoad(); });
document.getElementById('gAgain').addEventListener('click', ()=>{ G.lv=0;G.score=0;G.streak=0;G.best=0; gShow('gPlay'); gLoad(); });
document.getElementById('gNext').addEventListener('click', ()=>{ G.lv++; gLoad(); });

const PICK=[
  {e:'{ y = 2x，x + y = 12 }', m:'代入', why:'第一式已經是 y = 2x → 直接代入最快', ans:'(4, 8)'},
  {e:'{ 2x + y = 10，x − y = 2 }', m:'代入', why:'第二式 x 係數是 1 → 解出 x = y+2 代入', ans:'(4, 2)'},
  {e:'{ 3x + 2y = 16，x + 2y = 8 }', m:'加減(相減)', why:'y 係數都是 +2（相同）→ 相減消 y', ans:'(4, 2)'},
  {e:'{ 2x + 3y = 12，4x − 3y = 6 }', m:'加減(相加)', why:'y 係數 +3 與 −3（互為相反）→ 相加消 y', ans:'(3, 2)'},
  {e:'{ 5x + 2y = 16，3x − 2y = 0 }', m:'加減(相加)', why:'y 係數 +2 與 −2（相反）→ 相加消 y', ans:'(2, 3)'},
  {e:'{ 3x + 2y = 7，2x + 3y = 8 }', m:'加減(先乘倍數)', why:'係數都不同 → 第一式×3、第二式×2 → y 都變 6', ans:'(1, 2)'},
];
/* ② 加減消去逐步器 */
const ELIM=[
 {name:'係數相同 → 相減', fr:[
   {t:'3x + 2y = 16', t2:'x + 2y = 8', hi:'y', note:'y 的係數都是 +2（相同）→ 用「相減」消去 y'},
   {t:'(3x+2y) − (x+2y) = 16 − 8', t2:'', hi:null, note:'兩式相減：3x−x = 2x，2y−2y = 0（消掉了！）'},
   {t:'2x = 8', t2:'', hi:null, note:'剩下一元一次 → x = 4'},
   {t:'x = 4 → 回代 x+2y=8', t2:'', hi:null, note:'4 + 2y = 8 → 2y = 4 → y = 2'},
   {t:'x = 4， y = 2', t2:'', hi:'ans', note:'✓ 驗算兩條：3×4+2×2=16 ✓；4+2×2=8 ✓'},
 ]},
 {name:'互為相反 → 相加', fr:[
   {t:'2x + 3y = 12', t2:'4x − 3y = 6', hi:'y', note:'y 的係數是 +3 和 −3（互為相反）→ 用「相加」消去 y'},
   {t:'(2x+3y) + (4x−3y) = 12 + 6', t2:'', hi:null, note:'兩式相加：2x+4x = 6x，3y+(−3y) = 0（消掉了！）'},
   {t:'6x = 18', t2:'', hi:null, note:'x = 3'},
   {t:'x = 3 → 回代 2x+3y=12', t2:'', hi:null, note:'6 + 3y = 12 → y = 2'},
   {t:'x = 3， y = 2', t2:'', hi:'ans', note:'✓ 驗算兩條都成立'},
 ]},
 {name:'⚠️ 減負變加', fr:[
   {t:'3x + 2y = 19', t2:'3x − y = 13', hi:'x', note:'x 係數都是 +3（相同）→ 相減消 x'},
   {t:'(3x+2y) − (3x−y) = 19 − 13', t2:'', hi:'trap', note:'⚠️ 關鍵：2y − (−y) = 2y + y = 3y（減去負的要變加！）'},
   {t:'3y = 6', t2:'', hi:null, note:'y = 2（若算成 2y−y=y 就會得到錯的 y=6）'},
   {t:'y = 2 → 回代 3x+2y=19', t2:'', hi:null, note:'3x + 4 = 19 → x = 5'},
   {t:'x = 5， y = 2', t2:'', hi:'ans', note:'✓ 完成'},
 ]},
];
/* ③ 三種解的情形 */
const CASE=[
  {name:'唯一解', a1:1,b1:1,c1:8, a2:1,b2:-1,c2:2, kind:'unique', sx:5, sy:3,
   e1:'x + y = 8', e2:'x − y = 2', elim:'相加 → 2x = 10 → x = 5（正常）', geo:'兩直線相交於一點'},
  {name:'無解', a1:1,b1:1,c1:5, a2:1,b2:1,c2:8, kind:'none',
   e1:'x + y = 5', e2:'x + y = 8', elim:'相減 → 0 = −3（矛盾！）', geo:'兩直線平行'},
  {name:'無限多解', a1:1,b1:1,c1:5, a2:2,b2:2,c2:10, kind:'inf',
   e1:'x + y = 5', e2:'2x + 2y = 10', elim:'第二式÷2 → x+y=5 → 0 = 0（恆成立）', geo:'兩直線重合'},
];

function initViz(cv){
  const si=+cv.dataset.si, kind=cv.dataset.viz;
  const ctx=cv.getContext('2d');
  const st = VIZ[si] = {kind, cv, ctx};
  const ctrl = document.querySelector(`[data-ctrl="${si}"]`);
  if(kind==='pick'){
    st.i=0; st.show=false;
    ctrl.innerHTML = `<div class="readout" id="ro-${si}"></div>
      <button class="btn" data-t="rev" data-si="${si}" style="background:rgba(242,217,121,.2);border-color:var(--yellow);color:var(--yellow);font-weight:700;">🔍 揭曉建議方法</button>
      <button class="btn" data-t="next" data-si="${si}">下一題 ▶</button>
      <button class="btn" data-t="prev" data-si="${si}">◀ 上一題</button>`;
  } else if(kind==='elim'){
    st.ei=0; st.fi=0;
    ctrl.innerHTML = `<div class="readout" id="ro-${si}"></div>
      <button class="btn" data-t="next" data-si="${si}" style="background:rgba(242,217,121,.2);border-color:var(--yellow);color:var(--yellow);font-weight:700;">下一步 ▶</button>
      <button class="btn" data-t="rst" data-si="${si}">↩ 重設</button>
      <button class="btn" data-t="swap" data-si="${si}">🔀 換一題</button>`;
  } else {
    st.i=0;
    ctrl.innerHTML = `<div class="readout" id="ro-${si}"></div>
      <button class="btn" data-t="next" data-si="${si}" style="background:rgba(242,217,121,.2);border-color:var(--yellow);color:var(--yellow);font-weight:700;">🔀 換一種情形</button>`;
  }
  draw(si);
}

function wrapT(ctx, txt, cx, y, maxw, lh){
  let line='', ly=y;
  for(const ch of txt){
    if(ctx.measureText(line+ch).width>maxw){ ctx.fillText(line, cx, ly); line=ch; ly+=lh; }
    else line+=ch;
  }
  ctx.fillText(line, cx, ly); return ly;
}

function drawPick(st, ctx, w, h, ro){
  const E=PICK[st.i];
  ctx.textAlign='center';
  ctx.fillStyle='rgba(242,217,121,.85)'; ctx.font='bold 13px "Noto Sans TC"';
  ctx.fillText(`第 ${st.i+1} / ${PICK.length} 題　·　用代入還是加減？`, w/2, 16);
  ctx.fillStyle='#f3efe2'; ctx.font='bold 20px "Noto Serif TC"';
  ctx.fillText(E.e, w/2, 52);
  if(!st.show){
    ctx.fillStyle='rgba(243,239,226,.06)';
    ctx.strokeStyle='rgba(243,239,226,.25)'; ctx.lineWidth=1.5; ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.roundRect(26, 66, w-52, 54, 8); ctx.fill(); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle='rgba(243,239,226,.4)'; ctx.font='13px "Noto Sans TC"';
    ctx.fillText('🔒 先自己想「哪個未知數的係數最好消？」', w/2, 88);
    ctx.fillText('想好再按「揭曉建議方法」', w/2, 108);
  } else {
    ctx.fillStyle='rgba(166,214,160,.16)';
    ctx.strokeStyle='#a6d6a0'; ctx.lineWidth=1.6;
    const bw=Math.min(w-50, 240);
    ctx.beginPath(); ctx.roundRect((w-bw)/2, 64, bw, 28, 7); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#a6d6a0'; ctx.font='bold 15px "Noto Sans TC"';
    ctx.fillText('建議：' + E.m, w/2, 83);
    ctx.fillStyle='rgba(243,239,226,.78)'; ctx.font='13px "Noto Sans TC"';
    const ly=wrapT(ctx, E.why, w/2, 110, w-40, 18);
    ctx.fillStyle='#f2d979'; ctx.font='bold 13px "Noto Serif TC"';
    ctx.fillText('→ 解 ' + E.ans, w/2, ly+22);
  }
  ro.innerHTML = st.show
    ? `<b>${E.e}</b>　→　建議用 <b style="color:var(--green)">${E.m}</b>　｜　${E.why}　→　<b>${E.ans}</b>`
    : `<b>${E.e}</b>　<span style="color:rgba(243,239,226,.5)">—— 先想「哪個未知數的係數最好消？」再按揭曉</span>`;
}

function drawElim(st, ctx, w, h, ro){
  const E=ELIM[st.ei], F=E.fr[st.fi];
  ctx.textAlign='center';
  ctx.fillStyle='rgba(242,217,121,.85)'; ctx.font='bold 13px "Noto Sans TC"';
  ctx.fillText(`第 ${st.ei+1} 題 · ${E.name}　（步驟 ${st.fi+1} / ${E.fr.length}）`, w/2, 16);
  const trap = F.hi==='trap', ans = F.hi==='ans';
  // 主式
  ctx.fillStyle= trap?'#eda0a8':(ans?'#a6d6a0':'#f3efe2'); ctx.font='bold 21px "Noto Serif TC"';
  ctx.fillText(F.t, w/2, F.t2 ? 46 : 56);
  if(F.t2){
    ctx.fillStyle='#f3efe2'; ctx.font='bold 21px "Noto Serif TC"';
    ctx.fillText(F.t2, w/2, 74);
    // 高亮係數
    if(F.hi==='y' || F.hi==='x'){
      ctx.fillStyle='rgba(242,217,121,.8)'; ctx.font='11px "Noto Sans TC"';
      ctx.fillText('↑ 看 '+F.hi+' 的係數 ↑', w/2, 90);
    }
  }
  const ny = F.t2 ? 112 : 90;
  ctx.fillStyle= trap?'#eda0a8':'rgba(243,239,226,.8)'; ctx.font='13.5px "Noto Sans TC"';
  wrapT(ctx, F.note, w/2, ny, w-40, 19);
  const n=E.fr.length, dx=15, sx=w/2-(n-1)*dx/2;
  for(let i=0;i<n;i++){
    ctx.beginPath(); ctx.arc(sx+i*dx, h-13, 4.5, 0, 7);
    ctx.fillStyle = i<=st.fi ? '#f2d979' : 'rgba(243,239,226,.22)'; ctx.fill();
  }
  ro.innerHTML = `<b>${E.name}</b>　｜　步驟 ${st.fi+1}/${E.fr.length}：${F.t}${F.t2?' ／ '+F.t2:''}　—　${F.note}`;
}

function drawCase(st, ctx, w, h, ro){
  const E=CASE[st.i];
  const M=10, L=30, R=w-14, B=h-40, T=14;
  const cx=(L+R)/2;
  const X=v=>L+(v/M)*(R-L), Y=v=>B-(v/M)*(B-T);
  ctx.textAlign='center';
  const col = E.kind==='unique'?'#a6d6a0':(E.kind==='none'?'#eda0a8':'#98c9dc');
  ctx.fillStyle=col; ctx.font='bold 14px "Noto Sans TC"';
  ctx.fillText(`【${E.name}】${E.geo}`, w/2, 11);
  // 格線
  ctx.strokeStyle='rgba(243,239,226,.07)'; ctx.lineWidth=1;
  for(let g=0;g<=M;g+=2){ ctx.beginPath(); ctx.moveTo(X(g),T); ctx.lineTo(X(g),B); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(L,Y(g)); ctx.lineTo(R,Y(g)); ctx.stroke(); }
  ctx.strokeStyle='rgba(243,239,226,.5)'; ctx.lineWidth=1.4;
  ctx.beginPath(); ctx.moveTo(L,B); ctx.lineTo(R,B); ctx.moveTo(L,B); ctx.lineTo(L,T); ctx.stroke();
  // 畫兩條線 a x + b y = c → y = (c-ax)/b
  const drawLine=(a,b,c,color,lw,dash)=>{
    ctx.strokeStyle=color; ctx.lineWidth=lw;
    if(dash) ctx.setLineDash(dash); else ctx.setLineDash([]);
    ctx.beginPath(); let started=false;
    for(let i=0;i<=200;i++){ const x=i/200*M, y=(c-a*x)/b;
      if(y<0||y>M){ started=false; continue; }
      if(!started){ ctx.moveTo(X(x),Y(y)); started=true; } else ctx.lineTo(X(x),Y(y)); }
    ctx.stroke(); ctx.setLineDash([]);
  };
  drawLine(E.a1,E.b1,E.c1,'#eda0a8',2.2);
  if(E.kind==='inf'){
    // 重合：畫一條略粗、略偏的藍線疊上去
    drawLine(E.a2,E.b2,E.c2,'#98c9dc',2.2,[6,5]);
  } else {
    drawLine(E.a2,E.b2,E.c2,'#98c9dc',2.2);
  }
  // 交點
  if(E.kind==='unique'){
    ctx.beginPath(); ctx.arc(X(E.sx),Y(E.sy),6,0,7); ctx.fillStyle='#f2d979'; ctx.fill();
    ctx.strokeStyle='#16281c'; ctx.lineWidth=1.6; ctx.stroke();
    ctx.fillStyle='#f2d979'; ctx.font='bold 12px "Noto Serif TC"';
    ctx.fillText(`(${E.sx}, ${E.sy})`, X(E.sx)+30, Y(E.sy)-8);
  }
  // 底部：消去結果
  ctx.textAlign='left';
  ctx.fillStyle='#eda0a8'; ctx.font='12px "Noto Serif TC"'; ctx.fillText(E.e1, L, B+16);
  ctx.fillStyle='#98c9dc'; ctx.fillText(E.e2, L+w*0.32, B+16);
  ctx.fillStyle=col; ctx.font='bold 12px "Noto Sans TC"'; ctx.textAlign='center';
  ctx.fillText('消去 → ' + E.elim, w/2, B+34);
  ro.innerHTML = `【<b style="color:${col}">${E.name}</b>】<b>${E.e1}</b> 和 <b>${E.e2}</b>　｜　消去 → <b>${E.elim}</b>　｜　幾何：<b>${E.geo}</b>`;
}

function draw(si){
  const st=VIZ[si]; if(!st) return;
  const {cv,ctx,kind}=st, w=cv.width/DPR, h=cv.height/DPR;
  ctx.clearRect(0,0,w,h);
  const ro=document.getElementById('ro-'+si);
  if(kind==='pick') drawPick(st,ctx,w,h,ro);
  else if(kind==='elim') drawElim(st,ctx,w,h,ro);
  else if(kind==='case') drawCase(st,ctx,w,h,ro);
}

document.addEventListener('click', e=>{
  const btn=e.target.closest('[data-t]'); if(!btn) return;
  const si=+btn.dataset.si, st=VIZ[si]; if(!st) return;
  const t=btn.dataset.t;
  if(st.kind==='pick'){
    if(t==='rev') st.show=true;
    if(t==='next'){ st.i=(st.i+1)%PICK.length; st.show=false; }
    if(t==='prev'){ st.i=(st.i-1+PICK.length)%PICK.length; st.show=false; }
  } else if(st.kind==='elim'){
    if(t==='next') st.fi=Math.min(ELIM[st.ei].fr.length-1, st.fi+1);
    if(t==='rst')  st.fi=0;
    if(t==='swap'){ st.ei=(st.ei+1)%ELIM.length; st.fi=0; }
  } else {
    if(t==='next') st.i=(st.i+1)%CASE.length;
  }
  draw(si);
});

function resizeAll(){
  DPR = Math.min(2, window.devicePixelRatio||1);
  document.querySelectorAll('canvas.viz').forEach(cv=>{
    const w = cv.clientWidth || cv.parentElement.clientWidth;
    const h = (cv.dataset.viz==='pick') ? 190 : (cv.dataset.viz==='case' ? 210 : 178);
    cv.width=w*DPR; cv.height=h*DPR; cv.style.height=h+'px';
    cv.getContext('2d').setTransform(DPR,0,0,DPR,0,0);
  });
  Object.keys(VIZ).forEach(k=>draw(+k));
}
document.querySelectorAll('canvas.viz').forEach(initViz);
window.addEventListener('resize', resizeAll);
resizeAll();
</script>
<div class="hint">← → 鍵可翻頁　·　Canvas 用按鈕互動　·　支援平板觸控</div>
