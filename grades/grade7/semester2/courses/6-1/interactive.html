<script>
const GOALS = [
  '認識點線角與符號 ∠、⊥、∥',
  '會算補角、餘角、對頂角',
  '判斷常見圖形的對稱軸條數',
  '（整合）垂直與平分：中點、垂直平分線、角平分線、對稱軸',
  '線對稱性質、坐標對稱點、最短路徑、三視圖',
];

const DATA = [
{ key:'angle', viz:'angle', vizTitle:'補角餘角練習器 —— 揭曉某角的補角與餘角（6 題）',
  slides:[
    {eb:'細目① 特殊角對', h:'補角、餘角、對頂角', html:`
      <table class="tbl">
        <tr><th style="width:24%;">關係</th><th style="width:38%;">定義</th><th>口訣</th></tr>
        <tr><td class="hl-b">補角</td><td>兩角相加 = 180°</td><td class="hl">補足 180°（大）</td></tr>
        <tr><td class="hl-b">餘角</td><td>兩角相加 = 90°</td><td class="hl">餘下 90°（小）</td></tr>
        <tr><td class="hl-b">對頂角</td><td>相交時「相對」的角</td><td class="hl-g">相等</td></tr>
      </table>
      <div class="box r" style="text-align:center;">⚠️ 補角（180 大）、餘角（90 小）別搞混；對頂角是「相對」不是相鄰。</div>
      <div class="box g">👉 用下方 Canvas：先自己算補角、餘角，再揭曉。</div>`},
    {eb:'細目③ 垂直與平分', h:'整合：平分與垂直', html:`
      <table class="tbl">
        <tr><th style="width:32%;">概念</th><th>意義</th></tr>
        <tr><td class="hl-b">中點 M</td><td>把線段分成兩相等段</td></tr>
        <tr><td class="hl-b">垂直平分線</td><td>過中點 + 與線段垂直</td></tr>
        <tr><td class="hl-b">角平分線</td><td>把角分成兩相等角</td></tr>
        <tr><td class="hl-g">對稱軸</td><td>= 對稱點連線 AA′ 的垂直平分線</td></tr>
      </table>
      <div class="box y" style="text-align:center;">🔑 <span class="hl">對稱 → 連線 AA′ 被對稱軸垂直平分。</span></div>`},
    {eb:'例題 ★☆☆', h:'補角與餘角', html:`
      <div class="exq" data-a="2">
        <div class="exq-q"><span class="hl">Q</span>　∠A = 35°，它的補角是？</div>
        <button class="exo" data-i="0">55°</button>
        <button class="exo" data-i="1">65°</button>
        <button class="exo" data-i="2">145°</button>
        <button class="exo" data-i="3">325°</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st">補角 = 180° − 35° = 145°</div>
          <div class="st">(A) 55° 是餘角（90−35）。別把補角餘角搞混。</div>
          <div class="an">答：145°</div>
        </div>
      </div>`},
    {eb:'例題 ★★☆　角平分線', h:'多步驟角', html:`
      <div class="exq" data-a="1">
        <div class="exq-q"><span class="hl">Q</span>　∠AOB=120°，OC 平分 ∠AOB，OD 平分 ∠BOC，求 ∠AOD。</div>
        <button class="exo" data-i="0">60°</button>
        <button class="exo" data-i="1">90°</button>
        <button class="exo" data-i="2">30°</button>
        <button class="exo" data-i="3">45°</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st">∠AOC=∠BOC=60°；OD 平分 ∠BOC → ∠BOD=30°</div>
          <div class="st">∠AOD = 120° − 30° = 90°</div>
          <div class="an">答：90°</div>
        </div>
      </div>`}

{ key:'symc', viz:'symc', vizTitle:'坐標對稱點 —— 換點與軸，看對稱點怎麼變（6 題）',

    {eb:'細目② 對稱軸條數', h:'常見圖形', html:`

        <tr><td>正△</td><td class="hl">3</td><td>正 n 邊形</td><td class="hl">n</td></tr>

const G = {lv:0, score:0, streak:0, best:0, t:20, timer:null, cur:null, answered:false};
function gShow(id){ ['gStart','gPlay','gEnd'].forEach(x=>document.getElementById(x).classList.toggle('on', x===id)); }
function gChips(){
  document.getElementById('gChips').innerHTML = GAME.map((g,i)=>
    `<div class="lvchip ${i<G.lv?'done':i===G.lv?'now':''}">${i+1}. ${g.name}</div>`).join('');
}
function gLoad(){
  if(G.lv>=GAME.length){ gFinish(); return; }
  G.answered=false; G.t=20;
  const bank = GAME[G.lv].qs;
  G.cur = bank[Math.floor(Math.random()*bank.length)];
  document.getElementById('hLv').textContent = (G.lv+1)+'/'+GAME.length;
  document.getElementById('hSc').textContent = G.score;
  document.getElementById('hStk').textContent = G.streak;
  document.getElementById('gQ').innerHTML = `<span style="color:var(--blue);font-size:15px;">第 ${G.lv+1} 關 · ${GAME[G.lv].name}</span><br>${G.cur.q}`;
  document.getElementById('gO').innerHTML = G.cur.o.map((o,i)=>
    `<button class="gopt" data-g="${i}">${'ABCD'[i]}. ${o}</button>`).join('');
  document.getElementById('gFb').className='gfb';
  document.getElementById('gNext').style.display='none';
  gChips();
  clearInterval(G.timer);
  G.timer = setInterval(()=>{
    G.t -= 0.1;
    document.getElementById('hT').textContent = Math.max(0,G.t).toFixed(0);
    document.getElementById('tFill').style.width = Math.max(0,G.t/20*100)+'%';
    if(G.t<=0){ clearInterval(G.timer); gAnswer(-1); }
  },100);
}
function gAnswer(pick){
  if(G.answered) return;
  G.answered = true; clearInterval(G.timer);
  const ans = G.cur.a, ok = pick===ans;
  document.querySelectorAll('.gopt').forEach((b,i)=>{
    b.disabled=true;
    if(i===ans) b.classList.add('right'); else if(i===pick) b.classList.add('wrong');
  });
  let gain=0, sb=0, tb=0;
  if(ok){
    G.streak++; G.best=Math.max(G.best,G.streak);
    sb = Math.min(5, G.streak-1); tb = Math.min(5, Math.floor(G.t/4));
    gain = 10+sb+tb; G.score += gain;
  } else { G.streak = 0; }
  document.getElementById('hSc').textContent = G.score;
  document.getElementById('hStk').textContent = G.streak;
  const fb = document.getElementById('gFb');
  fb.className = 'gfb on '+(ok?'ok':'no');
  fb.innerHTML = (ok? `✅ <b>答對！+${gain} 分</b>（基礎10 + 連擊${sb} + 速度${tb}）<br>`
                    : (pick===-1?'⏰ <b>時間到！</b><br>':'❌ <b>答錯了</b><br>')) + G.cur.e;
  document.getElementById('gNext').style.display='inline-block';
  document.getElementById('gNext').textContent = (G.lv>=GAME.length-1)?'看成績 🏁':'下一關 ▶';
}
function gFinish(){
  clearInterval(G.timer);
  const max = GAME.length*20, pct = Math.round(G.score/max*100);
  const rank = pct>=85?['🏆','數論大師']:pct>=70?['🥇','高手']:pct>=50?['🥈','不錯']:['📖','再加油'];
  document.getElementById('gRank').textContent = rank[0];
  document.getElementById('gFinal').innerHTML = `<b class="hl">${G.score}</b> / ${max} 分　·　${rank[1]}`;
  document.getElementById('gStats').innerHTML = `最高連擊 <b class="hl">${G.best}</b>　·　完成 ${GAME.length} 關`;
  gShow('gEnd');
}

document.getElementById('gAgain').addEventListener('click', ()=>{ G.lv=0;G.score=0;G.streak=0;G.best=0; gShow('gPlay'); gLoad(); });

/* ===== Canvas ===== */
const VIZ = {}; let DPR=1;

/* ① 補角餘角 */
const ANGLE=[
  {deg:35}, {deg:50}, {deg:20}, {deg:72}, {deg:15}, {deg:64},
];
/* ② 坐標對稱點 */
const SYMC=[
  {p:[3,5], axis:'x軸', r:[3,-5], rule:'y 取反'},
  {p:[3,5], axis:'y軸', r:[-3,5], rule:'x 取反'},
  {p:[3,5], axis:'原點', r:[-3,-5], rule:'都取反'},
  {p:[-4,2], axis:'x軸', r:[-4,-2], rule:'y 取反'},
  {p:[-4,2], axis:'y軸', r:[4,2], rule:'x 取反'},
  {p:[2,-3], axis:'y=x', r:[-3,2], rule:'x、y 互換'},
];
/* ③ 三視圖 */
const SOLID=[
  {name:'正方體', f:'正方形', s:'正方形', t:'正方形', icon:'cube'},
  {name:'圓柱（直立）', f:'長方形', s:'長方形', t:'圓形', icon:'cyl'},
  {name:'圓錐', f:'等腰三角形', s:'等腰三角形', t:'圓+中心點', icon:'cone'},
  {name:'四角錐', f:'等腰三角形', s:'等腰三角形', t:'正方形+對角線', icon:'pyr'},
  {name:'球', f:'圓形', s:'圓形', t:'圓形', icon:'ball'},
];

function initViz(cv){
  const si=+cv.dataset.si, kind=cv.dataset.viz;
  const ctx=cv.getContext('2d');
  const st=VIZ[si]={kind,cv,ctx};
  const ctrl=document.querySelector(`[data-ctrl="${si}"]`);
  const revLabel = kind==='angle' ? '🔍 揭曉補角＆餘角'
                 : kind==='symc' ? '🔍 揭曉對稱點' : '🔍 揭曉三視圖';
  st.i=0; st.show=false;
  ctrl.innerHTML=`<div class="readout" id="ro-${si}"></div>
    <button class="btn" data-t="rev" data-si="${si}" style="background:rgba(242,217,121,.2);border-color:var(--yellow);color:var(--yellow);font-weight:700;">${revLabel}</button>
    <button class="btn" data-t="next" data-si="${si}">下一題 ▶</button>`;
  draw(si);
}

function drawAngle(st, ctx, w, h, ro){
  const E=ANGLE[st.i], deg=E.deg;
  const comp=90-deg, supp=180-deg;
  ctx.textAlign='center';
  ctx.fillStyle='rgba(242,217,121,.85)'; ctx.font='bold 13px "Noto Sans TC"';
  ctx.fillText(`第 ${st.i+1} / ${ANGLE.length} 題　·　∠A = ${deg}°`, w/2, 16);
  // 畫角
  const ox=w/2, oy=h-34, R=54;
  const a=deg*Math.PI/180;
  ctx.strokeStyle='rgba(243,239,226,.85)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(ox,oy); ctx.lineTo(ox+R*1.5,oy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox,oy); ctx.lineTo(ox+R*1.5*Math.cos(a), oy-R*1.5*Math.sin(a)); ctx.stroke();
  ctx.strokeStyle='#98c9dc'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.arc(ox,oy,R,0,-a,true); ctx.stroke();
  ctx.fillStyle='#98c9dc'; ctx.font='bold 13px "Noto Serif TC"';
  ctx.fillText(deg+'°', ox+R*0.75*Math.cos(a/2), oy-R*0.75*Math.sin(a/2)-4);
  if(!st.show){
    ctx.fillStyle='rgba(243,239,226,.4)'; ctx.font='13px "Noto Sans TC"';
    ctx.fillText('🔒 餘角 = 90 − A，補角 = 180 − A', w/2, 42);
  } else {
    ctx.fillStyle='#a6d6a0'; ctx.font='bold 16px "Noto Serif TC"';
    ctx.fillText(`餘角 = 90 − ${deg} = ${comp}°`, w/2, 42);
    ctx.fillStyle='#eda0a8';
    ctx.fillText(`補角 = 180 − ${deg} = ${supp}°`, w/2, 66);
  }
  ro.innerHTML = st.show
    ? `∠A = ${deg}°　→　餘角 <b style="color:var(--green)">${comp}°</b>、補角 <b style="color:var(--pink)">${supp}°</b>`
    : `∠A = ${deg}°　<span style="color:rgba(243,239,226,.5)">—— 餘角 90−A？補角 180−A？</span>`;
}

function grid(ctx, ox, oy, u){
  ctx.strokeStyle='rgba(243,239,226,.15)'; ctx.lineWidth=1;
  for(let k=-6;k<=6;k++){
    ctx.beginPath(); ctx.moveTo(ox+k*u, oy-6*u); ctx.lineTo(ox+k*u, oy+6*u); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ox-6*u, oy+k*u); ctx.lineTo(ox+6*u, oy+k*u); ctx.stroke();
  }
  ctx.strokeStyle='rgba(243,239,226,.55)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(ox-6*u, oy); ctx.lineTo(ox+6*u, oy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ox, oy-6*u); ctx.lineTo(ox, oy+6*u); ctx.stroke();
}
function drawSymc(st, ctx, w, h, ro){
  const E=SYMC[st.i];
  ctx.textAlign='center';
  ctx.fillStyle='rgba(242,217,121,.85)'; ctx.font='bold 13px "Noto Sans TC"';
  ctx.fillText(`點 (${E.p[0]}, ${E.p[1]}) 關於 ${E.axis} 對稱`, w/2, 15);
  const ox=w/2, oy=h/2+6, u=Math.min((w-40)/12, (h-40)/12);
  grid(ctx, ox, oy, u);
  // 對稱軸強調
  ctx.strokeStyle='#f2d979'; ctx.lineWidth=2; ctx.setLineDash([5,4]);
  if(E.axis==='x軸'){ ctx.beginPath(); ctx.moveTo(ox-6*u,oy); ctx.lineTo(ox+6*u,oy); ctx.stroke(); }
  else if(E.axis==='y軸'){ ctx.beginPath(); ctx.moveTo(ox,oy-6*u); ctx.lineTo(ox,oy+6*u); ctx.stroke(); }
  else if(E.axis==='y=x'){ ctx.beginPath(); ctx.moveTo(ox-6*u,oy+6*u); ctx.lineTo(ox+6*u,oy-6*u); ctx.stroke(); }
  ctx.setLineDash([]);
  const P=(px,py)=>[ox+px*u, oy-py*u];
  const [ax,ay]=P(E.p[0],E.p[1]);
  ctx.fillStyle='#98c9dc'; ctx.beginPath(); ctx.arc(ax,ay,4.5,0,7); ctx.fill();
  ctx.fillStyle='#98c9dc'; ctx.font='11px "Noto Serif TC"'; ctx.fillText(`(${E.p[0]},${E.p[1]})`, ax, ay-9);
  if(st.show){
    const [rx,ry]=P(E.r[0],E.r[1]);
    ctx.strokeStyle='rgba(243,239,226,.4)'; ctx.lineWidth=1; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(rx,ry); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle='#a6d6a0'; ctx.beginPath(); ctx.arc(rx,ry,4.5,0,7); ctx.fill();
    ctx.fillStyle='#a6d6a0'; ctx.fillText(`(${E.r[0]},${E.r[1]})`, rx, ry-9);
  } else {
    ctx.fillStyle='rgba(243,239,226,.4)'; ctx.font='12px "Noto Sans TC"';
    ctx.fillText('🔒 ' + E.rule + '？', w/2, h-8);
  }
  ro.innerHTML = st.show
    ? `(${E.p[0]}, ${E.p[1]}) 關於 ${E.axis}（${E.rule}）→ <b style="color:var(--green)">(${E.r[0]}, ${E.r[1]})</b>`
    : `關於 ${E.axis}對稱　<span style="color:rgba(243,239,226,.5)">—— ${E.rule}？</span>`;
}

function solidIcon(ctx, cx, cy, kind, col){
  ctx.strokeStyle=col; ctx.lineWidth=2; ctx.fillStyle='rgba(152,201,220,.15)';
  if(kind==='cube'){ ctx.strokeRect(cx-22,cy-18,36,36);
    ctx.beginPath(); ctx.moveTo(cx-22,cy-18); ctx.lineTo(cx-10,cy-30); ctx.lineTo(cx+26,cy-30); ctx.lineTo(cx+14,cy-18);
    ctx.moveTo(cx+14,cy+18); ctx.lineTo(cx+26,cy+6); ctx.lineTo(cx+26,cy-30); ctx.stroke(); }
  else if(kind==='cyl'){ ctx.beginPath(); ctx.ellipse(cx,cy-20,20,7,0,0,7); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-20,cy-20); ctx.lineTo(cx-20,cy+18); ctx.moveTo(cx+20,cy-20); ctx.lineTo(cx+20,cy+18); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(cx,cy+18,20,7,0,0,Math.PI); ctx.stroke(); }
  else if(kind==='cone'){ ctx.beginPath(); ctx.moveTo(cx,cy-24); ctx.lineTo(cx-22,cy+18); ctx.lineTo(cx+22,cy+18); ctx.closePath(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(cx,cy+18,22,7,0,0,7); ctx.stroke(); }
  else if(kind==='pyr'){ ctx.beginPath(); ctx.moveTo(cx,cy-24); ctx.lineTo(cx-24,cy+16); ctx.lineTo(cx+8,cy+22); ctx.lineTo(cx+24,cy+6); ctx.closePath(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,cy-24); ctx.lineTo(cx+8,cy+22); ctx.stroke(); }
  else if(kind==='ball'){ ctx.beginPath(); ctx.arc(cx,cy,22,0,7); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(cx,cy,22,7,0,0,7); ctx.stroke(); }
}
function drawView(st, ctx, w, h, ro){
  const E=SOLID[st.i];
  ctx.textAlign='center';
  ctx.fillStyle='rgba(242,217,121,.85)'; ctx.font='bold 14px "Noto Sans TC"';
  ctx.fillText(`第 ${st.i+1} / ${SOLID.length} 題　·　${E.name}`, w/2, 18);
  solidIcon(ctx, w/2, 62, E.icon, '#98c9dc');
  if(!st.show){
    ctx.fillStyle='rgba(243,239,226,.4)'; ctx.font='13px "Noto Sans TC"';
    ctx.fillText('🔒 想想正視、側視、俯視各是什麼形狀', w/2, h-14);
  } else {
    ctx.font='13px "Noto Sans TC"';
    ctx.fillStyle='#98c9dc'; ctx.fillText('正視：' + E.f, w*0.22, h-16);
    ctx.fillStyle='#a6d6a0'; ctx.fillText('側視：' + E.s, w*0.5, h-16);
    ctx.fillStyle='#f2d979'; ctx.fillText('俯視：' + E.t, w*0.8, h-16);
  }
  ro.innerHTML = st.show
    ? `<b>${E.name}</b>　正視 <b style="color:var(--blue)">${E.f}</b>、側視 <b style="color:var(--green)">${E.s}</b>、俯視 <b style="color:var(--yellow)">${E.t}</b>`
    : `<b>${E.name}</b>　<span style="color:rgba(243,239,226,.5)">—— 正 / 側 / 俯視各是什麼形狀？</span>`;
}

function draw(si){
  const st=VIZ[si]; if(!st) return;
  const {cv,ctx,kind}=st, w=cv.width/DPR, h=cv.height/DPR;
  ctx.clearRect(0,0,w,h);
  const ro=document.getElementById('ro-'+si);
  if(kind==='angle') drawAngle(st,ctx,w,h,ro);
  else if(kind==='symc') drawSymc(st,ctx,w,h,ro);
  else if(kind==='view') drawView(st,ctx,w,h,ro);
}

document.addEventListener('click', e=>{
  const btn=e.target.closest('[data-t]'); if(!btn) return;
  const si=+btn.dataset.si, st=VIZ[si]; if(!st) return;
  const t=btn.dataset.t;
  const arr = st.kind==='angle'?ANGLE : st.kind==='symc'?SYMC : SOLID;
  if(t==='rev') st.show=true;
  if(t==='next'){ st.i=(st.i+1)%arr.length; st.show=false; }
  draw(si);
});

function resizeAll(){
  DPR = Math.min(2, window.devicePixelRatio||1);
  document.querySelectorAll('canvas.viz').forEach(cv=>{
    const w = cv.clientWidth || cv.parentElement.clientWidth;
    const h = (cv.dataset.viz==='symc') ? 182 : (cv.dataset.viz==='view' ? 176 : 176);
    cv.width=w*DPR; cv.height=h*DPR; cv.style.height=h+'px';
    cv.getContext('2d').setTransform(DPR,0,0,DPR,0,0);
  });
  Object.keys(VIZ).forEach(k=>draw(+k));
}
document.querySelectorAll('canvas.viz').forEach(initViz);
window.addEventListener('resize', resizeAll);
resizeAll();
</script>
