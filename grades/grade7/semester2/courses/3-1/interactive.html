.opts{display:flex;flex-direction:column;gap:7px;}
.opt{text-align:left;background:rgba(243,239,226,0.06);border:1.5px solid rgba(243,239,226,0.22);

.opt:hover:not(:disabled){background:rgba(243,239,226,0.13);}

.fb{display:none;margin-top:9px;padding:9px 13px;border-radius:8px;font-size:14.5px;line-height:1.65;}
.fb.on{display:block;}

.fb.no{background:rgba(237,160,168,0.14);border-left:3px solid var(--pink);}

.fill:focus{outline:none;background:rgba(242,217,121,0.12);}

.exq::before{content:'';position:absolute;top:-8px;left:32px;width:54px;height:14px;background:rgba(242,217,121,0.4);border-radius:2px;transform:rotate(-3deg);}

.exo{text-align:left;background:rgba(243,239,226,0.06);border:1.5px solid rgba(243,239,226,0.22);
  color:var(--chalk);border-radius:9px;padding:9px 13px;font-family:inherit;font-size:clamp(14px,1.8vw,15.5px);
  cursor:pointer;transition:.15s;line-height:1.55;width:100%;margin-bottom:6px;display:block;}
.exo:hover:not(:disabled){background:rgba(243,239,226,0.13);}
.exo.right{background:rgba(166,214,160,0.26);border-color:var(--green);color:#fff;font-weight:700;}
.exo.wrong{background:rgba(237,160,168,0.2);border-color:var(--pink);opacity:.75;}

.exo.shake{animation:shake .4s;}
.exsol{display:none;margin-top:10px;padding:11px 14px;border-radius:9px;
  background:rgba(166,214,160,0.13);border-left:3px solid var(--green);font-size:clamp(14px,1.8vw,15.5px);line-height:1.75;}
.exsol.on{display:block;animation:fade .3s;}
.exsol .st{color:var(--soft);margin:3px 0;}
.exsol .an{color:var(--green);font-weight:700;margin-top:6px;}

.exlock.hide{display:none;}
.info{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:11px;}

.icard .big{font-family:'Noto Serif TC',serif;font-size:clamp(17px,2.6vw,23px);font-weight:900;margin:6px 0;}
.icard .cap{font-size:13.5px;color:var(--soft);line-height:1.6;}
.frow{display:flex;gap:12px;align-items:center;padding:9px 12px;border-bottom:1px dashed rgba(243,239,226,0.16);}

.hud{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:12px;}

.hud .st b{display:block;font-family:'Noto Serif TC',serif;font-size:20px;color:var(--yellow);}

.gq{font-size:clamp(16px,2.2vw,20px);line-height:1.7;margin:14px 0;text-align:center;font-family:'Noto Serif TC',serif;}
.gopts{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
@media(max-width:560px){.gopts{grid-template-columns:1fr;}}
.gopt{background:rgba(243,239,226,0.07);border:1.5px solid rgba(243,239,226,0.25);color:var(--chalk);
  border-radius:10px;padding:12px;font-family:'Noto Serif TC',serif;font-size:17px;cursor:pointer;transition:.15s;min-height:48px;}
.gopt:hover:not(:disabled){background:rgba(243,239,226,0.15);}
.gopt.right{background:rgba(166,214,160,0.3);border-color:var(--green);font-weight:900;}
.gopt.wrong{background:rgba(237,160,168,0.25);border-color:var(--pink);}
.gfb{margin-top:11px;padding:10px 13px;border-radius:8px;font-size:14.5px;line-height:1.6;display:none;}
.gfb.on{display:block;}
.gfb.ok{background:rgba(166,214,160,0.15);border-left:3px solid var(--green);}
.gfb.no{background:rgba(237,160,168,0.15);border-left:3px solid var(--pink);}
.rank{font-size:54px;text-align:center;margin:10px 0;}

</style></head><body>

<div class="tabs" id="tabs">

</div>

<div class="wrap">
  <div class="card" id="goalCard">
    <h3><span class="ic">🎯</span>本節學習目標</h3>
    <div class="goals" id="goals"></div>
  </div>
  <div id="wrap"></div>
</div>

<script>
const GOALS = [
  '能說出比與比值的定義並理解關係',
  '能化簡比（整數、分數、小數、負數）',
  '能處理連比與按比例分配',
  '理解比例式與「內積=外積」性質',
  '能解比例式、等比中項',
  '能應用在比例尺（含面積比例尺）',
];

const DATA = [
{ key:'simp', viz:'simp', vizTitle:'化簡比 —— 先自己算 GCD，再按「化簡」（6 題含負數）',
  slides:[
    {eb:'細目 ① ⚠️', h:'比 vs 比值：兩者不同！', html:`
      <table class="tbl">
        <tr><th style="width:20%;">　</th><th style="width:40%;">是什麼</th><th>例</th></tr>
        <tr><td class="hl-b"><b>比</b></td><td>兩個數的<b>關係</b> a:b</td><td class="fm" style="font-size:18px;">3 : 4</td></tr>
        <tr><td class="hl-g"><b>比值</b></td><td><b>一個數</b>（a÷b）</td><td class="fm" style="font-size:18px;">3/4</td></tr>
      </table>
      <div class="box r" style="text-align:center;">⚠️ 別把 <span class="fm">3:4</span> 說成「比值」，也別把 <span class="fm">3/4</span> 說成「一個比」。</div>
      <div class="box y"><b>等值的比：</b>不同的比、相同的比值。<span class="fm">3:4</span> 和 <span class="fm">6:8</span> 的比值都是 <span class="fm">3/4</span>。</div>`},
    {eb:'細目 ①', h:'四種比的化簡法', html:`
      <table class="tbl">
        <tr><th style="width:22%;">類型</th><th style="width:32%;">方法</th><th>例</th></tr>
        <tr><td class="hl-b">整數</td><td>同除 <b>GCD</b></td><td class="fm">36:48 → 3:4</td></tr>
        <tr><td class="hl-b">分數</td><td>同乘分母 <b>LCM</b></td><td class="fm">1/2:3/4 → 2:3</td></tr>
        <tr><td class="hl-b">小數</td><td>同乘 <b>10 次方</b></td><td class="fm">0.6:1.5 → 2:5</td></tr>
        <tr><td class="hl-r">負數</td><td><b>負號別弄丟</b></td><td class="fm">(−8):6 → (−4):3</td></tr>
      </table>
      <div class="box r" style="text-align:center;">⚠️ <span class="fm">(−6):4</span> 化簡成 <span class="fm hl-r">3:2</span>（少負號）→ 正確 <span class="fm hl-g">(−3):2</span></div>`},
    {eb:'例題 ★★☆', h:'化整數比', html:`
      <div class="exq" data-a="1">
        <div class="exq-q"><span class="hl">Q</span>　0.6 : 1.5 化為最簡整數比是？</div>
        <button class="exo" data-i="0">6 : 15</button>
        <button class="exo" data-i="1">2 : 5</button>
        <button class="exo" data-i="2">3 : 5</button>
        <button class="exo" data-i="3">1 : 2.5</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st fm">×10 消小數：6 : 15</div>
          <div class="st fm">GCD(6,15)=3，÷3 → 2 : 5</div>
          <div class="st">(A) 6:15 還沒化到最簡；(D) 1:2.5 還有小數，不是整數比。</div>
          <div class="an">答：2 : 5</div>
        </div>
      </div>`},
    {eb:'例題 ★★☆', h:'負數比', html:`
      <div class="exq" data-a="2">
        <div class="exq-q"><span class="hl">Q</span>　(−10) : 15 化簡後，比值是？</div>
        <button class="exo" data-i="0">2/3</button>
        <button class="exo" data-i="1">−3/2</button>
        <button class="exo" data-i="2">−2/3</button>
        <button class="exo" data-i="3">3/2</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st fm">GCD(10,15)=5，÷5 → (−2) : 3</div>
          <div class="st fm">比值 = −2 ÷ 3 = −2/3</div>
          <div class="st">(A) 2/3 是<b>把負號弄丟了</b> —— 這裡最多人錯。</div>
          <div class="an">答：−2/3</div>
        </div>
      </div>`}
  ],
  fa:[
    {q:'比和比值的差別？', o:['一樣','比是 a:b、比值是 a÷b','比值有兩個數','比是一個數'], a:1, e:'比是關係、比值是一個數。'},
    {q:'化簡整數比用什麼？', o:['GCD','LCM','平方','相加'], a:0, e:'同除以 GCD。'},
    {q:'(−8):6 化簡？', o:['4:3','(−4):3','(−3):4','8:6'], a:1, e:'÷2 → (−4):3，負號保留。'}
  ],
  info:[
    {big:'比 ≠ 比值', cap:'a:b vs a÷b', c:'var(--blue)'},
    {big:'同除 GCD', cap:'化簡整數比', c:'var(--green)'},
    {big:'負號別弄丟', cap:'(−8):6→(−4):3', c:'var(--pink)'}
  ]
},
{ key:'alloc', viz:'alloc', vizTitle:'按比例分配 —— 換一組比，看長條怎麼依份數切、每份多少',
  slides:[
    {eb:'細目 ①　連比', h:'按比例分配：用「份數」', html:`

function gAnswer(pick){
  if(G.answered) return;
  G.answered = true; clearInterval(G.timer);
  const ans = G.cur.a, ok = pick===ans;
  document.querySelectorAll('.gopt').forEach((b,i)=>{
    b.disabled=true;
    if(i===ans) b.classList.add('right'); else if(i===pick) b.classList.add('wrong');
  });
  let gain=0, sb=0, tb=0;
  if(ok){
    G.streak++; G.best=Math.max(G.best,G.streak);
    sb = Math.min(5, G.streak-1); tb = Math.min(5, Math.floor(G.t/4));
    gain = 10+sb+tb; G.score += gain;
  } else { G.streak = 0; }
  document.getElementById('hSc').textContent = G.score;
  document.getElementById('hStk').textContent = G.streak;
  const fb = document.getElementById('gFb');
  fb.className = 'gfb on '+(ok?'ok':'no');

                    : (pick===-1?'⏰ <b>時間到！</b><br>':'❌ <b>答錯了</b><br>')) + G.cur.e;

  document.getElementById('gNext').textContent = (G.lv>=GAME.length-1)?'看成績 🏁':'下一關 ▶';
}
function gFinish(){

}

/* ===== Canvas ===== */
const VIZ = {}; let DPR=1;
function gcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){ [a,b]=[b,a%b]; } return a||1; }

/* ① 化簡比 */
const RATIO=[
  {a:36, b:48, s:'36 : 48'},
  {a:24, b:40, s:'24 : 40'},
  {a:-8, b:6,  s:'(−8) : 6'},
  {a:-10,b:15, s:'(−10) : 15'},
  {a:15, b:9,  s:'15 : 9'},
  {a:50, b:75, s:'50 : 75'},
];
/* ② 按比例分配（連比分配長條）*/
const ALLOC=[
  {parts:[2,3,5], total:500, unit:'克', name:['A','B','C']},
  {parts:[5,6,7], total:540, unit:'cm', name:['甲','乙','丙']},
  {parts:[1,2,3], total:720, unit:'元', name:['甲','乙','丙']},
  {parts:[5,3,2], total:400, unit:'kg', name:['天然','合成','碳黑']},
];
/* ③ 比例式解題 */
const PROP=[
  {a:'x', b:6, c:4, d:8, x:3, s:'x : 6 = 4 : 8', calc:'6×4 = 8x → 24 = 8x → x = 3'},
  {a:5, b:'x', c:3, d:12, x:20, s:'5 : x = 3 : 12', calc:'5×12 = 3x → 60 = 3x → x = 20'},
  {a:3, b:'x', c:'x', d:12, x:6, s:'3 : x = x : 12', calc:'x² = 3×12 = 36 → x = 6（或 −6）', mid:true},
  {a:2, b:3, c:8, d:'x', x:12, s:'2 : 3 = 8 : x', calc:'2x = 3×8 = 24 → x = 12'},
];

function initViz(cv){
  const si=+cv.dataset.si, kind=cv.dataset.viz;
  const ctx=cv.getContext('2d');
  const st=VIZ[si]={kind,cv,ctx};
  const ctrl=document.querySelector(`[data-ctrl="${si}"]`);
  if(kind==='simp'){
    st.i=0; st.show=false;
    ctrl.innerHTML=`<div class="readout" id="ro-${si}"></div>
      <button class="btn" data-t="rev" data-si="${si}" style="background:rgba(242,217,121,.2);border-color:var(--yellow);color:var(--yellow);font-weight:700;">🔍 化簡</button>
      <button class="btn" data-t="next" data-si="${si}">下一題 ▶</button>`;
  } else if(kind==='alloc'){
    st.i=0;
    ctrl.innerHTML=`<div class="readout" id="ro-${si}"></div>
      <button class="btn" data-t="next" data-si="${si}" style="background:rgba(242,217,121,.2);border-color:var(--yellow);color:var(--yellow);font-weight:700;">🔀 換一組比</button>`;
  } else {
    st.i=0; st.show=false;
    ctrl.innerHTML=`<div class="readout" id="ro-${si}"></div>
      <button class="btn" data-t="rev" data-si="${si}" style="background:rgba(242,217,121,.2);border-color:var(--yellow);color:var(--yellow);font-weight:700;">🔍 解出 x</button>
      <button class="btn" data-t="next" data-si="${si}">下一題 ▶</button>`;
  }
  draw(si);
}
function wrapT(ctx, txt, cx, y, maxw, lh){
  let line='', ly=y;
  for(const ch of txt){ if(ctx.measureText(line+ch).width>maxw){ ctx.fillText(line,cx,ly); line=ch; ly+=lh; } else line+=ch; }
  ctx.fillText(line,cx,ly); return ly;
}

function drawSimp(st, ctx, w, h, ro){
  const E=RATIO[st.i], g=gcd(E.a,E.b);
  const sa=E.a/g, sb=E.b/g;
  ctx.textAlign='center';
  ctx.fillStyle='rgba(242,217,121,.85)'; ctx.font='bold 13px "Noto Sans TC"';
  ctx.fillText(`第 ${st.i+1} / ${RATIO.length} 題　·　化為最簡整數比`, w/2, 16);
  ctx.fillStyle='#f3efe2'; ctx.font='bold 30px "Noto Serif TC"';
  ctx.fillText(E.s, w/2, 58);
  if(!st.show){
    ctx.fillStyle='rgba(243,239,226,.4)'; ctx.font='13px "Noto Sans TC"';
    ctx.fillText('🔒 先自己算 GCD 化簡，再按「化簡」', w/2, 92);
    ctx.fillText('提示：同除以 GCD（負號要保留！）', w/2, 114);
  } else {
    ctx.fillStyle='rgba(243,239,226,.75)'; ctx.font='14px "Noto Sans TC"';
    ctx.fillText(`GCD(${Math.abs(E.a)}, ${Math.abs(E.b)}) = ${g}　→　同除以 ${g}`, w/2, 88);
    ctx.fillStyle='#a6d6a0'; ctx.font='bold 24px "Noto Serif TC"';
    const simp = (E.a<0?'(−'+Math.abs(sa)+')':sa) + ' : ' + sb;
    ctx.fillText(simp, w/2, 122);
    ctx.fillStyle='#f2d979'; ctx.font='14px "Noto Serif TC"';
    ctx.fillText(`比值 = ${sa}/${sb}${E.a<0?'（負）':''}`, w/2, 150);
  }
  ro.innerHTML = st.show
    ? `<b>${E.s}</b>　→　GCD = ${g}　→　最簡比 <b style="color:var(--green)">${(E.a<0?'(−'+Math.abs(sa)+')':sa)} : ${sb}</b>　｜　比值 <b>${sa}/${sb}</b>`
    : `<b>${E.s}</b>　<span style="color:rgba(243,239,226,.5)">—— 先自己算 GCD 化簡，再按「化簡」驗證</span>`;
}

function drawAlloc(st, ctx, w, h, ro){
  const E=ALLOC[st.i], sum=E.parts.reduce((a,b)=>a+b,0), per=E.total/sum;
  ctx.textAlign='center';
  ctx.fillStyle='rgba(242,217,121,.85)'; ctx.font='bold 13px "Noto Sans TC"';
  ctx.fillText(`${E.name.join(':')} = ${E.parts.join(':')}　·　總量 ${E.total} ${E.unit}`, w/2, 16);
  ctx.fillStyle='rgba(243,239,226,.6)'; ctx.font='12px "Noto Sans TC"';
  ctx.fillText(`總份數 ${E.parts.join('+')} = ${sum} → 每份 ${E.total}÷${sum} = ${per% 1===0?per:per.toFixed(1)} ${E.unit}`, w/2, 34);
  // 長條
  const L=30, R=w-30, BW=R-L, by=52, bh=30;
  const cols=['#98c9dc','#a6d6a0','#eda0a8','#c9aee0'];
  let x=L;
  E.parts.forEach((p,i)=>{
    const pw=BW*p/sum;
    ctx.fillStyle=cols[i].replace(')',',.4)').replace('#98c9dc','rgba(152,201,220').replace('#a6d6a0','rgba(166,214,160').replace('#eda0a8','rgba(237,160,168').replace('#c9aee0','rgba(201,174,224');
    ctx.fillRect(x, by, pw, bh);
    ctx.strokeStyle=cols[i]; ctx.lineWidth=1.5; ctx.strokeRect(x, by, pw, bh);
    ctx.fillStyle=cols[i]; ctx.font='bold 12px "Noto Sans TC"';
    ctx.fillText(`${E.name[i]} ${p}份`, x+pw/2, by-5);
    const val=p*per;
    ctx.fillStyle='#f3efe2'; ctx.font='bold 13px "Noto Serif TC"';
    ctx.fillText(`${val%1===0?val:val.toFixed(1)}`, x+pw/2, by+20);
    x+=pw;
  });
  // 各項數值
  ctx.fillStyle='rgba(243,239,226,.75)'; ctx.font='13px "Noto Serif TC"';
  const vals=E.parts.map((p,i)=>`${E.name[i]} ${(p*per)%1===0?p*per:(p*per).toFixed(1)}`).join('　');
  ctx.fillText(vals + ' ' + E.unit, w/2, by+bh+26);
  ro.innerHTML = `${E.name.join(':')} = ${E.parts.join(':')}，共 ${E.total}${E.unit}　→　每份 <b>${per%1===0?per:per.toFixed(1)}${E.unit}</b>　→　${vals} ${E.unit}`;
}

function drawProp(st, ctx, w, h, ro){
  const E=PROP[st.i];
  ctx.textAlign='center';
  ctx.fillStyle='rgba(242,217,121,.85)'; ctx.font='bold 13px "Noto Sans TC"';
  ctx.fillText(`第 ${st.i+1} / ${PROP.length} 題　·　解比例式（內積=外積）`, w/2, 16);
  ctx.fillStyle='#f3efe2'; ctx.font='bold 28px "Noto Serif TC"';
  ctx.fillText(E.s, w/2, 54);
  // 外項內項弧線
  ctx.font='bold 28px "Noto Serif TC"';
  const tw=ctx.measureText(E.s).width, sx=w/2-tw/2;
  ctx.strokeStyle='rgba(237,160,168,.7)'; ctx.lineWidth=1.6;
  ctx.beginPath(); ctx.moveTo(sx+6, 40); ctx.quadraticCurveTo(w/2, 22, sx+tw-6, 40); ctx.stroke();
  ctx.fillStyle='#eda0a8'; ctx.font='11px "Caveat"'; ctx.fillText('外項', w/2, 28);
  if(!st.show){
    ctx.fillStyle='rgba(243,239,226,.4)'; ctx.font='13px "Noto Sans TC"';
    ctx.fillText('🔒 先自己用「內積=外積」算，再按「解出 x」', w/2, 92);
    ctx.fillText('外外相乘 = 內內相乘', w/2, 114);
  } else {
    ctx.fillStyle='rgba(243,239,226,.78)'; ctx.font='14px "Noto Sans TC"';
    wrapT(ctx, E.calc, w/2, 90, w-36, 20);
    ctx.fillStyle='#a6d6a0'; ctx.font='bold 22px "Noto Serif TC"';
    ctx.fillText('x = ' + E.x + (E.mid?'（或 −'+E.x+'）':''), w/2, 138);
  }
  ro.innerHTML = st.show
    ? `<b>${E.s}</b>　→　${E.calc}　→　<b style="color:var(--green)">x = ${E.x}${E.mid?'（或 −'+E.x+'）':''}</b>`
    : `<b>${E.s}</b>　<span style="color:rgba(243,239,226,.5)">—— 先用「內積=外積」自己算，再按「解出 x」</span>`;
}

function draw(si){
  const st=VIZ[si]; if(!st) return;
  const {cv,ctx,kind}=st, w=cv.width/DPR, h=cv.height/DPR;
  ctx.clearRect(0,0,w,h);
  const ro=document.getElementById('ro-'+si);
  if(kind==='simp') drawSimp(st,ctx,w,h,ro);
  else if(kind==='alloc') drawAlloc(st,ctx,w,h,ro);
  else if(kind==='prop') drawProp(st,ctx,w,h,ro);
}

document.addEventListener('click', e=>{
  const btn=e.target.closest('[data-t]'); if(!btn) return;
  const si=+btn.dataset.si, st=VIZ[si]; if(!st) return;
  const t=btn.dataset.t;
  if(st.kind==='simp'){
    if(t==='rev') st.show=true;
    if(t==='next'){ st.i=(st.i+1)%RATIO.length; st.show=false; }
  } else if(st.kind==='alloc'){
    if(t==='next') st.i=(st.i+1)%ALLOC.length;
  } else {
    if(t==='rev') st.show=true;
    if(t==='next'){ st.i=(st.i+1)%PROP.length; st.show=false; }
  }
  draw(si);
});

function resizeAll(){
  DPR = Math.min(2, window.devicePixelRatio||1);
  document.querySelectorAll('canvas.viz').forEach(cv=>{
    const w = cv.clientWidth || cv.parentElement.clientWidth;
    const h = (cv.dataset.viz==='simp') ? 178 : (cv.dataset.viz==='alloc' ? 174 : 176);
    cv.width=w*DPR; cv.height=h*DPR; cv.style.height=h+'px';
    cv.getContext('2d').setTransform(DPR,0,0,DPR,0,0);
  });
  Object.keys(VIZ).forEach(k=>draw(+k));
}
document.querySelectorAll('canvas.viz').forEach(initViz);
window.addEventListener('resize', resizeAll);
resizeAll();
</script>
