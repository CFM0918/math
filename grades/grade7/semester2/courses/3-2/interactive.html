</div>

<div class="tabs" id="tabs">
  <button class="tab on" data-p="0"><span class="n">🔍</span>判斷正比反比</button>
  <button class="tab" data-p="1"><span class="n">📈</span>圖形與陷阱</button>
  <button class="tab" data-p="2"><span class="n">🔗</span>倍數與應用</button>

  <button class="tab" data-p="4"><span class="n">🎮</span>闖關遊戲</button>
</div>

<div class="wrap">
  <div class="card" id="goalCard">
    <h3><span class="ic">🎯</span>本節學習目標</h3>
    <div class="goals" id="goals"></div>
  </div>
  <div id="wrap"></div>
</div>

<script>
const GOALS = [
  '能從情境寫出關係式',
  '能判斷正比（y/x 恆為 k）並寫出 y = kx',
  '能判斷反比（x×y 恆為 k）並寫出 y = k/x',
  '能從數表中識別正比或反比',
  '能用「已知一組對應值」求另一組',
  '知道 y=kx 過原點；y=k/x 不過原點且 x≠0',
];

const DATA = [
{ key:'judge', viz:'judge', vizTitle:'正比／反比判定器 —— 先自己判斷，再按「試相除」「試相乘」驗證（8 題）',
  slides:[
    {eb:'細目 ①', h:'什麼是關係式？', html:`
      <div class="box y" style="text-align:center;font-size:18px;">用式子把<span class="hl">兩個量之間的關係</span>寫下來</div>
      <table class="tbl">
        <tr><th style="width:48%;">情境</th><th>關係式</th></tr>
        <tr><td>一顆 42 元，買 x 顆</td><td class="fm hl">y = 42x</td></tr>
        <tr><td>距離固定 300 公里</td><td class="fm hl">速度 × 時間 = 300</td></tr>
        <tr><td>每小時耗油 3 公升</td><td class="fm hl">油耗 = 3 × 時間</td></tr>
      </table>
      <div class="box g">💡 <b>關係式是列式的延伸</b>（七上 3-1 學過）—— 差別在這裡有<span class="hl">兩個變數在動</span>。</div>`},
    {eb:'細目 ①', h:'正比：相除固定', html:`
      <div class="box y" style="text-align:center;font-size:20px;padding:14px;">
        <span class="fm"><span class="hl">y/x = k</span></span>（k ≠ 0）　→　<span class="fm" style="font-size:22px;"><span class="hl">y = kx</span></span></div>
      <table class="tbl">
        <tr><th style="width:22%;">x</th><td class="fm">2</td><td class="fm">4</td><td class="fm">6</td></tr>
        <tr><th>y</th><td class="fm">6</td><td class="fm">12</td><td class="fm">18</td></tr>
        <tr><th class="hl-b">y/x</th><td class="fm hl-g" style="font-size:18px;">3</td><td class="fm hl-g" style="font-size:18px;">3</td><td class="fm hl-g" style="font-size:18px;">3</td></tr>
      </table>
      <div class="box g" style="text-align:center;">比值恆為 3 → <span class="hl">正比，y = 3x</span>　·　<b>k 叫比例常數</b></div>`},
    {eb:'細目 ②', h:'反比：相乘固定', html:`
      <div class="box y" style="text-align:center;font-size:20px;padding:14px;">
        <span class="fm"><span class="hl">x × y = k</span></span>（k ≠ 0）　→　<span class="fm" style="font-size:22px;"><span class="hl">y = k/x</span></span></div>
      <table class="tbl">
        <tr><th style="width:22%;">x</th><td class="fm">2</td><td class="fm">4</td><td class="fm">6</td></tr>
        <tr><th>y</th><td class="fm">12</td><td class="fm">6</td><td class="fm">4</td></tr>
        <tr><th class="hl-r">x×y</th><td class="fm hl-g" style="font-size:18px;">24</td><td class="fm hl-g" style="font-size:18px;">24</td><td class="fm hl-g" style="font-size:18px;">24</td></tr>
      </table>
      <div class="box g" style="text-align:center;">乘積恆為 24 → <span class="hl">反比，y = 24/x</span></div>
      <div class="box r" style="text-align:center;">⚠️ <span class="fm">y = k/x</span> <span class="hl-r">不過原點</span>，而且 <span class="hl-r">x ≠ 0</span>（七上 1-3 的鐵則）</div>`},
    {eb:'🔑 本節唯一要記的事', h:'判斷方法：先除、再乘', html:`
      <div class="box y" style="text-align:center;font-size:23px;padding:20px;">
        <span class="hl">正比「相除」固定</span><br><span class="hl">反比「相乘」固定</span></div>
      <div class="box"><b>給一張數表時：</b><br>
        <span class="hl-b">① 先試 y/x 是否都一樣</span> → 是 → <b>正比</b><br>
        <span class="hl-r">② 再試 x×y 是否都一樣</span> → 是 → <b>反比</b><br>
        <span class="hl">③ 兩個都不恆定</span> → <b>都不是</b></div>
      <div class="box g">👉 用下方的<b>判定器</b>：先自己判斷，再按「① 試相除」「② 試相乘」驗證。<b>8 題涵蓋全部情況，包含陷阱題。</b></div>`},
    {eb:'例題 1 ★☆☆', h:'判斷數表', html:`
      <div class="exq" data-a="1">
        <div class="exq-q"><span class="hl">Q</span>　<span class="fm">x = 2, 4, 6　；　y = 12, 6, 4</span>　是正比、反比還是都不是？</div>
        <button class="exo" data-i="0">正比，k = 24</button>
        <button class="exo" data-i="1">反比，k = 24</button>
        <button class="exo" data-i="2">正比，k = 6</button>
        <button class="exo" data-i="3">都不是</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st"><b>① 先試相除</b>：<span class="fm">12/2 = 6、6/4 = 1.5</span> → <b>不恆定</b> → 不是正比</div>
          <div class="st"><b>② 再試相乘</b>：<span class="fm">2×12 = 24、4×6 = 24、6×4 = 24</span> → <b>恆為 24</b> ✓</div>
          <div class="st fm">→ 反比，k = 24，y = 24/x</div>

const cur = DATA.map(()=>0);
function showSlide(si, i){
  const deck = document.querySelector(`[data-deck="${si}"]`);
  const sl = deck.querySelectorAll('.sl');
  i = Math.max(0, Math.min(sl.length-1, i));
  cur[si] = i;
  sl.forEach((s,k)=>s.classList.toggle('on', k===i));
  document.getElementById('pg-'+si).textContent = `${i+1} / ${sl.length}`;
  document.querySelectorAll(`#dots-${si} .dot`).forEach((d,k)=>d.classList.toggle('on', k===i));
}
document.addEventListener('click', e=>{
  const n = e.target.closest('[data-nav]');
  if(n){ const si=+n.dataset.s; showSlide(si, cur[si] + (n.dataset.nav==='next'?1:-1)); return; }
  const d = e.target.closest('.dot');
  if(d){ showSlide(+d.dataset.s, +d.dataset.i); return; }
});
document.addEventListener('keydown', e=>{
  const p = document.querySelector('.panel.on'); if(!p) return;
  const si = +p.dataset.p; if(si>=DATA.length) return;
  if(e.key==='ArrowRight') showSlide(si, cur[si]+1);
  if(e.key==='ArrowLeft') showSlide(si, cur[si]-1);
});

/* ===== 闖關遊戲 ===== */
const G = {lv:0, score:0, streak:0, best:0, t:20, timer:null, cur:null, answered:false};
function gShow(id){ ['gStart','gPlay','gEnd'].forEach(x=>document.getElementById(x).classList.toggle('on', x===id)); }
function gChips(){
  document.getElementById('gChips').innerHTML = GAME.map((g,i)=>
    `<div class="lvchip ${i<G.lv?'done':i===G.lv?'now':''}">${i+1}. ${g.name}</div>`).join('');
}
function gLoad(){
  if(G.lv>=GAME.length){ gFinish(); return; }
  G.answered=false; G.t=20;
  const bank = GAME[G.lv].qs;
  G.cur = bank[Math.floor(Math.random()*bank.length)];
  document.getElementById('hLv').textContent = (G.lv+1)+'/'+GAME.length;
  document.getElementById('hSc').textContent = G.score;
  document.getElementById('hStk').textContent = G.streak;
  document.getElementById('gQ').innerHTML = `<span style="color:var(--blue);font-size:15px;">第 ${G.lv+1} 關 · ${GAME[G.lv].name}</span><br>${G.cur.q}`;
  document.getElementById('gO').innerHTML = G.cur.o.map((o,i)=>
    `<button class="gopt" data-g="${i}">${'ABCD'[i]}. ${o}</button>`).join('');
  document.getElementById('gFb').className='gfb';
  document.getElementById('gNext').style.display='none';
  gChips();
  clearInterval(G.timer);
  G.timer = setInterval(()=>{
    G.t -= 0.1;
    document.getElementById('hT').textContent = Math.max(0,G.t).toFixed(0);
    document.getElementById('tFill').style.width = Math.max(0,G.t/20*100)+'%';
    if(G.t<=0){ clearInterval(G.timer); gAnswer(-1); }
  },100);
}
function gAnswer(pick){
  if(G.answered) return;
  G.answered = true; clearInterval(G.timer);
  const ans = G.cur.a, ok = pick===ans;
  document.querySelectorAll('.gopt').forEach((b,i)=>{
    b.disabled=true;
    if(i===ans) b.classList.add('right'); else if(i===pick) b.classList.add('wrong');
  });
  let gain=0, sb=0, tb=0;
  if(ok){
    G.streak++; G.best=Math.max(G.best,G.streak);
    sb = Math.min(5, G.streak-1); tb = Math.min(5, Math.floor(G.t/4));
    gain = 10+sb+tb; G.score += gain;
  } else { G.streak = 0; }
  document.getElementById('hSc').textContent = G.score;
  document.getElementById('hStk').textContent = G.streak;
  const fb = document.getElementById('gFb');
  fb.className = 'gfb on '+(ok?'ok':'no');
  fb.innerHTML = (ok? `✅ <b>答對！+${gain} 分</b>（基礎10 + 連擊${sb} + 速度${tb}）<br>`
                    : (pick===-1?'⏰ <b>時間到！</b><br>':'❌ <b>答錯了</b><br>')) + G.cur.e;
  document.getElementById('gNext').style.display='inline-block';
  document.getElementById('gNext').textContent = (G.lv>=GAME.length-1)?'看成績 🏁':'下一關 ▶';
}
function gFinish(){
  clearInterval(G.timer);
  const max = GAME.length*20, pct = Math.round(G.score/max*100);
  const rank = pct>=85?['🏆','數論大師']:pct>=70?['🥇','高手']:pct>=50?['🥈','不錯']:['📖','再加油'];
  document.getElementById('gRank').textContent = rank[0];
  document.getElementById('gFinal').innerHTML = `<b class="hl">${G.score}</b> / ${max} 分　·　${rank[1]}`;
  document.getElementById('gStats').innerHTML = `最高連擊 <b class="hl">${G.best}</b>　·　完成 ${GAME.length} 關`;
  gShow('gEnd');
}
document.getElementById('gGo').addEventListener('click', ()=>{ G.lv=0;G.score=0;G.streak=0;G.best=0; gShow('gPlay'); gLoad(); });
document.getElementById('gAgain').addEventListener('click', ()=>{ G.lv=0;G.score=0;G.streak=0;G.best=0; gShow('gPlay'); gLoad(); });
document.getElementById('gNext').addEventListener('click', ()=>{ G.lv++; gLoad(); });
document.addEventListener('click', e=>{ const b=e.target.closest('.gopt'); if(!b||b.disabled) return; gAnswer(+b.dataset.g); });

/* ===== Canvas ===== */
const VIZ = {}; let DPR=1;
function fmtN(v){ if(Math.abs(v-Math.round(v))<1e-9) return String(Math.round(v));
  return (Math.round(v*1000)/1000).toString().replace('-','−'); }

/* ① 正比／反比判定器 */
const TBL=[
  {x:[2,4,6],  y:[6,12,18],  k:'正比 k=3',   eq:'y = 3x'},
  {x:[2,4,6],  y:[12,6,4],   k:'反比 k=24',  eq:'y = 24/x'},
  {x:[1,2,4],  y:[3,6,12],   k:'正比 k=3',   eq:'y = 3x'},
  {x:[2,3,6],  y:[9,6,3],    k:'反比 k=18',  eq:'y = 18/x'},
  {x:[1,2,3],  y:[2,5,10],   k:'都不是',     eq:'—'},
  {x:[1,2,3],  y:[-1,-2,-3], k:'正比 k=−1',  eq:'y = −x　⚠️ 陷阱！'},
  {x:[2,4,8],  y:[24,12,6],  k:'反比 k=48',  eq:'y = 48/x'},
  {x:[1,2,3],  y:[1,4,9],    k:'都不是',     eq:'（但 y 與 x² 成正比，k=1）'},
];
/* ③ 正比反比對照（x 變幾倍） */
const SCALE={k:12};

function initViz(cv){
  const si=+cv.dataset.si, kind=cv.dataset.viz;
  const ctx=cv.getContext('2d');
  const st = VIZ[si] = {kind, cv, ctx};
  const ctrl = document.querySelector(`[data-ctrl="${si}"]`);
  if(kind==='judge'){
    st.i=0; st.step=0;   // 0=未判定 1=已試相除 2=已試相乘（揭曉）
    ctrl.innerHTML = `<div class="readout" id="ro-${si}"></div>
      <button class="btn" data-t="div" data-si="${si}" style="background:rgba(152,201,220,.2);border-color:var(--blue);color:var(--blue);font-weight:700;">① 試相除 y/x</button>
      <button class="btn" data-t="mul" data-si="${si}" style="background:rgba(237,160,168,.2);border-color:var(--pink);color:var(--pink);font-weight:700;">② 試相乘 x×y</button>
      <button class="btn" data-t="next" data-si="${si}">下一題 ▶</button>`;
  } else if(kind==='graph'){
    st.k=3; st.mode=0;   // 0=正比 1=反比
    ctrl.innerHTML = `<div class="readout" id="ro-${si}"></div>
      <button class="btn" data-t="mode" data-si="${si}" style="background:rgba(242,217,121,.2);border-color:var(--yellow);color:var(--yellow);font-weight:700;">🔀 正比 / 反比</button>
      <button class="btn" data-t="km" data-si="${si}">k − 1</button>
      <button class="btn" data-t="kp" data-si="${si}">k + 1</button>
      <button class="btn" data-t="neg" data-si="${si}">± k 變號</button>`;
  } else {              // scale：x 變幾倍
    st.m=1;             // 倍率 index
    ctrl.innerHTML = `<div class="readout" id="ro-${si}"></div>
      <button class="btn" data-t="mm" data-si="${si}">◀ x 縮小</button>
      <button class="btn" data-t="mp" data-si="${si}" style="background:rgba(242,217,121,.2);border-color:var(--yellow);color:var(--yellow);font-weight:700;">x 放大 ▶</button>
      <button class="btn" data-t="rst" data-si="${si}">↩ 回到 1 倍</button>`;
  }
  draw(si);
}

function drawJudge(st, ctx, w, h, ro){
  const E=TBL[st.i];
  ctx.textAlign='center';
  ctx.fillStyle='rgba(242,217,121,.85)'; ctx.font='bold 13px "Noto Sans TC"';
  ctx.fillText(`第 ${st.i+1} / ${TBL.length} 題　·　先試相除、再試相乘`, w/2, 15);
  // 數表
  const n=E.x.length, cw=Math.min(78,(w-110)/n), x0=(w-cw*n)/2+22;
  const rows=[['x',E.x.map(fmtN),'#f3efe2'],['y',E.y.map(fmtN),'#f3efe2']];
  if(st.step>=1) rows.push(['y/x', E.x.map((v,i)=>fmtN(E.y[i]/v)), '#98c9dc']);
  if(st.step>=2) rows.push(['x×y', E.x.map((v,i)=>fmtN(v*E.y[i])), '#eda0a8']);
  rows.forEach((r,ri)=>{
    const y=42+ri*26;
    ctx.textAlign='right'; ctx.fillStyle=r[2]; ctx.font='bold 14px "Noto Serif TC"';
    ctx.fillText(r[0], x0-10, y+5);
    ctx.textAlign='center';
    // 恆定判斷 → 高亮
    const same = r[1].every(v=>v===r[1][0]);
    r[1].forEach((v,ci)=>{
      if(ri>=2 && same){
        ctx.fillStyle= ri===2?'rgba(166,214,160,.22)':'rgba(166,214,160,.22)';
        ctx.beginPath(); ctx.roundRect(x0+cw*ci+3, y-13, cw-6, 22, 5); ctx.fill();
      }
      ctx.fillStyle= (ri>=2 && same) ? '#a6d6a0' : r[2];
      ctx.font=(ri>=2?'bold ':'')+'15px "Noto Serif TC"';
      ctx.fillText(v, x0+cw*ci+cw/2, y+5);
    });
    if(ri>=2){
      ctx.textAlign='left'; ctx.fillStyle= same?'#a6d6a0':'rgba(237,160,168,.8)';
      ctx.font='bold 12px "Noto Sans TC"';
      ctx.fillText(same?'✓ 恆定':'✗ 不恆定', x0+cw*n+8, y+5);
      ctx.textAlign='center';
    }
  });
  const yEnd=42+rows.length*26;
  if(st.step>=2){
    const isNone = E.k==='都不是';
    ctx.fillStyle= isNone?'rgba(237,160,168,.16)':'rgba(242,217,121,.16)';
    ctx.strokeStyle= isNone?'#eda0a8':'#f2d979'; ctx.lineWidth=1.5;
    const bw=Math.min(w-60,300);
    ctx.beginPath(); ctx.roundRect((w-bw)/2, yEnd, bw, 28, 7); ctx.fill(); ctx.stroke();
    ctx.fillStyle= isNone?'#eda0a8':'#f2d979'; ctx.font='bold 15px "Noto Serif TC"';
    ctx.fillText(E.k + '　' + E.eq, w/2, yEnd+19);
  } else {
    ctx.fillStyle='rgba(243,239,226,.4)'; ctx.font='13px "Noto Sans TC"';
    ctx.fillText(st.step===0 ? '👉 按「① 試相除」看看 y/x 恆不恆定'
                             : '👉 再按「② 試相乘」看看 x×y', w/2, yEnd+14);
  }
  ro.innerHTML = st.step>=2
    ? `x = ${E.x.join(', ')}　；　y = ${E.y.join(', ')}　→　<b>${E.k}</b>　<b>${E.eq}</b>`
    : `x = ${E.x.join(', ')}　；　y = ${E.y.join(', ')}　<span style="color:rgba(243,239,226,.5)">—— 先自己判斷，再按按鈕驗證</span>`;
}

function drawGraph(st, ctx, w, h, ro){
  const k=st.k, isP=st.mode===0;
  const M=8;
  const L=30, R=w-14, B=h-22, T=14;
  const cx=(L+R)/2, cy=(T+B)/2;
  const X=v=>cx+(v/M)*((R-L)/2), Y=v=>cy-(v/M)*((B-T)/2);
  ctx.textAlign='center';
  ctx.fillStyle= isP?'#98c9dc':'#eda0a8'; ctx.font='bold 13px "Noto Sans TC"';
  ctx.fillText(isP?`正比　y = ${k}x　·　通過原點`:`反比　y = ${k}/x　·　不過原點，x ≠ 0`, w/2, 11);
  // 格線
  ctx.strokeStyle='rgba(243,239,226,.08)'; ctx.lineWidth=1;
  for(let g=-M;g<=M;g+=2){ ctx.beginPath(); ctx.moveTo(X(g),T); ctx.lineTo(X(g),B); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(L,Y(g)); ctx.lineTo(R,Y(g)); ctx.stroke(); }
  // 軸
  ctx.strokeStyle='rgba(243,239,226,.55)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(L,cy); ctx.lineTo(R,cy); ctx.moveTo(cx,T); ctx.lineTo(cx,B); ctx.stroke();
  // 曲線
  ctx.strokeStyle= isP?'#98c9dc':'#eda0a8'; ctx.lineWidth=2.4;
  if(isP){
    ctx.beginPath();
    let started=false;
    for(let i=0;i<=200;i++){ const x=-M+2*M*i/200, y=k*x;
      if(y<-M||y>M){ started=false; continue; }
      if(!started){ ctx.moveTo(X(x),Y(y)); started=true; } else ctx.lineTo(X(x),Y(y)); }
    ctx.stroke();
    ctx.beginPath(); ctx.arc(X(0),Y(0),4.5,0,7); ctx.fillStyle='#f2d979'; ctx.fill();
    ctx.strokeStyle='#16281c'; ctx.lineWidth=1.3; ctx.stroke();
    ctx.fillStyle='#f2d979'; ctx.font='bold 11px "Noto Sans TC"';
    ctx.fillText('過原點 ✓', X(0)+38, Y(0)+16);
  } else {
    [[0.05,M],[-M,-0.05]].forEach(([a,b])=>{
      ctx.beginPath(); let started=false;
      for(let i=0;i<=200;i++){ const x=a+(b-a)*i/200, y=k/x;
        if(y<-M||y>M){ started=false; continue; }
        if(!started){ ctx.moveTo(X(x),Y(y)); started=true; } else ctx.lineTo(X(x),Y(y)); }
      ctx.stroke();
    });
    ctx.beginPath(); ctx.arc(X(0),Y(0),4.5,0,7);
    ctx.strokeStyle='#eda0a8'; ctx.lineWidth=1.5; ctx.setLineDash([2,2]); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle='#eda0a8'; ctx.font='bold 11px "Noto Sans TC"';
    ctx.fillText('不過原點 ✗', X(0)+44, Y(0)+16);
  }
  ro.innerHTML = isP
    ? `<b>y = ${k}x</b>　｜　<b>過原點</b>的直線　｜　${k>0?'k > 0 → x 變大 y <b>變大</b>':'<span style="color:var(--pink)">k < 0 → x 變大 y <b>變小</b> —— 但這仍然是「正比」！</span>'}`
    : `<b>y = ${k}/x</b>　｜　<b>不過原點</b>，且 <b>x ≠ 0</b>　｜　x 變大 → y 變小，但 <b>x×y = ${k}</b> 永遠不變`;
}

const MULT=[0.25,0.5,1,1.2,2,3,4];
function drawScale(st, ctx, w, h, ro){
  const m=MULT[st.m], k=SCALE.k;
  const x0=2, y0p=k*x0, y0r=k/x0;
  const x1=x0*m, y1p=k*x1, y1r=k/x1;
  ctx.textAlign='center';
  ctx.fillStyle='rgba(242,217,121,.85)'; ctx.font='bold 13px "Noto Sans TC"';
  ctx.fillText(`x 變成 ${fmtN(m)} 倍　→　正比與反比的 y 各自怎麼變？`, w/2, 15);
  const bar=(cx, title, before, after, col, note)=>{
    ctx.fillStyle=col; ctx.font='bold 14px "Noto Serif TC"';
    ctx.fillText(title, cx, 38);
    const maxV=Math.max(before, after, 1);
    const BW=Math.min(120, w*0.32), BH=54;
    const bh1=BH*before/maxV, bh2=BH*after/maxV;
    const by=112;
    ctx.fillStyle='rgba(243,239,226,.18)';
    ctx.fillRect(cx-BW/2, by-bh1, BW*0.42, bh1);
    ctx.fillStyle=col.replace('#98c9dc','rgba(152,201,220,.55)').replace('#eda0a8','rgba(237,160,168,.55)');
    ctx.fillRect(cx+BW*0.06, by-bh2, BW*0.42, bh2);
    ctx.strokeStyle='rgba(243,239,226,.3)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(cx-BW/2-4, by); ctx.lineTo(cx+BW/2+4, by); ctx.stroke();
    ctx.fillStyle='rgba(243,239,226,.55)'; ctx.font='10px "Noto Sans TC"';
    ctx.fillText('原本', cx-BW*0.29, by+13);
    ctx.fillStyle=col; ctx.fillText('之後', cx+BW*0.27, by+13);
    ctx.fillStyle='rgba(243,239,226,.75)'; ctx.font='11px "Noto Serif TC"';
    ctx.fillText(fmtN(before), cx-BW*0.29, by-bh1-5);
    ctx.fillStyle=col; ctx.font='bold 12px "Noto Serif TC"';
    ctx.fillText(fmtN(after), cx+BW*0.27, by-bh2-5);
    ctx.fillStyle=col; ctx.font='bold 12px "Noto Sans TC"';
    ctx.fillText(note, cx, by+30);
  };
  bar(w*0.27, `正比 y = ${k}x`, y0p, y1p, '#98c9dc', `y 變 ${fmtN(m)} 倍`);
  bar(w*0.73, `反比 y = ${k}/x`, y0r, y1r, '#eda0a8', `y 變 ${fmtN(1/m)} 倍`);
  ctx.strokeStyle='rgba(243,239,226,.14)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(w/2, 28); ctx.lineTo(w/2, h-22); ctx.stroke();
  ctx.fillStyle='rgba(242,217,121,.8)'; ctx.font='11px "Noto Sans TC"';
  ctx.fillText(`反比驗算：x×y = ${fmtN(x1)} × ${fmtN(y1r)} = ${fmtN(x1*y1r)}　（永遠 = k = ${k}）`, w/2, h-6);
  ro.innerHTML = `x 從 <b>${x0}</b> 變成 <b>${fmtN(x1)}</b>（<b>${fmtN(m)} 倍</b>）`
    + `　｜　<span style="color:var(--blue)">正比 y：${fmtN(y0p)} → ${fmtN(y1p)}（也是 <b>${fmtN(m)} 倍</b>）</span>`
    + `　｜　<span style="color:var(--pink)">反比 y：${fmtN(y0r)} → ${fmtN(y1r)}（變 <b>${fmtN(1/m)} 倍</b>）</span>`
    + `　｜　x×y = <b>${fmtN(x1*y1r)}</b> 永遠不變`;
}

function draw(si){
  const st=VIZ[si]; if(!st) return;
  const {cv,ctx,kind}=st, w=cv.width/DPR, h=cv.height/DPR;
  ctx.clearRect(0,0,w,h);
  const ro=document.getElementById('ro-'+si);
  if(kind==='judge') drawJudge(st,ctx,w,h,ro);
  else if(kind==='graph') drawGraph(st,ctx,w,h,ro);
  else if(kind==='scale') drawScale(st,ctx,w,h,ro);
}

document.addEventListener('click', e=>{
  const btn=e.target.closest('[data-t]'); if(!btn) return;
  const si=+btn.dataset.si, st=VIZ[si]; if(!st) return;
  const t=btn.dataset.t;
  if(st.kind==='judge'){
    if(t==='div') st.step=Math.max(st.step,1);
    if(t==='mul') st.step=2;
    if(t==='next'){ st.i=(st.i+1)%TBL.length; st.step=0; }
  } else if(st.kind==='graph'){
    if(t==='mode') st.mode=1-st.mode;
    if(t==='kp'){ st.k++; if(st.k===0) st.k=1; }
    if(t==='km'){ st.k--; if(st.k===0) st.k=-1; }
    if(t==='neg') st.k=-st.k;
    if(st.k>6) st.k=6; if(st.k<-6) st.k=-6;
  } else {
    if(t==='mp') st.m=Math.min(MULT.length-1, st.m+1);
    if(t==='mm') st.m=Math.max(0, st.m-1);
    if(t==='rst') st.m=2;
  }
  draw(si);
});

function resizeAll(){
  DPR = Math.min(2, window.devicePixelRatio||1);
  document.querySelectorAll('canvas.viz').forEach(cv=>{
    const w = cv.clientWidth || cv.parentElement.clientWidth;
    const h = (cv.dataset.viz==='judge') ? 202 : (cv.dataset.viz==='graph' ? 198 : 190);
    cv.width=w*DPR; cv.height=h*DPR; cv.style.height=h+'px';
    cv.getContext('2d').setTransform(DPR,0,0,DPR,0,0);
  });
  Object.keys(VIZ).forEach(k=>draw(+k));
}
document.querySelectorAll('canvas.viz').forEach(initViz);
window.addEventListener('resize', resizeAll);
resizeAll();
</script>
