<script>
const GOALS = [
  '知道一元一次方程式的定義（一元、一次、有等號）',
  '理解「解」就是使等式成立的值',
  '能用三步驟列式（設未知數→找等量關係→列式）',
  '理解等量公理：兩邊同時做，天平不倒',
  '知道移項就是等量公理的簡寫，所以要變號',
  '能解含括號、含分數、兩邊都有 x 的方程式',
];

const DATA = [
{ key:'eqtype', viz:'eqtype', vizTitle:'方程式判別器 —— 按「下一個」，練習判斷是不是一元一次方程式',
  slides:[
    {eb:'細目 ①', h:'一個等號，改變一切', html:`
      <table class="tbl">
        <tr><th style="width:22%;">　</th><th style="width:38%;">3-1 代數式</th><th>3-2 方程式</th></tr>
        <tr><td>樣子</td><td class="fm hl-b" style="font-size:19px;">2x + 3</td><td class="fm hl-g" style="font-size:19px;">2x + 3 = 11</td></tr>
        <tr><td>是什麼</td><td>一句<b>描述</b></td><td class="hl">一個<b>問題</b></td></tr>
        <tr><td>能做什麼</td><td>代入 x 求值</td><td class="hl"><b>解出 x</b></td></tr>
        <tr><td>答案</td><td>隨 x 而變</td><td class="hl"><b>x = 4</b>（唯一）</td></tr>
      </table>
      <div class="box y" style="text-align:center;">差別只有一個<span class="hl">等號</span> —— 但有了等號，式子就從<b>描述</b>變成<b>問題</b>，而問題<span class="hl">有答案</span>。</div>`},
    {eb:'細目 ①', h:'一元一次方程式的三個條件', html:`
      <div class="box y" style="text-align:center;font-size:18px;">
        <span class="hl">一元</span>：只有 <b>1 個</b>未知數　·　<span class="hl">一次</span>：最高次方是 <b>1</b>　·　<span class="hl">方程式</span>：有<b>等號</b></div>
      <table class="tbl">
        <tr><th style="width:38%;">式子</th><th>是嗎？</th></tr>
        <tr><td class="fm">2x + 3 = 11</td><td class="hl-g">✅</td></tr>
        <tr><td class="fm">2x + 3</td><td class="hl-r">❌ 沒等號（是代數式）</td></tr>
        <tr><td class="fm">x² + 1 = 5</td><td class="hl-r">❌ 二次</td></tr>
        <tr><td class="fm">x + y = 3</td><td class="hl-r">❌ 二元</td></tr>
        <tr><td class="fm">3 + 5 = 8</td><td class="hl-r">❌ 沒有未知數</td></tr>
      </table>`},
    {eb:'細目 ①', h:'什麼是「解」？', html:`
      <div class="box y" style="text-align:center;font-size:19px;"><span class="hl">解</span>（也叫<span class="hl">根</span>）：使等式<b>成立</b>的未知數的值</div>
      <div class="box"><b>x + 5 = 12，哪個數是解？</b><br>
        x = 3 → <span class="fm">3 + 5 = 8 <span class="hl-r">≠ 12</span></span> ❌<br>
        x = 7 → <span class="fm">7 + 5 = 12 <span class="hl-g">= 12</span></span> ✓ <b>是解</b></div>
      <div class="box g" style="text-align:center;">💡 <b>檢驗一個數是不是解，只要代回去看左右相等嗎。</b></div>
      <div class="teach"><b>這也是為什麼驗算永遠有效</b> —— 它就是<b>解的定義本身</b>。代回去左右相等 → 它就是解。<b>這不是「檢查」，這是「證明」。</b></div>`},
    {eb:'細目 ①', h:'列式三步驟', html:`
      <div class="box y" style="text-align:center;font-size:20px;padding:14px;"><span class="hl">① 設未知數　→　② 找等量關係　→　③ 列出方程式</span></div>
      <div class="box"><b class="hl-b">① 設未知數</b>　通常設<b>題目所求</b>的量，或<b>最單純</b>的量。<span class="hl-r">一定要寫清楚單位</span>：「設兒子現在 <b>x 歲</b>」</div>
      <div class="box g"><b class="hl-g">② 找等量關係</b>　在題目裡找：<span class="hl">是・等於・共・一樣・剩下・總共</span><br>
        <b>這些字的位置，就是等號的位置。</b></div>
      <div class="box"><b class="hl-b">③ 列出方程式</b>　把等號左右兩邊各自用 x 表示</div>`},
    {eb:'細目 ①', h:'常見的等量關係', html:`
      <table class="tbl">
        <tr><th style="width:32%;">情境</th><th>等量關係</th></tr>
        <tr><td class="hl-b">年齡問題</td><td>兩人<b>同時</b>增加相同歲數</td></tr>
        <tr><td class="hl-b">和差問題</td><td class="fm">甲 + 乙 = 總數</td></tr>
        <tr><td class="hl-b">買賣問題</td><td class="fm">售價 − 成本 = 利潤</td></tr>
        <tr><td class="hl-b">打折</td><td class="fm">定價 × 折數 = 售價</td></tr>
        <tr><td class="hl-b">追及問題</td><td class="fm">甲走的距離 = 乙走的距離</td></tr>
      </table>
      <div class="box r" style="text-align:center;">⚠️ <b>最常見的列式錯誤：設了 x 卻忘記 x 是什麼。</b><br>
        寫完式子回頭問一次：「<span class="hl">我的 x 到底代表什麼？</span>」</div>`},
    {eb:'例題 1 ★☆☆', h:'判斷方程式', html:`
      <div class="exq" data-a="1">
        <div class="exq-q"><span class="hl">Q</span>　下列哪一個<b>是</b>一元一次方程式？</div>
        <button class="exo" data-i="0">3x − 7</button>
        <button class="exo" data-i="1">x/3 + 1/2 = 2</button>
        <button class="exo" data-i="2">x² − 4 = 0</button>
        <button class="exo" data-i="3">2/x = 5</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st">三個條件：<b>① 1 個未知數　② 次方是 1　③ 有等號</b></div>
          <div class="st">(A) 3x − 7 <span class="hl-r">沒有等號</span> → 是代數式，不是方程式</div>
          <div class="st">(C) x² − 4 = 0 → 次方是 <span class="hl-r">2</span>，是二次方程式</div>
          <div class="st">(D) 2/x = 5 → <span class="hl-r">x 在分母</span>，不是一次式（叫分式方程式）</div>
          <div class="st">(B) x/3 + 1/2 = 2 → <b>有分數沒關係</b>，x 的次方仍是 1 ✓</div>
          <div class="an">答：x/3 + 1/2 = 2</div>
        </div>
      </div>`},
    {eb:'例題 2 ★★☆', h:'列式：年齡問題', html:`
      <div class="exq" data-a="2">
        <div class="exq-q"><span class="hl">Q</span>　父親現在年齡是兒子的 3 倍。<b>5 年後</b>，父親年齡是那時兒子的 2 倍多 3 歲。設兒子現在 x 歲，方程式為？</div>
        <button class="exo" data-i="0">3x = 2x + 3</button>
        <button class="exo" data-i="1">3x + 5 = 2x + 3</button>
        <button class="exo" data-i="2">3x + 5 = 2(x + 5) + 3</button>
        <button class="exo" data-i="3">3x = 2(x + 5) + 3</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st">兒子現在 x 歲 → 父親現在 <b>3x</b> 歲</div>
          <div class="st fm">5 年後：父親 3x + 5、兒子 x + 5　<b>（兩人都要加 5！）</b></div>
          <div class="st fm">條件：父親 = 兒子的 2 倍多 3 → 3x + 5 = 2(x+5) + 3</div>
          <div class="st">(B) 的錯誤：<span class="hl-r">只給父親加了 5，忘記兒子也會長大</span> —— 這是年齡問題最經典的錯。</div>
          <div class="st">(D) 的錯誤：父親那邊忘了加 5。</div>
          <div class="st">💡 <b>年齡問題的關鍵：兩人同時增加相同歲數。</b></div>
          <div class="an">答：3x + 5 = 2(x + 5) + 3</div>
        </div>
      </div>`}
  ],
  fa:[
    {q:'<span class="fm">2/x = 5</span> 是一元一次方程式嗎？', o:['是','不是，x 在分母','不是，沒有等號','不是，有兩個未知數'], a:1, e:'x 在分母 → 不是一次式（叫分式方程式）。'},
    {q:'x = 3 是 <span class="fm">2x + 1 = 7</span> 的解嗎？', o:['是','不是','不能判斷','要先解才知道'], a:0, e:'代回去：2(3)+1 = 7 ✓ 左右相等 → 是解。'},
    {q:'「甲有 x 元，乙比甲多 50 元，兩人共 200 元」列式為？', o:['x + 50 = 200','x + (x+50) = 200','2x = 200','x − 50 = 200'], a:1, e:'甲 x + 乙 (x+50) = 200。「共」就是等號的位置。'}

  info:[

},
{ key:'scale', viz:'scale', vizTitle:'互動天平 —— 按綠色鍵保持平衡；按粉色鍵看天平怎麼倒',
  slides:[
    {eb:'細目 ②', h:'方程式就是一座天平', html:`
      <div class="box y" style="text-align:center;font-size:19px;">
        等式就像天平兩邊<span class="hl">平衡</span> ——<br>
        兩邊<span class="hl">同時</span>做相同的加減乘除，平衡<b>不會被破壞</b>。</div>
      <div class="box g"><b>這就是「等量公理」。</b>接下來你會看到，<span class="hl">移項只是它的簡寫</span>。</div>
      <div class="box"><b>👉 用下方的互動天平試試看：</b>按<span class="hl-g">綠色</span>鍵是正確操作（兩邊同時做）；
        按<span class="hl-r">粉色</span>的「只減左邊」，天平會<b>真的倒給你看</b>。</div>`},
    {eb:'細目 ②', h:'等量公理：四條', html:`
      <table class="tbl">
        <tr><th style="width:22%;">公理</th><th>內容</th></tr>
        <tr><td class="hl-b">加法</td><td class="fm" style="font-size:17px;">a = b　→　a + c = b + c</td></tr>
        <tr><td class="hl-b">減法</td><td class="fm" style="font-size:17px;">a = b　→　a − c = b − c</td></tr>
        <tr><td class="hl-b">乘法</td><td class="fm" style="font-size:17px;">a = b　→　a × c = b × c</td></tr>
        <tr><td class="hl-b">除法</td><td class="fm" style="font-size:17px;">a = b　→　a ÷ c = b ÷ c　<span class="hl-r">（c ≠ 0）</span></td></tr>
      </table>
      <div class="box r"><b class="hl-r">為什麼除法要 c ≠ 0？</b>因為<b>除以 0 沒有意義</b> —— 這是 1-3 學過的。</div>
      <div class="box y" style="text-align:center;">🔑 <span class="hl">關鍵：一定要「兩邊都做」</span> —— 只動一邊 = <b>天平倒了</b> = 等式不成立</div>`},
    {eb:'細目 ②', h:'移項為什麼要變號？看天平就懂了', html:`
      <div class="box y" style="text-align:center;">解 <span class="fm" style="font-size:21px;">x + 5 = 12</span></div>
      <table class="tbl">
        <tr><th style="width:50%;">用等量公理（完整）</th><th>用移項（簡寫）</th></tr>
        <tr><td class="fm">x + 5 = 12</td><td class="fm">x + 5 = 12</td></tr>
        <tr><td class="hl-b">兩邊<b>同減 5</b>：</td><td class="hl-g">+5 <b>移項</b>變 −5：</td></tr>
        <tr><td class="fm">x + 5 <span class="hl-r">− 5</span> = 12 <span class="hl-r">− 5</span></td><td class="fm">x = 12 <span class="hl-r">− 5</span></td></tr>
        <tr><td class="fm hl">x = 7</td><td class="fm hl">x = 7</td></tr>
      </table>
      <div class="box g" style="text-align:center;font-size:18px;">💡 <span class="hl">移項不是新規則，是「兩邊同加同減」的快寫法。</span><br>
        理解這一點，就不會死背「搬家變號」卻搞不清楚為什麼。</div>`},
    {eb:'細目 ② ⚠️', h:'移項法則：搬家要變號', html:`
      <div class="box y" style="text-align:center;font-size:21px;padding:16px;"><span class="hl">加號 ↔ 減號</span>　　<span class="hl">乘號 ↔ 除號</span></div>
      <div class="two">
        <div class="box"><span class="fm" style="font-size:17px;">x <span class="hl-b">+ 5</span> = 12</span> → <span class="fm" style="font-size:17px;">x = 12 <span class="hl-r">− 5</span></span></div>
        <div class="box g"><span class="fm" style="font-size:17px;">x <span class="hl-b">− 5</span> = 12</span> → <span class="fm" style="font-size:17px;">x = 12 <span class="hl-r">+ 5</span></span></div>
      </div>
      <div class="box r" style="text-align:center;font-size:19px;">
        ⚠️ <b>最常見錯誤：移項忘記變號</b><br>
        <span class="fm">x + 3 = 10 → x = 10 <span class="hl-r">+</span> 3 = 13</span> ❌<br>
        <span class="fm">正確：x = 10 <span class="hl-g">−</span> 3 = <span class="hl-g">7</span></span> ✓</div>`},
    {eb:'例題 3 ★☆☆', h:'移項變號', html:`
      <div class="exq" data-a="0">
        <div class="exq-q"><span class="hl">Q</span>　解 <span class="fm">x + 3 = 10</span></div>
        <button class="exo" data-i="0">x = 7</button>
        <button class="exo" data-i="1">x = 13</button>
        <button class="exo" data-i="2">x = 30</button>
        <button class="exo" data-i="3">x = 3/10</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st"><b>完整想法（等量公理）</b>：兩邊同減 3 → x + 3 − 3 = 10 − 3 → x = 7</div>
          <div class="st"><b>簡寫（移項）</b>：+3 移到右邊<b>變 −3</b> → x = 10 − 3 = 7</div>
          <div class="st fm">驗算：7 + 3 = 10 ✓</div>
          <div class="st">(B) x = 13 就是<span class="hl-r">移項忘記變號</span>（寫成 10+3）—— 最多人踩的坑。</div>
          <div class="an">答：x = 7</div>
        </div>
      </div>`},
    {eb:'例題 4 ★★☆', h:'兩步驟', html:`
      <div class="exq" data-a="1">
        <div class="exq-q"><span class="hl">Q</span>　解 <span class="fm">2x + 3 = 11</span></div>
        <button class="exo" data-i="0">x = 7</button>
        <button class="exo" data-i="1">x = 4</button>
        <button class="exo" data-i="2">x = 8</button>
        <button class="exo" data-i="3">x = 14</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st fm"><b>Step 1 移項</b>：2x = 11 − 3 = 8</div>
          <div class="st fm"><b>Step 2 兩邊同除以 2</b>：x = 8 ÷ 2 = 4</div>
          <div class="st fm">驗算：2(4) + 3 = 8 + 3 = 11 ✓</div>
          <div class="st">(C) x = 8 是<b>忘了除以 2</b>（停在 2x = 8 就交卷）。</div>
          <div class="st">💡 <b>為什麼要除以 2？</b>2x 的意思是「2 <b>乘以</b> x」，要把 x 單獨留下就要除以 2（乘號移過去變除號）。</div>
          <div class="an">答：x = 4</div>
        </div>
      </div>`}
  ],
  fa:[
    {q:'解 <span class="fm">x − 8 = 15</span>', o:['x = 7','x = 23','x = −23','x = 120'], a:1, e:'−8 移項變 +8 → x = 15 + 8 = 23。'},
    {q:'解 <span class="fm">4x = 28</span>', o:['x = 7','x = 24','x = 32','x = 112'], a:0, e:'兩邊同除以 4 → x = 7。'},
    {q:'等量公理的「除法」為什麼要 c ≠ 0？', o:['習慣','除以 0 沒有意義','會變負數','沒有原因'], a:1, e:'除以 0 沒有意義（1-3 學過）。'}
  ],
  info:[
    {big:'天平兩邊同時做', cap:'只動一邊<br>天平就倒', c:'var(--yellow)'},
    {big:'移項 = 簡寫', cap:'不是新規則<br>所以要變號', c:'var(--blue)'},
    {big:'搬家要變號', cap:'+↔−<br>×↔÷', c:'var(--pink)'}
  ]
},
{ key:'steps', viz:'steps', vizTitle:'五步驟逐步器 —— 按「下一步」，看每一步在做什麼、為什麼',
  slides:[
    {eb:'細目 ②', h:'解題標準流程：五步驟', html:`
      <table class="tbl">
        <tr><th style="width:10%;">　</th><th style="width:34%;">動作</th><th>注意</th></tr>
        <tr><td class="hl" style="font-size:18px;">①</td><td>有括號先<b>去括號</b></td><td>括號前是負號 → <span class="hl-r">每項變號</span></td></tr>
        <tr><td class="hl" style="font-size:18px;">②</td><td>有分數 → 兩邊同乘 <b>LCM</b></td><td>⚠️ <span class="hl-r">每一項</span>都要乘！</td></tr>
        <tr><td class="hl" style="font-size:18px;">③</td><td><b>移項</b>：x 左、常數右</td><td><span class="hl-r">移項要變號</span></td></tr>
        <tr><td class="hl" style="font-size:18px;">④</td><td><b>合併同類項</b></td><td>只加減係數</td></tr>
        <tr><td class="hl" style="font-size:18px;">⑤</td><td>兩邊<b>同除以係數</b></td><td>⚠️ 除以<span class="hl-r">負數</span>時符號要對</td></tr>
      </table>
      <div class="box y"><b>💡 固定習慣：x 項一律移<span class="hl">左邊</span>，常數一律移<span class="hl">右邊</span>。</b>不要每題自己想 —— <b>固定下來，錯誤率大幅下降</b>。</div>`},
    {eb:'例題 5 ★★★', h:'兩邊都有 x', html:`
      <div class="exq" data-a="2">
        <div class="exq-q"><span class="hl">Q</span>　解 <span class="fm">3(x + 2) − 5 = x + 7</span></div>
        <button class="exo" data-i="0">x = 1</button>
        <button class="exo" data-i="1">x = 6</button>
        <button class="exo" data-i="2">x = 3</button>
        <button class="exo" data-i="3">x = 5</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st fm"><b>① 去括號、合併左邊</b>：3x + 6 − 5 = 3x + 1</div>
          <div class="st fm">方程式變成：3x + 1 = x + 7</div>
          <div class="st fm"><b>③ 移項</b>（x 移左、常數移右）：3x − x = 7 − 1</div>
          <div class="st fm"><b>④ 合併</b>：2x = 6　→　<b>⑤ 同除以 2</b>：x = 3</div>
          <div class="st fm">驗算：左 = 3(3+2) − 5 = 10；右 = 3 + 7 = 10 ✓</div>
          <div class="st"><span class="hl-r">最常見錯誤</span>：兩邊都有 x 時<b>只移一邊</b> → 固定「x 移左、常數移右」。</div>
          <div class="an">答：x = 3</div>
        </div>
      </div>`},
    {eb:'例題 6 ★★★', h:'含分數係數', html:`
      <div class="exq" data-a="3">
        <div class="exq-q"><span class="hl">Q</span>　解 <span class="fm">x/3 + 1/2 = 2</span></div>
        <button class="exo" data-i="0">x = 3</button>
        <button class="exo" data-i="1">x = 6</button>
        <button class="exo" data-i="2">x = 5</button>
        <button class="exo" data-i="3">x = 9/2</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st"><b>想法</b>：兩邊同乘分母 3 和 2 的 <b>LCM = 6</b>，一次消掉所有分母</div>
          <div class="st fm"><b>② 兩邊同乘 6</b>：6×(x/3) + 6×(1/2) = 6×2 → 2x + 3 = 12</div>
          <div class="st fm"><b>③ 移項</b>：2x = 12 − 3 = 9　→　<b>⑤ 同除以 2</b>：x = 9/2 = 4.5</div>
          <div class="st fm">驗算：4.5/3 + 1/2 = 1.5 + 0.5 = 2 ✓</div>
          <div class="st"><span class="hl-r">⚠️ 最常錯：只乘了某一項。</span>等量公理是對<b>整個等式的每一項</b>操作。</div>
          <div class="st">💡 <b>答案是分數很正常！</b>不要因為不是整數就以為算錯。這裡用到 <b>2-2 的 LCM</b>。</div>
          <div class="an">答：x = 9/2（即 4.5）</div>
        </div>
      </div>`},
    {eb:'例題 7 ★★★ ⚠️', h:'x 的係數是負的', html:`
      <div class="exq" data-a="1">
        <div class="exq-q"><span class="hl">Q</span>　解 <span class="fm">−2x + 5 = 11</span></div>
        <button class="exo" data-i="0">x = 3</button>
        <button class="exo" data-i="1">x = −3</button>
        <button class="exo" data-i="2">x = 8</button>
        <button class="exo" data-i="3">x = −8</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st fm"><b>③ 移項</b>：−2x = 11 − 5 = 6</div>
          <div class="st fm"><b>⑤ 兩邊同除以 −2</b>：x = 6 ÷ (−2) = −3</div>
          <div class="st fm">驗算：−2(−3) + 5 = 6 + 5 = 11 ✓</div>
          <div class="st">(A) x = 3 是<span class="hl-r">忘了除以負數會翻轉符號</span> —— 這裡最多人錯。</div>
          <div class="st">💡 <b>看到 x 的係數是負的，就多花三秒確認符號。</b>而且錯了驗算一定抓得到 —— <b>所以更要驗算</b>。</div>
          <div class="an">答：x = −3</div>
        </div>
      </div>`},
    {eb:'細目 ②', h:'驗算：不是額外的事，是流程的最後一步', html:`
      <div class="box y" style="text-align:center;font-size:19px;">把答案<span class="hl">代回原方程式</span>，確認左右兩邊相等</div>
      <div class="box g" style="font-size:17px;"><b>為什麼驗算一定有效？</b><br>
        因為「<span class="hl">解</span>」的定義就是「<span class="hl">使等式成立的值</span>」。代回去左右相等 → 它就是解。<br>
        <b>這不是「檢查」，這是「證明」。</b></div>
      <div class="box r"><b>⚠️ 驗算要代回<span class="hl-r">原方程式</span>，不是代回化簡後的式子。</b><br>
        因為如果化簡那一步就錯了，代回化簡後的式子還是會「對」—— 抓不到錯。</div>
      <div class="teach"><b>追問句：</b>「這個答案代回<b>原</b>方程式，左右兩邊真的相等嗎？」把驗算變成<b>最後必要步驟</b>，而不是「有空再做」的事。</div>`},
    {eb:'素養 ★★★', h:'成本與定價 —— 三個不同的量', html:`
      <div class="box">老闆希望<span class="hl">打 8 折</span>出售後，仍能獲得「<span class="hl">成本的 20%</span>」作為利潤。打 8 折後的售價是 <span class="hl">180 元</span>。</div>
      <div class="exq" data-a="2">
        <div class="exq-q"><span class="hl">Q</span>　商品的<b>成本</b>是多少元？</div>
        <button class="exo" data-i="0">144 元</button>
        <button class="exo" data-i="1">225 元</button>
        <button class="exo" data-i="2">150 元</button>
        <button class="exo" data-i="3">216 元</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st">設成本 x 元。「獲利成本的 20%」→ 售價 = 成本 + 0.2×成本 = <b>1.2x</b></div>
          <div class="st fm">1.2x = 180 → x = 150 元</div>
          <div class="st">(B) 225 是<b>原定價</b>（0.8p = 180 → p = 225）—— 題目問的是<b>成本</b>！</div>
          <div class="st">⚠️ 這題有<b>三個不同的量</b>：成本 <b>150</b>、定價 <b>225</b>、售價 <b>180</b>。讀題要分清楚誰是誰。</div>
          <div class="st">💡 <b>加價率</b> = (225 − 150) ÷ 150 = <b>50%</b></div>
          <div class="an">答：成本 150 元</div>

});

const G = {lv:0, score:0, streak:0, best:0, t:20, timer:null, cur:null, answered:false};
function gShow(id){ ['gStart','gPlay','gEnd'].forEach(x=>document.getElementById(x).classList.toggle('on', x===id)); }
function gChips(){
  document.getElementById('gChips').innerHTML = GAME.map((g,i)=>
    `<div class="lvchip ${i<G.lv?'done':i===G.lv?'now':''}">${i+1}. ${g.name}</div>`).join('');
}
function gLoad(){
  if(G.lv>=GAME.length){ gFinish(); return; }
  G.answered=false; G.t=20;
  const bank = GAME[G.lv].qs;
  G.cur = bank[Math.floor(Math.random()*bank.length)];
  document.getElementById('hLv').textContent = (G.lv+1)+'/'+GAME.length;
  document.getElementById('hSc').textContent = G.score;
  document.getElementById('hStk').textContent = G.streak;
  document.getElementById('gQ').innerHTML = `<span style="color:var(--blue);font-size:15px;">第 ${G.lv+1} 關 · ${GAME[G.lv].name}</span><br>${G.cur.q}`;
  document.getElementById('gO').innerHTML = G.cur.o.map((o,i)=>
    `<button class="gopt" data-g="${i}">${'ABCD'[i]}. ${o}</button>`).join('');
  document.getElementById('gFb').className='gfb';
  document.getElementById('gNext').style.display='none';
  gChips();
  clearInterval(G.timer);
  G.timer = setInterval(()=>{
    G.t -= 0.1;
    document.getElementById('hT').textContent = Math.max(0,G.t).toFixed(0);
    document.getElementById('tFill').style.width = Math.max(0,G.t/20*100)+'%';
    if(G.t<=0){ clearInterval(G.timer); gAnswer(-1); }
  },100);
}
function gAnswer(pick){
  if(G.answered) return;
  G.answered = true; clearInterval(G.timer);
  const ans = G.cur.a, ok = pick===ans;
  document.querySelectorAll('.gopt').forEach((b,i)=>{
    b.disabled=true;
    if(i===ans) b.classList.add('right'); else if(i===pick) b.classList.add('wrong');
  });
  let gain=0, sb=0, tb=0;
  if(ok){
    G.streak++; G.best=Math.max(G.best,G.streak);
    sb = Math.min(5, G.streak-1); tb = Math.min(5, Math.floor(G.t/4));
    gain = 10+sb+tb; G.score += gain;
  } else { G.streak = 0; }
  document.getElementById('hSc').textContent = G.score;
  document.getElementById('hStk').textContent = G.streak;
  const fb = document.getElementById('gFb');
  fb.className = 'gfb on '+(ok?'ok':'no');
  fb.innerHTML = (ok? `✅ <b>答對！+${gain} 分</b>（基礎10 + 連擊${sb} + 速度${tb}）<br>`
                    : (pick===-1?'⏰ <b>時間到！</b><br>':'❌ <b>答錯了</b><br>')) + G.cur.e;
  document.getElementById('gNext').style.display='inline-block';
  document.getElementById('gNext').textContent = (G.lv>=GAME.length-1)?'看成績 🏁':'下一關 ▶';
}
function gFinish(){
  clearInterval(G.timer);
  const max = GAME.length*20, pct = Math.round(G.score/max*100);
  const rank = pct>=85?['🏆','數論大師']:pct>=70?['🥇','高手']:pct>=50?['🥈','不錯']:['📖','再加油'];
  document.getElementById('gRank').textContent = rank[0];
  document.getElementById('gFinal').innerHTML = `<b class="hl">${G.score}</b> / ${max} 分　·　${rank[1]}`;
  document.getElementById('gStats').innerHTML = `最高連擊 <b class="hl">${G.best}</b>　·　完成 ${GAME.length} 關`;
  gShow('gEnd');
}

document.getElementById('gAgain').addEventListener('click', ()=>{ G.lv=0;G.score=0;G.streak=0;G.best=0; gShow('gPlay'); gLoad(); });

/* ===== Canvas ===== */
const VIZ = {}; let DPR=1;

/* ① 方程式判別器 */
const EQT=[
  {e:'2x + 3 = 11',  ok:true,  why:'1 個未知數 x、次方是 1、有等號 ✓'},
  {e:'x + 5 = 12',   ok:true,  why:'一元一次方程式的標準樣子 ✓'},
  {e:'2x + 3',       ok:false, why:'沒有等號 → 這是「代數式」，不是方程式'},
  {e:'x² + 1 = 5',   ok:false, why:'次方是 2 → 這是「二次」方程式，不是一次'},
  {e:'x + y = 3',    ok:false, why:'有 x、y 兩個未知數 → 這是「二元」，不是一元'},
  {e:'3 + 5 = 8',    ok:false, why:'沒有未知數 → 這只是普通的等式'},
  {e:'x/3 + 1/2 = 2',ok:true,  why:'有分數沒關係，x 的次方仍是 1 ✓'},
  {e:'3(x+2) − 5 = x + 7', ok:true, why:'兩邊都有 x 沒關係，化簡後仍是一次 ✓'},
  {e:'2/x = 5',      ok:false, why:'x 在分母 → 不是一次式（這叫分式方程式）'},
];
/* ③ 五步驟逐步器 */
const SOLVE=[
 {name:'兩邊都有 x', fr:[
   {t:'3(x + 2) − 5 = x + 7', hi:'原式', note:'左邊有括號 → 先做第 ① 步：去括號'},
   {t:'3x + 6 − 5 = x + 7',   hi:'① 去括號', note:'3(x+2) = 3x + 6　（每一項都要乘）'},
   {t:'3x + 1 = x + 7',       hi:'④ 先合併左邊', note:'6 − 5 = 1'},
   {t:'3x − x = 7 − 1',       hi:'③ 移項', note:'x 項移左、常數移右 —— 搬家都要變號'},
   {t:'2x = 6',               hi:'④ 合併同類項', note:'3x − x = 2x　；　7 − 1 = 6'},
   {t:'x = 3',                hi:'⑤ 兩邊同除以 2', note:'✓ 驗算：左 = 3(3+2)−5 = 10；右 = 3+7 = 10 ✓'}
 ]},
 {name:'含分數係數', fr:[
   {t:'x/3 + 1/2 = 2', hi:'原式', note:'有分數 → 第 ② 步：兩邊同乘分母的 LCM'},
   {t:'6×(x/3) + 6×(1/2) = 6×2', hi:'② 兩邊同乘 6', note:'LCM(3,2) = 6。⚠️ 每一項都要乘！'},
   {t:'2x + 3 = 12', hi:'② 分母消失了', note:'6÷3 = 2 → 2x；6÷2 = 3；6×2 = 12'},
   {t:'2x = 12 − 3', hi:'③ 移項', note:'+3 移到右邊變 −3'},
   {t:'2x = 9', hi:'④ 合併', note:'12 − 3 = 9'},
   {t:'x = 9/2', hi:'⑤ 兩邊同除以 2', note:'✓ 答案是分數很正常！驗算：4.5/3 + 0.5 = 2 ✓'}
 ]},
 {name:'⚠️ x 係數是負的', fr:[
   {t:'−2x + 5 = 11', hi:'原式', note:'沒有括號、沒有分數 → 直接第 ③ 步'},
   {t:'−2x = 11 − 5', hi:'③ 移項', note:'+5 移到右邊變 −5'},
   {t:'−2x = 6', hi:'④ 合併', note:'11 − 5 = 6。注意左邊係數是 −2'},
   {t:'x = 6 ÷ (−2)', hi:'⑤ 兩邊同除以 −2', note:'⚠️ 除以負數 —— 符號要翻轉！'},
   {t:'x = −3', hi:'✓ 完成', note:'✓ 驗算：−2(−3) + 5 = 6 + 5 = 11 ✓　（最多人算成 +3）'}
 ]}
];

function initViz(cv){
  const si=+cv.dataset.si, kind=cv.dataset.viz;
  const ctx=cv.getContext('2d');
  const st = VIZ[si] = {kind, cv, ctx};
  const ctrl = document.querySelector(`[data-ctrl="${si}"]`);
  if(kind==='eqtype'){
    st.i=0;
    ctrl.innerHTML = `<div class="readout" id="ro-${si}"></div>
      <button class="btn" data-t="prev" data-si="${si}">◀ 上一個</button>
      <button class="btn" data-t="next" data-si="${si}" style="background:rgba(242,217,121,.2);border-color:var(--yellow);color:var(--yellow);font-weight:700;">下一個 ▶</button>`;
  } else if(kind==='scale'){
    st.a=2; st.b=3; st.c=11; st.stage=0; st.broken=false;
    ctrl.innerHTML = `<div class="readout" id="ro-${si}"></div>
      <button class="btn" data-t="sub" data-si="${si}" style="background:rgba(166,214,160,.18);border-color:var(--green);color:var(--green);font-weight:700;">兩邊同減 常數</button>
      <button class="btn" data-t="div" data-si="${si}" style="background:rgba(166,214,160,.18);border-color:var(--green);color:var(--green);font-weight:700;">兩邊同除 係數</button>
      <button class="btn" data-t="bad" data-si="${si}" style="background:rgba(237,160,168,.18);border-color:var(--pink);color:var(--pink);">⚠️ 只減左邊（試試）</button>
      <button class="btn" data-t="rst" data-si="${si}">↩ 重設</button>
      <button class="btn" data-t="rnd" data-si="${si}">🎲 換題</button>`;
  } else {                       // steps
    st.ei=0; st.fi=0;
    ctrl.innerHTML = `<div class="readout" id="ro-${si}"></div>
      <button class="btn" data-t="next" data-si="${si}" style="background:rgba(242,217,121,.2);border-color:var(--yellow);color:var(--yellow);font-weight:700;">下一步 ▶</button>
      <button class="btn" data-t="rst" data-si="${si}">↩ 重設</button>
      <button class="btn" data-t="swap" data-si="${si}">🔀 換一題</button>`;
  }
  draw(si);
}

function drawEqType(st, ctx, w, h, ro){
  const E=EQT[st.i];
  ctx.textAlign='center';
  ctx.fillStyle='rgba(242,217,121,.85)'; ctx.font='bold 13px "Noto Sans TC"';
  ctx.fillText(`第 ${st.i+1} / ${EQT.length} 個　·　這是「一元一次方程式」嗎？`, w/2, 18);
  ctx.fillStyle='#f3efe2'; ctx.font='bold 27px "Noto Serif TC"';
  ctx.fillText(E.e, w/2, 58);
  // 判定章
  const col = E.ok ? '#a6d6a0' : '#eda0a8';
  ctx.fillStyle = E.ok ? 'rgba(166,214,160,.18)' : 'rgba(237,160,168,.18)';
  ctx.strokeStyle=col; ctx.lineWidth=2;
  const bw=Math.min(w-60, 150);
  ctx.beginPath(); ctx.roundRect((w-bw)/2, 74, bw, 30, 8); ctx.fill(); ctx.stroke();
  ctx.fillStyle=col; ctx.font='bold 17px "Noto Sans TC"';
  ctx.fillText(E.ok?'✓ 是':'✗ 不是', w/2, 95);
  // 理由
  ctx.fillStyle='rgba(243,239,226,.75)'; ctx.font='14px "Noto Sans TC"';
  const maxw=w-40; let line='', ly=126;
  for(const ch of E.why){
    if(ctx.measureText(line+ch).width>maxw){ ctx.fillText(line, w/2, ly); line=ch; ly+=20; }
    else line+=ch;
  }
  ctx.fillText(line, w/2, ly);
  // 三條件
  ctx.fillStyle='rgba(242,217,121,.6)'; ctx.font='12px "Noto Sans TC"';
  ctx.fillText('三個條件：① 1 個未知數　② 次方是 1　③ 有等號', w/2, h-8);
  ro.innerHTML = `<b>${E.e}</b>　→　<b style="color:${E.ok?'var(--green)':'var(--pink)'}">${E.ok?'✓ 是':'✗ 不是'}</b>一元一次方程式　｜　${E.why}`;
}

function drawScale(st, ctx, w, h, ro){
  const {a,b,c,stage,broken}=st;
  let L, R, sub;
  if(stage===0){ L=`${a}x + ${b}`; R=`${c}`; sub='原式 —— 天平平衡'; }
  else if(stage===1){ L=`${a}x`; R=`${c-b}`; sub=`兩邊同減 ${b} → 平衡保持`; }
  else { L='x'; R=`${(c-b)/a}`; sub=`兩邊同除 ${a} → 解出來了！`; }
  if(broken){ L=`${a}x`; R=`${c}`; sub='⚠️ 只減左邊 → 天平倒了 → 等式不成立！'; }
  const tilt = broken ? -9 : 0;
  const cx=w/2, cy=52, arm=Math.min(140, w*0.34);
  ctx.textAlign='center';
  ctx.fillStyle= broken?'#eda0a8':'rgba(242,217,121,.85)'; ctx.font='bold 13px "Noto Sans TC"';
  ctx.fillText(sub, cx, 16);
  // 柱與底座
  ctx.strokeStyle='#f3efe2'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx, h-28); ctx.stroke();
  ctx.fillStyle='rgba(243,239,226,.22)'; ctx.strokeStyle='#f3efe2'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(cx-38,h-28); ctx.lineTo(cx+38,h-28); ctx.lineTo(cx+26,h-16); ctx.lineTo(cx-26,h-16);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // 橫桿（旋轉）
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(tilt*Math.PI/180);
  ctx.strokeStyle= broken?'#eda0a8':'#f2d979'; ctx.lineWidth=3.5;
  ctx.beginPath(); ctx.moveTo(-arm, 0); ctx.lineTo(arm, 0); ctx.stroke();
  ctx.beginPath(); ctx.arc(0,0,5,0,7); ctx.fillStyle= broken?'#eda0a8':'#f2d979'; ctx.fill();
  [[-arm,'#98c9dc',L],[arm,'#a6d6a0',R]].forEach(([x,col,txt])=>{
    ctx.strokeStyle='rgba(243,239,226,.7)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,22); ctx.stroke();
    ctx.fillStyle= col.replace(')',', .16)').replace('#98c9dc','rgba(152,201,220').replace('#a6d6a0','rgba(166,214,160');
    ctx.strokeStyle=col; ctx.lineWidth=1.5;
    const pw=Math.min(112, arm*0.86);
    ctx.beginPath(); ctx.roundRect(x-pw/2, 22, pw, 32, 6); ctx.fill(); ctx.stroke();
    ctx.fillStyle=col; ctx.font='bold 19px "Noto Serif TC"';
    ctx.fillText(txt, x, 44);
  });
  ctx.restore();
  // 等式
  ctx.fillStyle= broken?'#eda0a8':'#f3efe2'; ctx.font='bold 19px "Noto Serif TC"';
  ctx.fillText(`${L}  ${broken?'≠':'='}  ${R}`, cx, h-40);
  ro.innerHTML = broken
    ? `<b style="color:var(--pink)">${L} ≠ ${R}</b>　⚠️ 只動一邊 → 天平倒了 → 等式不成立。<b>等量公理必須兩邊同時做！</b>`
    : `<b>${L} = ${R}</b>　｜　${sub}`
      + (stage===2 ? `　<span style="color:var(--green)">✓ 驗算：${a}(${(c-b)/a}) + ${b} = ${c}</span>` : '');
}

function drawSteps(st, ctx, w, h, ro){
  const E=SOLVE[st.ei], F=E.fr[st.fi];
  ctx.textAlign='center';
  ctx.fillStyle='rgba(242,217,121,.85)'; ctx.font='bold 13px "Noto Sans TC"';
  ctx.fillText(`第 ${st.ei+1} 題 · ${E.name}　（步驟 ${st.fi+1} / ${E.fr.length}）`, w/2, 18);
  // 步驟標籤
  const isWarn = F.hi.indexOf('⚠️')>=0 || F.note.indexOf('⚠️')>=0;
  const col = F.hi==='原式' ? 'rgba(243,239,226,.6)' : (isWarn ? '#eda0a8' : '#f2d979');
  ctx.font='bold 13px "Noto Sans TC"';
  const lw=ctx.measureText(F.hi).width+22;
  ctx.fillStyle= isWarn?'rgba(237,160,168,.18)':'rgba(242,217,121,.18)';
  ctx.strokeStyle=col; ctx.lineWidth=1.3;
  ctx.beginPath(); ctx.roundRect((w-lw)/2, 28, lw, 22, 6); ctx.fill(); ctx.stroke();
  ctx.fillStyle=col; ctx.fillText(F.hi, w/2, 43);
  // 式子
  ctx.fillStyle='#f3efe2'; ctx.font='bold 25px "Noto Serif TC"';
  ctx.fillText(F.t, w/2, 82);
  // 說明
  ctx.fillStyle= isWarn?'#eda0a8':'rgba(243,239,226,.75)'; ctx.font='14px "Noto Sans TC"';
  const maxw=w-40; let line='', ly=112;
  for(const ch of F.note){
    if(ctx.measureText(line+ch).width>maxw){ ctx.fillText(line, w/2, ly); line=ch; ly+=20; }
    else line+=ch;
  }
  ctx.fillText(line, w/2, ly);
  // 進度點
  const n=E.fr.length, dx=15, sx=w/2-(n-1)*dx/2;
  for(let i=0;i<n;i++){
    ctx.beginPath(); ctx.arc(sx+i*dx, h-14, 4.5, 0, 7);
    ctx.fillStyle = i<=st.fi ? '#f2d979' : 'rgba(243,239,226,.22)'; ctx.fill();
  }
  ro.innerHTML = `<b>${E.name}</b>　｜　步驟 ${st.fi+1}/${E.fr.length}　<b style="color:${col}">${F.hi}</b>：${F.t}　—　${F.note}`;
}

function draw(si){
  const st=VIZ[si]; if(!st) return;
  const {cv,ctx,kind}=st, w=cv.width/DPR, h=cv.height/DPR;
  ctx.clearRect(0,0,w,h);
  const ro=document.getElementById('ro-'+si);
  if(kind==='eqtype') drawEqType(st,ctx,w,h,ro);
  else if(kind==='scale') drawScale(st,ctx,w,h,ro);
  else if(kind==='steps') drawSteps(st,ctx,w,h,ro);
}

document.addEventListener('click', e=>{
  const btn=e.target.closest('[data-t]'); if(!btn) return;
  const si=+btn.dataset.si, st=VIZ[si]; if(!st) return;
  const t=btn.dataset.t;
  if(st.kind==='eqtype'){
    if(t==='next') st.i=(st.i+1)%EQT.length;
    if(t==='prev') st.i=(st.i-1+EQT.length)%EQT.length;
  } else if(st.kind==='scale'){
    if(t==='sub'){ st.broken=false; if(st.stage===0) st.stage=1; }
    if(t==='div'){ st.broken=false; if(st.stage===1) st.stage=2; }
    if(t==='bad'){ st.stage=0; st.broken=true; }
    if(t==='rst'){ st.stage=0; st.broken=false; }
    if(t==='rnd'){
      st.stage=0; st.broken=false;
      st.a=Math.floor(Math.random()*4)+2;          // 2..5
      const x=Math.floor(Math.random()*7)+1;       // 解 1..7（保證整除）
      st.b=Math.floor(Math.random()*8)+1;
      st.c=st.a*x+st.b;
    }
  } else {
    if(t==='next') st.fi=Math.min(SOLVE[st.ei].fr.length-1, st.fi+1);
    if(t==='rst')  st.fi=0;
    if(t==='swap'){ st.ei=(st.ei+1)%SOLVE.length; st.fi=0; }
  }
  draw(si);
});

function resizeAll(){
  DPR = Math.min(2, window.devicePixelRatio||1);
  document.querySelectorAll('canvas.viz').forEach(cv=>{
    const w = cv.clientWidth || cv.parentElement.clientWidth;
    const h = (cv.dataset.viz==='scale') ? 212 : 178;
    cv.width=w*DPR; cv.height=h*DPR; cv.style.height=h+'px';
    cv.getContext('2d').setTransform(DPR,0,0,DPR,0,0);
  });
  Object.keys(VIZ).forEach(k=>draw(+k));
}
document.querySelectorAll('canvas.viz').forEach(initViz);
window.addEventListener('resize', resizeAll);
resizeAll();
</script>
