<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>七上 3-3 應用問題｜互動教學平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@700;900&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--board:#16281c;--board2:#101f16;--chalk:#f3efe2;--soft:rgba(243,239,226,0.72);
--yellow:#f2d979;--pink:#eda0a8;--blue:#98c9dc;--green:#a6d6a0;--purple:#c9aee0;--wood:#6b4a32;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{background:#0a130d;font-family:'Noto Sans TC',sans-serif;color:var(--chalk);overscroll-behavior:none;}
.topbar{position:sticky;top:0;z-index:60;display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  padding:10px 16px;background:linear-gradient(180deg,#1b2f21,#132218);border-bottom:2px solid var(--wood);box-shadow:0 4px 18px rgba(0,0,0,0.5);}
.brand{font-family:'Noto Serif TC',serif;font-weight:900;font-size:clamp(15px,2.2vw,20px);color:var(--yellow);white-space:nowrap;}
.brand small{display:block;font-family:'Caveat',cursive;font-size:14px;color:var(--soft);font-weight:400;}
.spacer{flex:1;}
.btn{background:rgba(243,239,226,0.08);border:1.5px solid rgba(243,239,226,0.28);color:var(--chalk);
  border-radius:10px;padding:7px 13px;font-family:inherit;font-size:14px;cursor:pointer;white-space:nowrap;transition:.15s;}
.btn:hover{background:rgba(243,239,226,0.16);}
.tabs{display:flex;gap:6px;overflow-x:auto;padding:10px 16px 0;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{background:rgba(243,239,226,0.06);border:1.5px solid rgba(243,239,226,0.2);border-bottom:none;
  color:var(--soft);border-radius:10px 10px 0 0;padding:9px 15px;font-size:14px;cursor:pointer;white-space:nowrap;font-family:inherit;}
.tab.on{background:var(--board);border-color:var(--yellow);color:var(--yellow);font-weight:700;}
.tab .n{font-family:'Caveat',cursive;font-size:18px;margin-right:5px;}
.wrap{max-width:1180px;margin:0 auto;padding:0 16px 60px;}
.panel{display:none;}.panel.on{display:block;}
.card{background:radial-gradient(ellipse at 20% 10%,rgba(255,255,255,0.05),transparent 45%),
   linear-gradient(160deg,var(--board),var(--board2));
  border:1.5px solid rgba(242,217,121,0.16);border-radius:14px;padding:18px;margin-bottom:16px;
  box-shadow:0 8px 26px rgba(0,0,0,0.45);position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 38px,rgba(255,255,255,0.012) 38px,rgba(255,255,255,0.012) 39px);}
.card>*{position:relative;}
.card h3{font-family:'Noto Serif TC',serif;font-size:clamp(17px,2.4vw,21px);color:var(--yellow);
  margin-bottom:12px;padding-bottom:8px;border-bottom:2px dashed rgba(242,217,121,0.35);display:flex;align-items:center;gap:8px;}
.card h3 .ic{font-size:20px;}
.goals{display:flex;flex-wrap:wrap;gap:9px;}
.goal{display:flex;align-items:center;gap:9px;background:rgba(242,217,121,0.07);
  border:1.5px dashed rgba(242,217,121,0.4);border-radius:22px;padding:8px 15px 8px 8px;
  font-size:clamp(13.5px,1.8vw,15px);color:var(--yellow);line-height:1.5;}
.goal .bdg{width:24px;height:24px;border-radius:50%;background:var(--yellow);color:#16281c;
  font-weight:900;font-size:13px;display:flex;align-items:center;justify-content:center;flex:none;}
.deck{position:relative;background:rgba(0,0,0,0.22);border-radius:12px;padding:clamp(16px,3vw,30px);
  min-height:clamp(260px,42vh,380px);display:flex;flex-direction:column;justify-content:center;}
.sl{display:none;animation:fade .25s;}.sl.on{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.sl .eyebrow{font-family:'Caveat',cursive;font-size:20px;color:var(--yellow);margin-bottom:6px;}
.sl h4{font-family:'Noto Serif TC',serif;font-size:clamp(19px,3vw,27px);margin-bottom:12px;line-height:1.35;}
.sl p{font-size:clamp(15px,2vw,18px);line-height:1.8;margin-bottom:9px;}
.sl ul{list-style:none;}
.sl li{font-size:clamp(15px,2vw,18px);line-height:1.85;padding-left:26px;position:relative;margin-bottom:4px;}
.sl li::before{content:'✦';position:absolute;left:2px;color:var(--yellow);font-size:14px;top:3px;}
.nav{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:14px;}
.nav .pg{font-family:'Caveat',cursive;font-size:20px;color:var(--soft);min-width:64px;text-align:center;}
.dots{display:flex;gap:6px;justify-content:center;margin-top:10px;flex-wrap:wrap;}
.dot{width:9px;height:9px;border-radius:50%;background:rgba(243,239,226,0.25);cursor:pointer;border:none;padding:0;}
.dot.on{background:var(--yellow);transform:scale(1.3);}
.hl{color:var(--yellow);font-weight:700;}.hl-b{color:var(--blue);font-weight:700;}
.hl-r{color:var(--pink);font-weight:700;}.hl-g{color:var(--green);font-weight:700;}
.fm{font-family:'Noto Serif TC',serif;}
.box{background:rgba(152,201,220,0.1);border:1.5px solid rgba(152,201,220,0.32);border-radius:10px;
  padding:11px 15px;margin:9px 0;font-size:clamp(14px,1.9vw,17px);line-height:1.7;}
.box.y{background:rgba(242,217,121,0.1);border-color:rgba(242,217,121,0.36);}
.box.r{background:rgba(237,160,168,0.1);border-color:rgba(237,160,168,0.36);}
.box.g{background:rgba(166,214,160,0.1);border-color:rgba(166,214,160,0.32);}
.two{display:flex;gap:12px;flex-wrap:wrap;}.two>*{flex:1;min-width:220px;}
.teach{background:rgba(201,174,224,0.12);border:1.5px dashed rgba(201,174,224,0.5);
  border-radius:10px;padding:11px 15px;margin:9px 0;font-size:clamp(14px,1.8vw,15px);line-height:1.7;}
.teach b{color:var(--purple);}
.tbl{width:100%;border-collapse:collapse;margin:9px 0;font-size:clamp(13.5px,1.8vw,16px);}
.tbl th,.tbl td{border:1.5px solid rgba(243,239,226,0.24);padding:8px 11px;text-align:center;}
.tbl th{background:rgba(242,217,121,0.16);color:var(--yellow);font-weight:700;}
.cv-wrap{background:rgba(0,0,0,0.25);border-radius:12px;padding:10px;}
canvas.viz{width:100%;display:block;border-radius:8px;touch-action:none;}
.ctrl{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;align-items:center;}
.readout{font-family:'Noto Serif TC',serif;font-size:clamp(14px,1.9vw,18px);color:var(--chalk);
  background:rgba(242,217,121,0.1);border:1px solid rgba(242,217,121,0.3);border-radius:8px;
  padding:7px 12px;flex:1;min-width:220px;}
.readout b{color:var(--yellow);}
.q{background:rgba(0,0,0,0.2);border:1px solid rgba(242,217,121,0.18);border-radius:10px;padding:13px 15px;margin:10px 0;}
.q .qt{font-size:clamp(15px,2vw,17px);margin-bottom:10px;line-height:1.7;}
.q .qt .qn{font-family:'Caveat',cursive;color:var(--yellow);font-size:20px;margin-right:6px;}
.opts{display:flex;flex-direction:column;gap:7px;}
.opt{text-align:left;background:rgba(243,239,226,0.06);border:1.5px solid rgba(243,239,226,0.22);
  color:var(--chalk);border-radius:9px;padding:9px 13px;font-family:inherit;font-size:15px;cursor:pointer;transition:.15s;line-height:1.5;}
.opt:hover:not(:disabled){background:rgba(243,239,226,0.13);}
.opt.right{background:rgba(166,214,160,0.24);border-color:var(--green);color:#fff;font-weight:700;}
.opt.wrong{background:rgba(237,160,168,0.22);border-color:var(--pink);}
.opt:disabled{cursor:default;}
.fb{display:none;margin-top:9px;padding:9px 13px;border-radius:8px;font-size:14.5px;line-height:1.65;}
.fb.on{display:block;}
.fb.ok{background:rgba(166,214,160,0.14);border-left:3px solid var(--green);}
.fb.no{background:rgba(237,160,168,0.14);border-left:3px solid var(--pink);}
.fill{display:inline-block;background:rgba(0,0,0,0.3);border:none;border-bottom:2px solid var(--yellow);
  color:var(--yellow);font-family:'Noto Serif TC',serif;font-size:17px;width:110px;text-align:center;padding:3px 5px;margin:0 4px;}
.fill:focus{outline:none;background:rgba(242,217,121,0.12);}
.exq{background:rgba(0,0,0,0.26);border:1.5px solid rgba(242,217,121,0.28);border-radius:11px;padding:13px 15px;margin:10px 0;position:relative;}
.exq::before{content:'';position:absolute;top:-8px;left:32px;width:54px;height:14px;background:rgba(242,217,121,0.4);border-radius:2px;transform:rotate(-3deg);}
.exq .exq-q{font-size:clamp(14.5px,1.9vw,17px);line-height:1.75;margin-bottom:11px;}
.exo{text-align:left;background:rgba(243,239,226,0.06);border:1.5px solid rgba(243,239,226,0.22);
  color:var(--chalk);border-radius:9px;padding:9px 13px;font-family:inherit;font-size:clamp(14px,1.8vw,15.5px);
  cursor:pointer;transition:.15s;line-height:1.55;width:100%;margin-bottom:6px;display:block;}
.exo:hover:not(:disabled){background:rgba(243,239,226,0.13);}
.exo.right{background:rgba(166,214,160,0.26);border-color:var(--green);color:#fff;font-weight:700;}
.exo.wrong{background:rgba(237,160,168,0.2);border-color:var(--pink);opacity:.75;}
.exo:disabled{cursor:default;}
@keyframes shake{10%,90%{transform:translateX(-2px);}30%,70%{transform:translateX(4px);}50%{transform:translateX(-4px);}}
.exo.shake{animation:shake .4s;}
.exsol{display:none;margin-top:10px;padding:11px 14px;border-radius:9px;
  background:rgba(166,214,160,0.13);border-left:3px solid var(--green);font-size:clamp(14px,1.8vw,15.5px);line-height:1.75;}
.exsol.on{display:block;animation:fade .3s;}
.exsol .st{color:var(--soft);margin:3px 0;}
.exsol .an{color:var(--green);font-weight:700;margin-top:6px;}
.exlock{display:flex;align-items:center;gap:7px;margin-top:9px;font-size:13.5px;color:rgba(243,239,226,0.45);}
.exlock.hide{display:none;}
.info{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:11px;}
.icard{background:rgba(0,0,0,0.22);border:1.5px solid rgba(242,217,121,0.22);border-radius:11px;padding:14px;text-align:center;}
.icard .big{font-family:'Noto Serif TC',serif;font-size:clamp(17px,2.6vw,23px);font-weight:900;margin:6px 0;}
.icard .cap{font-size:13.5px;color:var(--soft);line-height:1.6;}
.frow{display:flex;gap:12px;align-items:center;padding:9px 12px;border-bottom:1px dashed rgba(243,239,226,0.16);}
.frow:last-child{border-bottom:none;}
.flab{color:var(--blue);font-weight:700;min-width:150px;font-size:clamp(13.5px,1.8vw,15.5px);flex:none;}
.fval{color:var(--yellow);font-weight:700;font-family:'Noto Serif TC',serif;font-size:clamp(14px,1.9vw,17px);}
@media(max-width:560px){.frow{flex-direction:column;align-items:flex-start;gap:3px;}.flab{min-width:0;}}
.hud{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:12px;}
.hud .st{background:rgba(0,0,0,0.3);border:1.5px solid rgba(242,217,121,0.28);border-radius:9px;
  padding:7px 13px;font-size:14px;flex:1;min-width:88px;text-align:center;}
.hud .st b{display:block;font-family:'Noto Serif TC',serif;font-size:20px;color:var(--yellow);}
.tbar{height:8px;background:rgba(0,0,0,0.35);border-radius:5px;overflow:hidden;margin-bottom:12px;}
.tfill{height:100%;background:linear-gradient(90deg,var(--green),var(--yellow),var(--pink));width:100%;transition:width .1s linear;}
.gscreen{display:none;}.gscreen.on{display:block;}
.lvchips{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin:14px 0;}
.lvchip{background:rgba(152,201,220,0.12);border:1.5px solid rgba(152,201,220,0.35);border-radius:18px;
  padding:6px 13px;font-size:13.5px;color:var(--blue);}
.lvchip.done{background:rgba(166,214,160,0.2);border-color:var(--green);color:var(--green);}
.lvchip.now{background:rgba(242,217,121,0.22);border-color:var(--yellow);color:var(--yellow);font-weight:700;}
.gq{font-size:clamp(16px,2.2vw,20px);line-height:1.7;margin:14px 0;text-align:center;font-family:'Noto Serif TC',serif;}
.gopts{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
@media(max-width:560px){.gopts{grid-template-columns:1fr;}}
.gopt{background:rgba(243,239,226,0.07);border:1.5px solid rgba(243,239,226,0.25);color:var(--chalk);
  border-radius:10px;padding:12px;font-family:'Noto Serif TC',serif;font-size:17px;cursor:pointer;transition:.15s;min-height:48px;}
.gopt:hover:not(:disabled){background:rgba(243,239,226,0.15);}
.gopt.right{background:rgba(166,214,160,0.3);border-color:var(--green);font-weight:900;}
.gopt.wrong{background:rgba(237,160,168,0.25);border-color:var(--pink);}
.gfb{margin-top:11px;padding:10px 13px;border-radius:8px;font-size:14.5px;line-height:1.6;display:none;}
.gfb.on{display:block;}
.gfb.ok{background:rgba(166,214,160,0.15);border-left:3px solid var(--green);}
.gfb.no{background:rgba(237,160,168,0.15);border-left:3px solid var(--pink);}
.rank{font-size:54px;text-align:center;margin:10px 0;}
.hint{text-align:center;color:rgba(243,239,226,0.35);font-size:12.5px;padding:8px 0 0;}
@media (max-width:640px){.topbar{padding:8px 10px;gap:8px;}.wrap{padding:0 10px 70px;}.card{padding:13px;}}
</style></head><body>

<div class="topbar">
  <div class="brand">3-3　應用問題<small>七上 · 第3章 · 七上完結篇</small></div>
  <div class="spacer"></div>
</div>

<div class="tabs" id="tabs">
  <button class="tab on" data-p="0"><span class="n">🔑</span>五步驟與不變量</button>
  <button class="tab" data-p="1"><span class="n">🚗</span>行程問題</button>
  <button class="tab" data-p="2"><span class="n">🧪</span>工作與濃度</button>
  <button class="tab" data-p="3"><span class="n">★</span>題型測驗</button>
  <button class="tab" data-p="4"><span class="n">🎮</span>闖關遊戲</button>
</div>

<div class="wrap">
  <div class="card" id="goalCard">
    <h3><span class="ic">🎯</span>本節學習目標</h3>
    <div class="goals" id="goals"></div>
  </div>
  <div id="wrap"></div>
</div>

<script>
const GOALS = [
  '掌握應用問題的五步驟解題流程',
  '能正確設未知數，寫出「設…為 x」',
  '能抓住每種題型的關鍵不變量',
  '能處理數字、行程、工作、分配、濃度五大題型',
  '能分辨相向（速度相加）與追及（速度相減）',
  '解完後能檢查合理性（人數不能是小數或負數）',
];

const DATA = [
{ key:'invar', viz:'invar', vizTitle:'不變量偵測器 —— 先自己想，想好再按「揭曉」（9 題涵蓋全部題型）',
  slides:[
    {eb:'細目 ①', h:'應用問題五步驟', html:`
      <div class="box y" style="text-align:center;font-size:17px;padding:14px;">
        <span class="hl">① 設未知數　→　② 找不變量　→　③ 列式　→　④ 解方程式　→　⑤ 檢查合理性</span></div>
      <table class="tbl">
        <tr><th style="width:9%;">　</th><th style="width:28%;">動作</th><th>關鍵</th></tr>
        <tr><td class="hl" style="font-size:18px;">①</td><td><b>設未知數</b></td><td>一定要寫出「<span class="hl-r">設…為 x</span>」</td></tr>
        <tr><td class="hl" style="font-size:18px;">②</td><td><b>找不變量</b></td><td class="hl">「這題真正<b>不會變</b>的東西是什麼？」</td></tr>
        <tr><td class="hl" style="font-size:18px;">③</td><td><b>列式</b></td><td>把不變量寫成<b>等式的兩邊</b></td></tr>
        <tr><td class="hl" style="font-size:18px;">④</td><td><b>解方程式</b></td><td>3-2 的五步驟</td></tr>
        <tr><td class="hl" style="font-size:18px;">⑤</td><td><b>檢查合理性</b></td><td>人數不能是<b>負數或小數</b></td></tr>
      </table>`},
    {eb:'細目 ① 🔑', h:'第 ② 步是整節的靈魂', html:`
      <div class="box y" style="text-align:center;font-size:21px;padding:16px;"><span class="hl">「這題真正不會變的東西是什麼？」</span></div>
      <table class="tbl">
        <tr><th style="width:34%;">題型</th><th>不變量</th></tr>
        <tr><td class="hl-b">行程（相向）</td><td class="hl"><b>總距離</b></td></tr>
        <tr><td class="hl-b">行程（追及）</td><td class="hl"><b>追上時兩人的位置</b></td></tr>
        <tr><td class="hl-b">工作</td><td class="hl"><b>總工作量 = 1</b></td></tr>
        <tr><td class="hl-b">分配</td><td class="hl"><b>總金額</b></td></tr>
        <tr><td class="hl-b">濃度</td><td class="hl"><b>溶質的重量</b></td></tr>
      </table>
      <div class="box g" style="text-align:center;">💡 找到不變量 → <span class="hl">它就是等號</span>。方程式就寫出來了。</div>`},
    {eb:'細目 ① ⚠️', h:'千萬不要跳過「設…為 x」', html:`
      <div class="box r" style="text-align:center;font-size:18px;">
        ❌ 直接列式 → 解出 <span class="fm">x = 30</span> → <span class="hl-r">「所以 30 是什麼？人數？錢？天數？」</span></div>
      <div class="box g"><b class="hl-g">✓ 正確做法</b><br>
        「<span class="hl">設原本預計參加的人數為 x 人</span>」← 寫下這句話，只要三秒<br>
        解出 x = 30 → 立刻知道：<b>原本預計 30 人</b></div>
      <div class="box y" style="text-align:center;"><span class="hl">設未知數不是形式，是在幫未來的自己。</span>題目越長，這句話越重要。</div>
      <div class="teach"><b>而且「設」還要寫單位。</b>「設 x」和「設兒子現在 <b>x 歲</b>」差很多 —— 後者讓你在列式時自動想到「5 年後是 x+5」。</div>`},
    {eb:'題型 1', h:'數字問題：連續整數怎麼設', html:`
      <div class="two">
        <div class="box"><b class="hl-b">連續整數</b><br><span class="fm" style="font-size:18px;">x、x+1、x+2</span></div>
        <div class="box g"><b class="hl-g">連續偶數（或奇數）</b><br><span class="fm" style="font-size:18px;">x、x+2、x+4</span></div>
      </div>
      <div class="box"><b>兩個連續整數的和是 47</b><br>
        設較小的為 <span class="fm hl">x</span> → 較大的是 <span class="fm hl">x+1</span><br>
        <span class="fm">x + (x+1) = 47 → 2x = 46 → x = 23</span> → <b>23 和 24</b></div>
      <div class="box y"><b>為什麼連續偶數是 x、x+2 而不是 x、x+1？</b>因為偶數之間差 <span class="hl">2</span>（2, 4, 6, 8…）。連續奇數也是差 2。</div>`},
    {eb:'細目 ① 第⑤步', h:'不是每個「數學上正確」的答案都對', html:`
      <table class="tbl">
        <tr><th style="width:38%;">量</th><th style="width:30%;">可以是小數嗎？</th><th>可以是負數嗎？</th></tr>
        <tr><td class="hl-b"><b>人數、個數、袋數</b></td><td class="hl-r">❌ 必須是<b>整數</b></td><td class="hl-r">❌</td></tr>
        <tr><td class="hl-b"><b>年齡</b></td><td class="hl-r">❌ 通常是整數</td><td class="hl-r">❌</td></tr>
        <tr><td class="hl-b"><b>時間</b></td><td class="hl-g">✅（如 3.6 小時）</td><td class="hl-r">❌</td></tr>
        <tr><td class="hl-b"><b>距離、重量</b></td><td class="hl-g">✅</td><td class="hl-r">❌</td></tr>
      </table>
      <div class="box y" style="text-align:center;">💡 解出 <span class="fm hl-r">x = 30.5 人</span> → <span class="hl">一定是算錯了</span>！</div>
      <div class="box g"><b>檢查合理性是抓計算錯誤的好方法。</b>它不花時間，但能救你 —— <b>因為答案荒謬的時候，人會停下來重算</b>。</div>`},
    {eb:'例題 1 ★☆☆', h:'數字問題', html:`
      <div class="exq" data-a="1">
        <div class="exq-q"><span class="hl">Q</span>　兩個<b>連續偶數</b>之和是 50，求這兩個數</div>
        <button class="exo" data-i="0">24 和 25</button>
        <button class="exo" data-i="1">24 和 26</button>
        <button class="exo" data-i="2">25 和 25</button>
        <button class="exo" data-i="3">23 和 27</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st">設較小的偶數為 x → 下一個偶數是 <b>x + 2</b>（偶數之間差 2！）</div>
          <div class="st fm">x + (x+2) = 50 → 2x + 2 = 50 → 2x = 48 → x = 24</div>
          <div class="st fm">兩數：24 和 26。驗算：24 + 26 = 50 ✓</div>
          <div class="st">(A) 是把「連續偶數」當成「連續整數」設成 x、x+1 —— <span class="hl-r">25 不是偶數！</span></div>
          <div class="an">答：24 和 26</div>
        </div>
      </div>`},
    {eb:'例題 2 ★★☆', h:'分配問題', html:`
      <div class="exq" data-a="2">
        <div class="exq-q"><span class="hl">Q</span>　原本預計 x 人包車，每人 150 元；後來 <b>5 人取消</b>，剩下的人每人要付 180 元（<b>總車費不變</b>）。原本預計幾人？</div>
        <button class="exo" data-i="0">25 人</button>
        <button class="exo" data-i="1">20 人</button>
        <button class="exo" data-i="2">30 人</button>
        <button class="exo" data-i="3">35 人</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st"><b>② 不變量：總車費</b> —— 不管幾個人分攤，總數固定</div>
          <div class="st fm"><b>③ 列式</b>：150x = 180(x − 5)　← 左邊是總車費，右邊也是總車費</div>
          <div class="st fm"><b>④ 解</b>：150x = 180x − 900 → −30x = −900 → x = 30</div>
          <div class="st fm"><b>驗算</b>：150 × 30 = 4500；剩 25 人 → 4500 ÷ 25 = 180 ✓</div>
          <div class="st">(A) 25 人是<b>取消後</b>的人數，不是原本的 —— 題目問「<b>原本</b>預計幾人」！</div>
          <div class="st">💡 列式訣竅：「<b>總車費 = 總車費</b>」—— 用兩種方式表達同一個東西。</div>
          <div class="an">答：原本預計 30 人</div>
        </div>
      </div>`}
  ],

},
{ key:'trip', viz:'trip', vizTitle:'行程動態模擬 —— 按時間鍵看兩人怎麼靠近；三種模式可切換',
  slides:[
    {eb:'題型 2 ⚠️ 最常搞混', h:'相向「相加」，追及「相減」', html:`
      <div class="box y" style="text-align:center;font-size:19px;"><span class="fm hl">距離 = 速度 × 時間</span></div>
      <table class="tbl">
        <tr><th style="width:24%;">情況</th><th style="width:40%;">關係</th><th>速度</th></tr>
        <tr><td class="hl-g"><b>相向而行</b><br><span style="font-size:13px;">（面對面接近）</span></td><td>兩者距離之<b>和</b> = 總距離</td><td class="hl-g" style="font-size:17px;">相<b>加</b></td></tr>
        <tr><td class="hl-r"><b>同向追及</b><br><span style="font-size:13px;">（後面追前面）</span></td><td>追上時兩人<b>位置相同</b></td><td class="hl-r" style="font-size:17px;">相<b>減</b></td></tr>
        <tr><td class="hl-b"><b>反向而行</b><br><span style="font-size:13px;">（背對背遠離）</span></td><td>兩者距離之<b>和</b> = 相距</td><td class="hl-b" style="font-size:17px;">相<b>加</b></td></tr>
      </table>
      <div class="box g"><b>💡 為什麼？用想的不用背：</b><br>
        <span class="hl-g">相向</span>是「<b>一起把距離吃掉</b>」→ 兩人的速度<b>都在幫忙</b> → <b>相加</b><br>
        <span class="hl-r">追及</span>是「<b>後面比前面快多少</b>」→ 只有<b>速度差</b>在縮短距離 → <b>相減</b></div>`},
    {eb:'例題 3 ★★☆', h:'相向而行', html:`
      <div class="exq" data-a="1">
        <div class="exq-q"><span class="hl">Q</span>　兩地相距 360 公里，甲車時速 60、乙車時速 40，同時出發<b>相向而行</b>，幾小時後相遇？</div>
        <button class="exo" data-i="0">18 小時</button>
        <button class="exo" data-i="1">3.6 小時</button>
        <button class="exo" data-i="2">6 小時</button>
        <button class="exo" data-i="3">9 小時</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st"><b>② 不變量</b>：總距離 360 公里</div>
          <div class="st fm"><b>③ 列式</b>：60t + 40t = 360　（相向 → 速度<b>相加</b>）</div>
          <div class="st fm"><b>④ 解</b>：100t = 360 → t = 3.6</div>
          <div class="st fm"><b>⑤ 檢查</b>：時間<b>可以</b>是小數 ✓</div>
          <div class="st">(A) 18 小時是用「速度<b>相減</b>」算的（360 ÷ 20）—— <span class="hl-r">相向要相加！</span></div>
          <div class="st">💡 到下方的<b>行程動態模擬</b>按「時間 +」，親眼看兩台車怎麼靠近。</div>
          <div class="an">答：3.6 小時後相遇</div>
        </div>
      </div>`},
    {eb:'例題 4 ★★★', h:'追及問題（本節最難）', html:`
      <div class="box">家到學校 4.8 公里。弟弟先走（時速 4），哥哥<b>晚 10 分鐘</b>出發（時速 16）。</div>
      <div class="exq" data-a="0">
        <div class="exq-q"><span class="hl">Q</span>　哥哥出發後多久<b>追上</b>弟弟？</div>
        <button class="exo" data-i="0">1/18 小時（約 3.3 分鐘）</button>
        <button class="exo" data-i="1">1/6 小時（10 分鐘）</button>
        <button class="exo" data-i="2">1/3 小時（20 分鐘）</button>
        <button class="exo" data-i="3">追不上</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st"><b>先算「頭」</b>：哥哥出發時，弟弟已走 10 分 = 1/6 小時 → 已走 <b>4 × 1/6 = 2/3 公里</b></div>
          <div class="st"><b>② 不變量</b>：<b>追上 = 兩人位置相同</b></div>
          <div class="st fm">哥哥走的 = 16t　；　弟弟的位置 = 2/3 + 4t</div>
          <div class="st fm"><b>③ 列式</b>：16t = 2/3 + 4t　→　12t = 2/3　→　t = 1/18 小時 ≈ 3.3 分</div>
          <div class="st fm"><b>⑤ 檢查</b>：追上時哥哥走 16 × 1/18 = 8/9 ≈ 0.89 km &lt; 4.8 ✓ 確實在到校前追上</div>
          <div class="an">答：約 1/18 小時（約 3.3 分鐘）後追上</div>
        </div>
      </div>`},
    {eb:'💡 重要觀念', h:'追及的兩種寫法，其實是同一個', html:`
      <div class="two">
        <div class="box"><b class="hl-b">寫法一：位置相等</b><br>
          <span class="fm" style="font-size:17px;">16t = 2/3 + 4t</span><br><span style="font-size:13px;color:var(--soft)">哥哥走的 = 弟弟的位置</span></div>
        <div class="box g"><b class="hl-g">寫法二：速度差追頭</b><br>
          <span class="fm" style="font-size:17px;">(16 − 4)t = 2/3</span><br><span style="font-size:13px;color:var(--soft)">用速度差把「頭」吃掉</span></div>
      </div>
      <div class="box y" style="text-align:center;">
        把寫法一的 <span class="fm">4t</span> 移到左邊 → <span class="fm">16t − 4t = 2/3</span> → <span class="fm">12t = 2/3</span><br>
        <span class="hl">就是寫法二。兩式完全相同。</span></div>
      <div class="box g"><b>這就是「追及速度相減」的由來 ——</b>它不是一條要背的公式，是<span class="hl">移項的結果</span>。</div>
      <div class="teach"><b>這是整節最值得帶走的觀念：</b>那些看起來要背的「題型公式」，其實都是<b>基本原理 + 移項</b>推出來的。<b>懂原理的人不用背公式。</b></div>`},
    {eb:'例題 5 ★★☆', h:'反向而行', html:`
      <div class="exq" data-a="2">
        <div class="exq-q"><span class="hl">Q</span>　兩車同時從<b>同一地點</b>出發、<b>反方向</b>而行，甲時速 50、乙時速 70，幾小時後相距 480 公里？</div>
        <button class="exo" data-i="0">24 小時</button>
        <button class="exo" data-i="1">6 小時</button>
        <button class="exo" data-i="2">4 小時</button>
        <button class="exo" data-i="3">9.6 小時</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st"><b>② 不變量</b>：相距 480 公里</div>
          <div class="st fm"><b>③ 列式</b>：50t + 70t = 480　（反向 → 速度<b>相加</b>）</div>
          <div class="st fm"><b>④ 解</b>：120t = 480 → t = 4</div>
          <div class="st">(A) 24 小時是用速度<b>相減</b>（480 ÷ 20）—— 反向和相向一樣要<b>相加</b>！</div>
          <div class="st">💡 <b>反向和相向的數學是一樣的</b>：都是「兩人一起改變距離」→ 相加。<br>
            差別只在相向是「把距離吃掉」、反向是「把距離拉開」。</div>
          <div class="an">答：4 小時</div>
        </div>
      </div>`}
  ],
  fa:[
    {q:'相向而行時，兩車速度要？', o:['相加','相減','相乘','相除'], a:0, e:'相向是「一起把距離吃掉」→ 兩人的速度都在幫忙 → 相加。'},
    {q:'同向追及時，兩車速度要？', o:['相加','相減','相乘','不用管'], a:1, e:'追及是「後面比前面快多少」→ 只有速度差在縮短距離 → 相減。'},
    {q:'判斷：「相向速度相減、追及速度相加」', o:['對','錯，剛好相反','對，但要看題目','不一定'], a:1, e:'錯！剛好相反：相向相加、追及相減。'}
  ],
  info:[
    {big:'相向・反向 → 加', cap:'兩人一起<br>改變距離', c:'var(--green)'},
    {big:'追及 → 減', cap:'只有速度差<br>在縮短距離', c:'var(--pink)'},
    {big:'公式是推出來的', cap:'「速度相減」<br>就是移項的結果', c:'var(--yellow)'}
  ]
},
{ key:'conc', viz:'conc', vizTitle:'濃度杯 —— 切換「加水／加純糖」，看溶質到底變不變',
  slides:[
    {eb:'題型 3', h:'工作問題：把整件工作看成「1」', html:`
      <div class="box y" style="text-align:center;font-size:18px;">甲 n 天完成　→　甲<b>每天</b>做 <span class="fm hl" style="font-size:21px;">1/n</span></div>
      <div class="box"><b>甲單獨 8 天、乙單獨 12 天，合作幾天完成？</b><br>
        <b>② 不變量</b>：總工作量 = <span class="hl">1</span><br>
        甲每天 <span class="fm">1/8</span>、乙每天 <span class="fm">1/12</span><br>
        <b>③ 列式</b>：<span class="fm">t × (1/8 + 1/12) = 1</span><br>
        <b>④ 解</b>：通分（<span class="hl">LCM = 24</span>）→ <span class="fm">5/24</span>；<span class="fm">t × 5/24 = 1 → t = 24/5 = 4.8</span></div>
      <div class="box g"><b>為什麼是「1」？</b>因為<b>整件工作</b>就是 100% = <span class="hl">1</span>。<br>
        💡 這裡用到 <span class="hl">2-2 的 LCM</span> 和 <span class="hl">2-3 的分數加法</span> —— 老朋友又出現了。</div>`},
    {eb:'題型 5', h:'濃度問題：不變量是溶質重量', html:`
      <div class="box y" style="text-align:center;font-size:19px;"><span class="fm hl">濃度 = 溶質 ÷ 溶液總重</span></div>
      <div class="box"><b>300 克食鹽水，含鹽率 8%，加多少克<b>水</b>才降到 5%？</b><br>
        <b>② 不變量</b>：<span class="hl">鹽的重量</span> —— <b class="hl-r">加水不會讓鹽變多！</b><br>
        原本鹽量 = <span class="fm">300 × 8% = 24 克</span><br>
        <b>③ 列式</b>：<span class="fm">24 ÷ (300 + x) = 5%</span><br>
        <b>④ 解</b>：<span class="fm">24 = 15 + 0.05x → x = 180</span>；驗算 <span class="fm">24 ÷ 480 = 5%</span> ✓</div>
      <div class="box r" style="text-align:center;">⚠️ <b class="hl-r">最常見誤解：以為「加水會讓鹽也跟著變多」。</b><br>
        <span class="hl">加的是水，鹽的重量完全不變</span> —— 這就是不變量。</div>`},
    {eb:'題型 5 ⚠️ 關鍵區別', h:'加「水」和加「純糖」完全不一樣', html:`
      <div class="two">
        <div class="box"><b class="hl-b">加水</b>　300g 鹽水 8% → 5%<br>
          鹽：<span class="hl-g">不變</span>（24g）<br>總重：<span class="hl-r">變</span>（300 → 300+x）<br>
          <span class="fm" style="font-size:16px;">24 / (300+x) = 0.05</span><br>
          <span style="font-size:13px;color:var(--soft)">只有<b>分母</b>加 x</span></div>
        <div class="box g"><b class="hl-g">加純糖</b>　200g 糖水 10% → 20%<br>
          糖：<span class="hl-r">變</span>（20 → 20+x）<br>總重：<span class="hl-r">也變</span>（200 → 200+x）<br>
          <span class="fm" style="font-size:16px;">(20+x) / (200+x) = 0.2</span><br>
          <span style="font-size:13px;color:var(--soft)">分子分母<b>都</b>加 x</span></div>
      </div>
      <div class="box y" style="text-align:center;">👉 用下方的<b>濃度杯</b>切換兩種模式，<span class="hl">親眼看溶質到底變不變</span>。</div>`},
    {eb:'例題 6 ★★★', h:'濃度：加水', html:`
      <div class="exq" data-a="3">
        <div class="exq-q"><span class="hl">Q</span>　300 克食鹽水含鹽率 8%，要加多少克<b>水</b>才能降到 5%？</div>
        <button class="exo" data-i="0">120 克</button>
        <button class="exo" data-i="1">300 克</button>
        <button class="exo" data-i="2">480 克</button>
        <button class="exo" data-i="3">180 克</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st"><b>② 不變量：鹽的重量</b>（加水鹽不變！）</div>
          <div class="st fm">原本鹽量 = 300 × 8% = 24 克</div>
          <div class="st fm"><b>③ 列式</b>：24 ÷ (300 + x) = 0.05</div>
          <div class="st fm"><b>④ 解</b>：24 = 0.05(300+x) → 24 = 15 + 0.05x → 9 = 0.05x → x = 180</div>
          <div class="st fm"><b>驗算</b>：24 ÷ (300+180) = 24/480 = 5% ✓</div>
          <div class="st">(C) 480 是<b>加水後的總重</b>，不是加了多少水 —— 題目問「<b>加多少</b>」！</div>
          <div class="an">答：加 180 克水</div>
        </div>
      </div>`},
    {eb:'例題 7 ★★★', h:'濃度：加純糖（分子分母都變）', html:`
      <div class="exq" data-a="0">
        <div class="exq-q"><span class="hl">Q</span>　200 克糖水含糖率 10%，加多少克<b>純糖</b>可提高到 20%？</div>
        <button class="exo" data-i="0">25 克</button>
        <button class="exo" data-i="1">20 克</button>
        <button class="exo" data-i="2">40 克</button>
        <button class="exo" data-i="3">50 克</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st fm">原糖量 = 200 × 10% = 20 克</div>
          <div class="st"><b>⚠️ 關鍵</b>：加的是<b>純糖</b> → 糖變成 (20+x)，總重變成 (200+x) —— <span class="hl-r">兩邊都變！</span></div>
          <div class="st fm"><b>③ 列式</b>：(20 + x) ÷ (200 + x) = 0.2</div>
          <div class="st fm"><b>④ 解</b>：20 + x = 0.2(200+x) = 40 + 0.2x → 0.8x = 20 → x = 25</div>
          <div class="st fm"><b>驗算</b>：(20+25) ÷ 225 = 45/225 = 20% ✓</div>
          <div class="st">(C) 40 克是只改分子的錯誤做法（把分母當成不變的 200）。</div>
          <div class="an">答：加 25 克純糖</div>
        </div>

function gLoad(){
  if(G.lv>=GAME.length){ gFinish(); return; }
  G.answered=false; G.t=20;
  const bank = GAME[G.lv].qs;
  G.cur = bank[Math.floor(Math.random()*bank.length)];
  document.getElementById('hLv').textContent = (G.lv+1)+'/'+GAME.length;
  document.getElementById('hSc').textContent = G.score;

  document.getElementById('gQ').innerHTML = `<span style="color:var(--blue);font-size:15px;">第 ${G.lv+1} 關 · ${GAME[G.lv].name}</span><br>${G.cur.q}`;
  document.getElementById('gO').innerHTML = G.cur.o.map((o,i)=>
    `<button class="gopt" data-g="${i}">${'ABCD'[i]}. ${o}</button>`).join('');
  document.getElementById('gFb').className='gfb';
  document.getElementById('gNext').style.display='none';
  gChips();
  clearInterval(G.timer);
  G.timer = setInterval(()=>{
    G.t -= 0.1;
    document.getElementById('hT').textContent = Math.max(0,G.t).toFixed(0);
    document.getElementById('tFill').style.width = Math.max(0,G.t/20*100)+'%';
    if(G.t<=0){ clearInterval(G.timer); gAnswer(-1); }
  },100);
}
function gAnswer(pick){
  if(G.answered) return;
  G.answered = true; clearInterval(G.timer);
  const ans = G.cur.a, ok = pick===ans;
  document.querySelectorAll('.gopt').forEach((b,i)=>{
    b.disabled=true;
    if(i===ans) b.classList.add('right'); else if(i===pick) b.classList.add('wrong');
  });
  let gain=0, sb=0, tb=0;
  if(ok){
    G.streak++; G.best=Math.max(G.best,G.streak);
    sb = Math.min(5, G.streak-1); tb = Math.min(5, Math.floor(G.t/4));
    gain = 10+sb+tb; G.score += gain;
  } else { G.streak = 0; }
  document.getElementById('hSc').textContent = G.score;
  document.getElementById('hStk').textContent = G.streak;
  const fb = document.getElementById('gFb');
  fb.className = 'gfb on '+(ok?'ok':'no');
  fb.innerHTML = (ok? `✅ <b>答對！+${gain} 分</b>（基礎10 + 連擊${sb} + 速度${tb}）<br>`
                    : (pick===-1?'⏰ <b>時間到！</b><br>':'❌ <b>答錯了</b><br>')) + G.cur.e;
  document.getElementById('gNext').style.display='inline-block';
  document.getElementById('gNext').textContent = (G.lv>=GAME.length-1)?'看成績 🏁':'下一關 ▶';
}
function gFinish(){
  clearInterval(G.timer);
  const max = GAME.length*20, pct = Math.round(G.score/max*100);
  const rank = pct>=85?['🏆','數論大師']:pct>=70?['🥇','高手']:pct>=50?['🥈','不錯']:['📖','再加油'];
  document.getElementById('gRank').textContent = rank[0];
  document.getElementById('gFinal').innerHTML = `<b class="hl">${G.score}</b> / ${max} 分　·　${rank[1]}`;
  document.getElementById('gStats').innerHTML = `最高連擊 <b class="hl">${G.best}</b>　·　完成 ${GAME.length} 關`;
  gShow('gEnd');
}

function drawInvar(st, ctx, w, h, ro){
  const E=INV[st.i];
  ctx.textAlign='center';

  ctx.fillText(`第 ${st.i+1} / ${INV.length} 題　·　【${E.k}】　問問自己：這題真正不會變的東西是什麼？`, w/2, 16);
  // 題目
  ctx.fillStyle='rgba(243,239,226,.9)'; ctx.font='15px "Noto Sans TC"';
  const maxw=w-44; let line='', ly=42;
  for(const ch of E.q){
    if(ctx.measureText(line+ch).width>maxw){ ctx.fillText(line, w/2, ly); line=ch; ly+=21; }
    else line+=ch;
  }
  ctx.fillText(line, w/2, ly);
  const y0=ly+20;
  if(!st.show){
    ctx.fillStyle='rgba(243,239,226,.06)';
    ctx.strokeStyle='rgba(243,239,226,.25)'; ctx.lineWidth=1.5; ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.roundRect(24, y0, w-48, 60, 8); ctx.fill(); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle='rgba(243,239,226,.4)'; ctx.font='14px "Noto Sans TC"';

    ctx.fillStyle='rgba(242,217,121,.14)';
    ctx.strokeStyle='rgba(242,217,121,.6)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(24, y0, w-48, 30, 7); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#f2d979'; ctx.font='bold 15px "Noto Sans TC"';
    ctx.fillText('不變量：' + E.iv, w/2, y0+20);
    ctx.fillStyle='#a6d6a0'; ctx.font='bold 18px "Noto Serif TC"';
    ctx.fillText(E.eq, w/2, y0+56);
    ctx.fillStyle='rgba(166,214,160,.75)'; ctx.font='14px "Noto Sans TC"';

}

const TRIP=[
  {n:'相向而行', D:360, v1:60, v2:40, head:0, ans:3.6, unit:'小時',
   eq:'60t + 40t = 360', why:'兩人一起把距離吃掉 → 速度相加', goal:'相遇'},
  {n:'反向而行', D:480, v1:50, v2:70, head:0, ans:4, unit:'小時',
   eq:'50t + 70t = 480', why:'兩人一起把距離拉開 → 速度相加', goal:'相距 480km'},
  {n:'同向追及', D:4.8, v1:4, v2:16, head:2/3, ans:1/18, unit:'小時',
   eq:'16t = 2/3 + 4t', why:'只有速度差在縮短距離 → 速度相減', goal:'追上'},
];
function drawTrip(st, ctx, w, h, ro){
  const T=TRIP[st.mode], t=st.t;
  const isChase = st.mode===2;
  ctx.textAlign='center';
  ctx.fillStyle='#98c9dc'; ctx.font='bold 14px "Noto Sans TC"';
  ctx.fillText(`【${T.n}】　${T.why}`, w/2, 16);
  const L=36, R=w-36, Y=74;
  const span = isChase ? T.D : T.D;
  const X = d => L + (d/span)*(R-L);
  // 路線
  ctx.strokeStyle='rgba(243,239,226,.55)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(L,Y); ctx.lineTo(R,Y); ctx.stroke();
  [[L,'起點'],[R, isChase?'學校':'終點']].forEach(([x,lab])=>{
    ctx.strokeStyle='rgba(243,239,226,.55)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x,Y-7); ctx.lineTo(x,Y+7); ctx.stroke();
    ctx.fillStyle='rgba(243,239,226,.6)'; ctx.font='12px "Noto Sans TC"';
    ctx.fillText(lab, x, Y+24);
  });
  ctx.fillStyle='rgba(242,217,121,.7)'; ctx.font='12px "Noto Serif TC"';
  ctx.fillText(`${T.D} ${isChase?'公里':'公里'}`, w/2, Y+24);
  let p1, p2, gap, meet=false;
  if(st.mode===0){ p1 = T.v1*t; p2 = T.D - T.v2*t; gap = p2-p1; meet = gap<=0.001; }
  else if(st.mode===1){ p1 = 0; p2 = 0; gap = (T.v1+T.v2)*t; meet = gap>=T.D-0.001; }
  else { p1 = T.head + T.v1*t; p2 = T.v2*t; gap = p1-p2; meet = gap<=0.001; }
  const clamp=v=>Math.max(0, Math.min(T.D, v));
  if(st.mode===1){
    // 反向：一個往右、一個「往左」用虛線表示往反方向（畫在同一條線上以距離和呈現）
    const half = Math.min(T.D, T.v1*t), half2 = Math.min(T.D, T.v2*t);
    ctx.fillStyle='#98c9dc'; ctx.font='bold 20px "Noto Sans TC"';
    ctx.fillText('🚗', X(clamp(gap*T.v1/(T.v1+T.v2))), Y-12);
    ctx.fillStyle='#eda0a8';
    ctx.fillText('🚙', X(0), Y-12);
    ctx.strokeStyle='#f2d979'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.moveTo(X(0),Y-30); ctx.lineTo(X(clamp(gap)),Y-30); ctx.stroke();
    ctx.fillStyle='#f2d979'; ctx.font='bold 13px "Noto Serif TC"';
    ctx.fillText(`相距 ${fmtN(gap)} km`, X(clamp(gap))/2+X(0)/2, Y-36);
  } else {
    ctx.font='bold 20px "Noto Sans TC"';
    ctx.fillText(isChase?'🚴':'🚗', X(clamp(isChase?p2:p1)), Y-12);
    ctx.fillText(isChase?'🚶':'🚙', X(clamp(isChase?p1:p2)), Y-12);
    if(!meet){
      const a=X(clamp(Math.min(p1,p2))), b=X(clamp(Math.max(p1,p2)));
      ctx.strokeStyle='rgba(242,217,121,.7)'; ctx.lineWidth=2;
      ctx.setLineDash([3,3]); ctx.beginPath(); ctx.moveTo(a,Y-32); ctx.lineTo(b,Y-32); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle='#f2d979'; ctx.font='bold 13px "Noto Serif TC"';
      ctx.fillText(`相距 ${fmtN(Math.abs(gap))} km`, (a+b)/2, Y-38);
    } else {
      ctx.fillStyle='#a6d6a0'; ctx.font='bold 14px "Noto Sans TC"';
      ctx.fillText('✓ ' + T.goal + '！', X(clamp(p1)), Y-38);
    }
  }
  // 資訊
  ctx.fillStyle='rgba(243,239,226,.8)'; ctx.font='14px "Noto Serif TC"';
  ctx.fillText(`t = ${fmtN(t)} ${T.unit}`, w/2, Y+50);
  ctx.fillStyle='#f2d979'; ctx.font='bold 16px "Noto Serif TC"';
  ctx.fillText(T.eq, w/2, Y+74);
  ctx.fillStyle= meet?'#a6d6a0':'rgba(243,239,226,.5)'; ctx.font='13px "Noto Sans TC"';
  ctx.fillText(meet?`✓ 答案：t = ${fmtN(T.ans)} ${T.unit}`:`（按「跳到答案時刻」看 t = ${fmtN(T.ans)}）`, w/2, Y+94);
  ro.innerHTML = `【${T.n}】<b>${T.eq}</b>　｜　t = <b>${fmtN(t)}</b> ${T.unit}　｜　`
    + (st.mode===1 ? `相距 <b>${fmtN(gap)}</b> km` : `相距 <b>${fmtN(Math.abs(gap))}</b> km`)
    + (meet ? `　<span style="color:var(--green)">✓ ${T.goal}！答案 t = ${fmtN(T.ans)} ${T.unit}</span>` : '')
    + `　｜　<span style="color:var(--blue)">${T.why}</span>`;
}

const CONC=[
  {n:'加水（鹽不變）', base:300, pct:0.08, step:20, goal:0.05, ansAdd:180, what:'水', solute:'鹽',
   eq:'24 ÷ (300 + x) = 5%', note:'加的是水 → 鹽的重量完全不變'},
  {n:'加純糖（都變）', base:200, pct:0.10, step:5, goal:0.20, ansAdd:25, what:'純糖', solute:'糖',
   eq:'(20 + x) ÷ (200 + x) = 20%', note:'加的是純糖 → 糖和總重「都」變'},
];
function drawConc(st, ctx, w, h, ro){
  const C=CONC[st.mode], x=st.added;
  const s0 = C.base*C.pct;                       // 原溶質
  const solute = st.mode===0 ? s0 : s0 + x;      // 加水→不變；加純糖→變
  const total  = C.base + x;
  const pct = solute/total;
  const btn = document.getElementById('addBtn-'+st.cvsi);
  ctx.textAlign='center';
  ctx.fillStyle='#98c9dc'; ctx.font='bold 14px "Noto Sans TC"';
  ctx.fillText(`【${C.n}】　${C.note}`, w/2, 16);
  // 燒杯
  const bw=76, bx=44, byTop=32, byBot=h-30, bh=byBot-byTop;
  const maxTotal = C.base + C.step*14;
  const fillH = Math.min(bh, bh*total/maxTotal);
  const fy = byBot - fillH;
  const soluteH = fillH * (solute/total);
  ctx.fillStyle='rgba(152,201,220,.20)';
  ctx.fillRect(bx, fy, bw, fillH);
  ctx.fillStyle='rgba(242,217,121,.62)';
  ctx.fillRect(bx, byBot-soluteH, bw, soluteH);
  ctx.strokeStyle='#f3efe2'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(bx,byTop); ctx.lineTo(bx,byBot); ctx.lineTo(bx+bw,byBot); ctx.lineTo(bx+bw,byTop); ctx.stroke();
  ctx.fillStyle='#f2d979'; ctx.font='bold 11px "Noto Sans TC"';
  ctx.fillText(C.solute, bx+bw/2, byBot-soluteH/2+4);
  ctx.fillStyle='rgba(152,201,220,.9)';
  if(fillH-soluteH>16) ctx.fillText('水', bx+bw/2, fy+(fillH-soluteH)/2+4);
  // 右側數據
  const tx=bx+bw+26; ctx.textAlign='left';
  const rows=[
    [`${C.solute}的重量`, `${fmtN(solute)} g`, st.mode===0?'#a6d6a0':'#eda0a8', st.mode===0?'（不變 ✓）':'（跟著變）'],
    ['溶液總重', `${fmtN(total)} g`, '#eda0a8', '（變）'],
    ['濃度', `${fmtN(Math.round(pct*10000)/100)} %`, '#f2d979', ''],
    [`已加${C.what}`, `${fmtN(x)} g`, 'rgba(243,239,226,.8)', ''],
  ];
  rows.forEach(([k,v,col,nt],i)=>{
    const y=52+i*30;
    ctx.fillStyle='rgba(243,239,226,.6)'; ctx.font='12px "Noto Sans TC"';
    ctx.fillText(k, tx, y-11);
    ctx.fillStyle=col; ctx.font='bold 17px "Noto Serif TC"';
    ctx.fillText(v, tx, y+7);
    if(nt){ ctx.fillStyle='rgba(243,239,226,.4)'; ctx.font='11px "Noto Sans TC"';
      ctx.fillText(nt, tx+ctx.measureText(v).width+34, y+6); }
  });
  const hit = Math.abs(pct-C.goal)<0.0005;
  ctx.textAlign='center';
  ctx.fillStyle= hit?'#a6d6a0':'rgba(242,217,121,.75)'; ctx.font='bold 13px "Noto Sans TC"';
  ctx.fillText(hit ? `✓ 達到目標 ${fmtN(C.goal*100)}%！加了 ${fmtN(C.ansAdd)} g` : `目標：${fmtN(C.goal*100)}%　（${C.eq}）`, w/2, h-8);
  ro.innerHTML = `【${C.n}】${C.solute} <b>${fmtN(solute)}g</b>${st.mode===0?'<span style="color:var(--green)">（不變 ✓）</span>':'<span style="color:var(--pink)">（跟著變）</span>'}`
    + `　｜　總重 <b>${fmtN(total)}g</b>　｜　濃度 <b>${fmtN(Math.round(pct*10000)/100)}%</b>`
    + (hit ? `　<span style="color:var(--green)">✓ 達標！加了 ${fmtN(C.ansAdd)}g</span>` : `　｜　目標 ${fmtN(C.goal*100)}%`);
}

function draw(si){
  const st=VIZ[si]; if(!st) return;
  st.cvsi=si;
  const {cv,ctx,kind}=st, w=cv.width/DPR, h=cv.height/DPR;
  ctx.clearRect(0,0,w,h);
  const ro=document.getElementById('ro-'+si);
  if(kind==='invar') drawInvar(st,ctx,w,h,ro);
  else if(kind==='trip') drawTrip(st,ctx,w,h,ro);
  else if(kind==='conc') drawConc(st,ctx,w,h,ro);
}

document.addEventListener('click', e=>{
  const btn=e.target.closest('[data-t]'); if(!btn) return;
  const si=+btn.dataset.si, st=VIZ[si]; if(!st) return;
  const t=btn.dataset.t;
  if(st.kind==='invar'){
    if(t==='reveal') st.show=true;
    if(t==='next'){ st.i=(st.i+1)%INV.length; st.show=false; }
    if(t==='prev'){ st.i=(st.i-1+INV.length)%INV.length; st.show=false; }
  } else if(st.kind==='trip'){
    const T=TRIP[st.mode];
    const dt = st.mode===2 ? 1/90 : 0.3;
    if(t==='mode'){ st.mode=(st.mode+1)%TRIP.length; st.t=0; }
    if(t==='tp') st.t=Math.min(TRIP[st.mode].ans*1.6, st.t+dt);
    if(t==='tm') st.t=Math.max(0, st.t-dt);
    if(t==='jump') st.t=TRIP[st.mode].ans;
    if(t==='rst') st.t=0;
  } else {
    const C=CONC[st.mode];
    if(t==='mode'){ st.mode=(st.mode+1)%CONC.length; st.added=0; }
    if(t==='add') st.added=Math.min(CONC[st.mode].step*14, st.added+CONC[st.mode].step);
    if(t==='sub') st.added=Math.max(0, st.added-CONC[st.mode].step);
    if(t==='goal') st.added=CONC[st.mode].ansAdd;
    if(t==='rst') st.added=0;
  }
  draw(si);
});

function resizeAll(){
  DPR = Math.min(2, window.devicePixelRatio||1);
  document.querySelectorAll('canvas.viz').forEach(cv=>{
    const w = cv.clientWidth || cv.parentElement.clientWidth;
    const h = (cv.dataset.viz==='invar') ? 208 : (cv.dataset.viz==='conc' ? 200 : 192);
    cv.width=w*DPR; cv.height=h*DPR; cv.style.height=h+'px';
    cv.getContext('2d').setTransform(DPR,0,0,DPR,0,0);
  });
  Object.keys(VIZ).forEach(k=>draw(+k));
}
document.querySelectorAll('canvas.viz').forEach(initViz);
window.addEventListener('resize', resizeAll);
resizeAll();
</script>
