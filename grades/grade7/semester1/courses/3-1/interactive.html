  <div class="card" id="goalCard">
    <h3><span class="ic">🎯</span>本節學習目標</h3>

<script>
const GOALS = [
  '掌握代數式的簡記規則（乘號省略、數字在前）',
  '能把文字敘述列成代數式',
  '知道兩位數是 10a+b，不是 ab',
  '能辨識項、係數、常數項、同類項',
  '能去括號並合併同類項',
  '代入求值時，負數一定加括號',
];

const DATA = [
{ key:'notate', viz:'notate', vizTitle:'簡記轉換器 —— 按「下一個」，看每條規則怎麼把式子縮短',
  slides:[
    {eb:'細目 ①', h:'為什麼要簡記？因為數學家很懶', html:`
      <div class="box y" style="text-align:center;font-size:19px;padding:14px;">
        <span class="fm">3 × x × y</span>　寫成　<span class="fm hl" style="font-size:25px;">3xy</span><br>
        <span style="font-size:14px;color:var(--soft)">短了一半、也不容易看錯</span></div>
      <div class="box g" style="text-align:center;">但這個「懶」<span class="hl">懶得有道理</span> —— 式子越短，<b>越容易看出結構</b>；式子越長，越容易抄錯。</div>
      <div class="box"><b>不過簡記有規則，不能亂簡。</b>寫錯了，別人會讀成完全不同的意思。</div>`},
    {eb:'細目 ①', h:'六條簡記規則', html:`
      <table class="tbl">
        <tr><th style="width:26%;">原式</th><th style="width:20%;">簡記</th><th>規則</th></tr>
        <tr><td class="fm">3 × x</td><td class="fm hl">3x</td><td>① <b>乘號省略</b></td></tr>
        <tr><td class="fm">x × 3</td><td class="fm hl">3x</td><td>② <b>數字寫前面</b>（不寫 x3）</td></tr>
        <tr><td class="fm">1 × x</td><td class="fm hl">x</td><td>③ <b>係數 1 省略</b></td></tr>
        <tr><td class="fm">(−1) × x</td><td class="fm hl">−x</td><td>③ −1 只留負號</td></tr>
        <tr><td class="fm">x × x</td><td class="fm hl">x²</td><td>④ 同因數用<b>次方</b></td></tr>
        <tr><td class="fm">a × b</td><td class="fm hl">ab</td><td>⑤ 按<b>字母順序</b></td></tr>
        <tr><td class="fm">x ÷ 3</td><td class="fm hl">x/3</td><td>⑥ <b>除號寫成分數</b></td></tr>
      </table>`},
    {eb:'細目 ① ⚠️', h:'兩個必踩的坑', html:`
      <div class="box r"><b class="hl-r">坑一：帶分數不能直接寫</b><br>
        <span class="fm" style="font-size:19px;">1½ × x</span> 寫成 <span class="fm hl-r" style="font-size:19px;">1½x</span> → ❌ 會被讀成 <span class="fm hl-r">1 + ½x</span>！<br>
        ✓ 正確：先化成假分數 → <span class="fm hl-g" style="font-size:19px;">(3/2)x</span></div>
      <div class="box r"><b class="hl-r">坑二：數字一定寫前面</b><br>
        <span class="fm" style="font-size:19px;">x3</span> 看起來像 <span class="fm hl-r" style="font-size:19px;">x³</span>（次方）—— 非常危險<br>
        ✓ 永遠寫 <span class="fm hl-g" style="font-size:19px;">3x</span></div>
      <div class="box y" style="text-align:center;">簡記的目的是<span class="hl">讓人看懂</span>，不是讓人猜。<b>會被誤讀的寫法，就是錯的寫法。</b></div>`},
    {eb:'例題 1 ★☆☆', h:'帶分數的簡記', html:`
      <div class="exq" data-a="2">
        <div class="exq-q"><span class="hl">Q</span>　<span class="fm">1½ × x</span> 的正確簡記是？</div>
        <button class="exo" data-i="0">1½x</button>
        <button class="exo" data-i="1">1.5 × x</button>
        <button class="exo" data-i="2">(3/2)x</button>
        <button class="exo" data-i="3">x1½</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st fm">1½ = 3/2（帶分數先化假分數）</div>
          <div class="st fm">(3/2) × x = (3/2)x　或寫成 3x/2</div>
          <div class="st">(A) <span class="hl-r">1½x 會被讀成 1 + ½x</span> —— 完全不同的意思，這是最危險的寫法。</div>
          <div class="st">(B) 沒有省略乘號，不算簡記。(D) 數字要寫<b>前面</b>。</div>
          <div class="an">答：(3/2)x</div>
        </div>
      </div>`},
    {eb:'例題 2 ★☆☆', h:'綜合簡記', html:`
      <div class="exq" data-a="1">
        <div class="exq-q"><span class="hl">Q</span>　<span class="fm">a × 3 × a</span> 的簡記是？</div>
        <button class="exo" data-i="0">3a</button>
        <button class="exo" data-i="1">3a²</button>
        <button class="exo" data-i="2">a²3</button>
        <button class="exo" data-i="3">a3a</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st">用到兩條規則：<b>② 數字寫前面</b> ＋ <b>④ 同因數用次方</b></div>
          <div class="st fm">a × 3 × a = 3 × a × a = 3 × a² = 3a²</div>
          <div class="st">(A) 漏掉一個 a。(C) 數字沒寫前面，而且 a²3 很像 a²³。</div>
          <div class="an">答：3a²</div>
        </div>
      </div>`}

{ key:'digits', viz:'digits', vizTitle:'兩位數驗證器 —— 調十位、個位，親眼看 10a+b 和 a×b 差多少',
  slides:[
    {eb:'細目 ②', h:'中文 → 代數式 對照表', html:`
      <div class="two">
        <div class="box"><span class="fm">x 的 <b>3 倍</b></span> → <span class="fm hl">3x</span><br>

      </div>
      <div class="box y"><b>讀題技巧：抓「的」字在哪裡。</b><br>

    {eb:'細目 ② ⚠️ 最重要', h:'兩位數怎麼表示？', html:`
      <div class="box y" style="text-align:center;font-size:20px;padding:14px;">
        十位數字 a、個位數字 b 的兩位數 = <span class="hl" style="font-size:26px;">10a + b</span><br>
        <span class="hl-r" style="font-size:17px;">不是 ab！</span></div>
      <div class="box g"><b>為什麼？用實際數字檢查</b><br>
        ・十位 <span class="hl">3</span>、個位 <span class="hl">7</span> → 這個數是 <span class="fm hl-g" style="font-size:19px;">37</span><br>

      <div class="box r" style="text-align:center;"><span class="fm">ab</span> 在代數裡的意思是「<span class="hl-r">a 乘以 b</span>」，<b>不是把兩個數字並排</b>。</div>
      <div class="teach">這是 <b>3-3 應用題的必考觀念</b>（數字問題、數字對調問題）。<b>檢查代數式對不對，最快的方法就是代一組實際數字進去試。</b></div>`},
    {eb:'例題 3 ★★☆', h:'兩位數列式', html:`
      <div class="exq" data-a="1">
        <div class="exq-q"><span class="hl">Q</span>　一個兩位數，十位數字是 a、個位數字是 b。這個數是？</div>
        <button class="exo" data-i="0">ab</button>
        <button class="exo" data-i="1">10a + b</button>
        <button class="exo" data-i="2">a + b</button>
        <button class="exo" data-i="3">10b + a</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st"><b>用實際數字檢查</b>：十位 3、個位 7 → 這個數是 <b>37</b></div>
          <div class="st fm">(A) ab = 3×7 = 21 ≠ 37 ❌</div>
          <div class="st fm">(C) a+b = 3+7 = 10 ≠ 37 ❌</div>
          <div class="st fm">(D) 10b+a = 70+3 = 73 ≠ 37 ❌（這是<b>數字對調</b>後的數！）</div>
          <div class="st fm">(B) 10a+b = 30+7 = 37 ✓</div>
          <div class="st">💡 (D) 很重要：<b>10b+a 是「十位個位對調」後的數</b>，3-3 應用題常考。</div>
          <div class="an">答：10a + b</div>
        </div>
      </div>`},
    {eb:'細目 ② ⚠️ 鐵律', h:'負數代入，一定要加括號', html:`
      <div class="two">
        <div class="box r"><b class="hl-r">❌ 不加括號</b><br>
          <span class="fm" style="font-size:19px;">x = −2 時<br>x² = −2² = <span class="hl-r">−4</span></span><br>
          <span style="font-size:13px;color:var(--soft)">先算 2²，再加負號 → 錯</span></div>
        <div class="box g"><b class="hl-g">✓ 加括號</b><br>
          <span class="fm" style="font-size:19px;">x = −2 時<br>x² = (−2)² = <span class="hl-g">4</span></span><br>
          <span style="font-size:13px;color:var(--soft)">整個 −2 一起平方 → 對</span></div>
      </div>
      <div class="box y" style="text-align:center;">這正是 <span class="hl">1-4 學過的 (−a)ⁿ vs −aⁿ</span>，在這裡<b>真實上場</b>。</div>
      <div class="teach"><b>養成習慣：</b>代入的時候，<b>不管正負一律先加括號</b>，寧可多寫也不要少寫。括號不用錢，算錯要重來。</div>`},
    {eb:'例題 4 ★★★', h:'代入求值', html:`
      <div class="exq" data-a="3">
        <div class="exq-q"><span class="hl">Q</span>　當 <span class="fm">x = −2</span> 時，求 <span class="fm">3x² − 2x + 1</span></div>
        <button class="exo" data-i="0">−7</button>
        <button class="exo" data-i="1">9</button>
        <button class="exo" data-i="2">−11</button>
        <button class="exo" data-i="3">17</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st"><b>關鍵：整個 −2 用括號包起來</b> → <span class="fm">3(−2)² − 2(−2) + 1</span></div>
          <div class="st fm"><b>Step 1</b>：(−2)² = 4（偶次方得正）→ 3 × 4 = 12</div>
          <div class="st fm"><b>Step 2</b>：−2 × (−2) = <b>+4</b>（負 × 負 = 正）</div>
          <div class="st fm"><b>Step 3</b>：12 + 4 + 1 = 17</div>
          <div class="st">(B) 9 是 Step 2 算成 −4 的結果（12−4+1）—— <span class="hl-r">這是最多人錯的地方</span>。</div>
          <div class="st">(C) −11 是 x² 沒加括號算成 −4 的結果。</div>
          <div class="an">答：17</div>
        </div>
      </div>`},
    {eb:'例題 5 ★★★', h:'手機月租 —— 先讀清楚 x 是什麼', html:`
      <div class="exq" data-a="0">
        <div class="exq-q"><span class="hl">Q</span>　月租費 <span class="fm">(300 + 2x)</span> 元，x 是通話<b>超過 300 分鐘的部分</b>。某月通話 400 分鐘，月租費多少？</div>
        <button class="exo" data-i="0">500 元</button>
        <button class="exo" data-i="1">1100 元</button>
        <button class="exo" data-i="2">300 元</button>
        <button class="exo" data-i="3">800 元</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st fm"><b>Step 1 先求 x</b>：x = 400 − 300 = 100（分鐘）</div>
          <div class="st fm"><b>Step 2 代入</b>：300 + 2×100 = 500</div>
          <div class="st"><span class="hl-r">陷阱：x 不是 400！</span>x 的定義是「<b>超過的部分</b>」，不是總通話時間。</div>
          <div class="st">(B) 1100 元就是把 x=400 直接代進去的結果（300+800）—— 最多人踩的坑。</div>
          <div class="st">💡 <b>應用題的第一步永遠是：讀清楚「這個變數代表什麼」。</b></div>
          <div class="an">答：500 元</div>
        </div>
      </div>`}

{ key:'tiles', viz:'tiles', vizTitle:'代數磚塊 —— 長條是 x、方塊是 1；同形狀才能疊在一起',
  slides:[
    {eb:'細目 ③', h:'項、係數、常數項', html:`
      <div class="box"><span class="hl">項</span>：用<b>加減號</b>隔開的每一部分　·　<span class="hl">係數</span>：項裡面的<b>數字部分</b>　·　<span class="hl">常數項</span>：<b>沒有未知數</b>的項</div>
      <div class="box y" style="text-align:center;font-size:22px;"><span class="fm">3x² − 2x + 5</span></div>
      <table class="tbl">
        <tr><th>項</th><th>係數</th><th>說明</th></tr>
        <tr><td class="fm">3x²</td><td class="fm hl">3</td><td>x 的二次項</td></tr>
        <tr><td class="fm">−2x</td><td class="fm hl-r">−2</td><td>⚠️ 係數<b>含負號</b>！</td></tr>
        <tr><td class="fm">5</td><td>—</td><td><b>常數項</b></td></tr>
      </table>
      <div class="box r" style="text-align:center;">⚠️ 最常錯：<span class="fm">−2x</span> 的係數是 <span class="hl-r">−2</span>，不是 2。<b>負號要跟著係數走。</b></div>`},
    {eb:'細目 ③', h:'同類項：未知數相同、且次方也相同', html:`
      <table class="tbl">
        <tr><th style="width:40%;">是同類項嗎？</th><th>判斷</th></tr>
        <tr><td class="fm">3x 與 5x</td><td class="hl-g">✅ 都是 x 的一次項</td></tr>
        <tr><td class="fm">3x 與 3x²</td><td class="hl-r">❌ <b>次方不同</b></td></tr>
        <tr><td class="fm">3x 與 3y</td><td class="hl-r">❌ <b>未知數不同</b></td></tr>
        <tr><td class="fm">5 與 −7</td><td class="hl-g">✅ 都是常數項</td></tr>
        <tr><td class="fm">2ab 與 5a²b</td><td class="hl-r">❌ a 的次方不同</td></tr>
      </table>
      <div class="box y" style="text-align:center;"><b>追問句：</b><span class="hl">「未知數一樣嗎？次方一樣嗎？」</span>每次合併前先問這句。</div>`},
    {eb:'細目 ③', h:'合併同類項：只加減係數，字母原封不動', html:`
      <div class="box y" style="text-align:center;font-size:19px;padding:12px;">
        <span class="fm">3x + 5x = (3+5)x = <span class="hl">8x</span></span><br>
        <span class="fm">3x + 5y − 2x + y = (3−2)x + (5+1)y = <span class="hl">x + 6y</span></span></div>
      <div class="box g"><b>為什麼可以這樣？</b>因為<span class="hl">分配律</span>。就像「<span class="hl">3 顆蘋果 + 5 顆蘋果 = 8 顆蘋果</span>」—— <b>蘋果還是蘋果，只有數量在變</b>。</div>
      <table class="tbl">
        <tr><th style="width:42%;">❌ 錯誤</th><th>為什麼錯</th></tr>
        <tr><td class="fm">3x + 3x² = 6x³</td><td>次方不同<b>不能合併</b>；且合併是<b>加係數</b>不是乘</td></tr>
        <tr><td class="fm">3x + 5y = 8xy</td><td>未知數不同<b>不能合併</b></td></tr>
        <tr><td class="fm">3x + 5x = 8x²</td><td>合併只動<b>係數</b>，x 完全不動</td></tr>
      </table>`},
    {eb:'細目 ③', h:'去括號：分配律', html:`
      <div class="box"><b class="hl-b">括號前是「＋」或數字</b> —— 每一項都要乘進去<br>
        <span class="fm" style="font-size:18px;">3(x + 2) = 3x + <span class="hl">6</span></span>　；
        <span class="fm" style="font-size:18px;">−3(2x − 4) = −6x <span class="hl">+ 12</span></span>
        <span style="font-size:13px;color:var(--soft)">← 負負得正</span></div>
      <div class="box r"><b class="hl-r">⚠️ 括號前是「−」：每一項都要變號</b><br>
        <span class="fm" style="font-size:18px;">−(x − 1) = <span class="hl-g">−x + 1</span></span>　；
        <span class="fm" style="font-size:18px;">−(2a − 3b) = <span class="hl-g">−2a + 3b</span></span></div>
      <div class="box y"><b>最常見錯誤：</b>只變第一項的符號 → <span class="fm hl-r">−(x−1) = −x − 1</span> ❌<br>
        💡 <b>想法：</b><span class="fm">−(x−1)</span> 其實是 <span class="fm hl">(−1)×(x−1)</span>，所以<span class="hl">每一項</span>都要乘 (−1)。</div>`},
    {eb:'細目 ③', h:'化簡的標準流程', html:`
      <div class="box y" style="text-align:center;font-size:22px;padding:18px;"><span class="hl">① 去括號　→　② 合併同類項</span></div>
      <div class="box"><b>例：</b><span class="fm">2(x + 3) − (x − 1)</span><br>
        ① 去括號：<span class="fm">2x + 6 − x + 1</span><br>
        ② 合併：<span class="fm">(2−1)x + (6+1) = <span class="hl">x + 7</span></span></div>
      <div class="teach"><b>順序不能顛倒。</b>括號還在的時候，裡面的項和外面的項<b>不算同類項</b> —— 得先把括號拆掉，大家站在同一個平面上，才能比誰跟誰是同類。</div>`},
    {eb:'例題 6 ★★☆', h:'去括號（負負得正）', html:`
      <div class="exq" data-a="1">
        <div class="exq-q"><span class="hl">Q</span>　化簡 <span class="fm">−3(2x − 4) + 5x</span></div>
        <button class="exo" data-i="0">−x − 12</button>
        <button class="exo" data-i="1">−x + 12</button>
        <button class="exo" data-i="2">−11x + 12</button>
        <button class="exo" data-i="3">x + 12</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st fm"><b>① 去括號</b>：(−3)×2x = −6x；(−3)×(−4) = <b>+12</b> → −6x + 12</div>
          <div class="st fm"><b>② 合併</b>：−6x + 12 + 5x = (−6+5)x + 12 = −x + 12</div>
          <div class="st">(A) 是把 (−3)×(−4) 算成 −12 —— <span class="hl-r">負負得正，最容易漏</span>。</div>
          <div class="st">(C) 是把 −6x 和 5x 算成 −11x（相減了）—— 應該是 −6+5 = −1。</div>
          <div class="an">答：−x + 12</div>
        </div>
      </div>`},
    {eb:'例題 7 ★★☆', h:'x 項剛好抵消', html:`
      <div class="exq" data-a="2">
        <div class="exq-q"><span class="hl">Q</span>　化簡 <span class="fm">6(2x − 1) − 4(3x − 2)</span></div>
        <button class="exo" data-i="0">24x − 14</button>
        <button class="exo" data-i="1">−14</button>
        <button class="exo" data-i="2">2</button>
        <button class="exo" data-i="3">2x</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st fm"><b>① 去括號</b>：6(2x−1) = 12x − 6；−4(3x−2) = −12x <b>+ 8</b></div>
          <div class="st fm"><b>② 合併</b>：12x − 6 − 12x + 8 = (12−12)x + (−6+8) = <b>0x + 2 = 2</b></div>
          <div class="st">💡 <b>x 項剛好抵消，答案是一個常數！</b>這代表<b>不管 x 是多少，這個式子永遠等於 2</b>。</div>
          <div class="st">很多人以為「化簡完一定要留 x」，看到 x 不見了就覺得算錯，硬把 x 湊回去 —— <b>這是心理陷阱，不是數學問題</b>。</div>
          <div class="an">答：2</div>
        </div>
      </div>`},
    {eb:'素養 ★★★', h:'工廠利潤 —— 化簡後的式子有意義', html:`
      <div class="box">固定成本 <span class="hl">50000</span> 元，每件變動成本 <span class="hl">320</span> 元，每件售價 <span class="hl">450</span> 元。生產 x 件</div>
      <div class="exq" data-a="0">
        <div class="exq-q"><span class="hl">Q</span>　利潤的代數式化簡後是？</div>
        <button class="exo" data-i="0">130x − 50000</button>
        <button class="exo" data-i="1">770x − 50000</button>
        <button class="exo" data-i="2">130x + 50000</button>
        <button class="exo" data-i="3">450x − 50000</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st fm">總成本 = 50000 + 320x</div>
          <div class="st fm">利潤 = 收入 − 總成本 = 450x − (50000 + 320x)</div>
          <div class="st fm">去括號：450x − 50000 − 320x　→　合併：130x − 50000</div>

const G = {lv:0, score:0, streak:0, best:0, t:20, timer:null, cur:null, answered:false};
function gShow(id){ ['gStart','gPlay','gEnd'].forEach(x=>document.getElementById(x).classList.toggle('on', x===id)); }
function gChips(){
  document.getElementById('gChips').innerHTML = GAME.map((g,i)=>
    `<div class="lvchip ${i<G.lv?'done':i===G.lv?'now':''}">${i+1}. ${g.name}</div>`).join('');
}
function gLoad(){
  if(G.lv>=GAME.length){ gFinish(); return; }
  G.answered=false; G.t=20;
  const bank = GAME[G.lv].qs;
  G.cur = bank[Math.floor(Math.random()*bank.length)];
  document.getElementById('hLv').textContent = (G.lv+1)+'/'+GAME.length;
  document.getElementById('hSc').textContent = G.score;
  document.getElementById('hStk').textContent = G.streak;
  document.getElementById('gQ').innerHTML = `<span style="color:var(--blue);font-size:15px;">第 ${G.lv+1} 關 · ${GAME[G.lv].name}</span><br>${G.cur.q}`;
  document.getElementById('gO').innerHTML = G.cur.o.map((o,i)=>
    `<button class="gopt" data-g="${i}">${'ABCD'[i]}. ${o}</button>`).join('');
  document.getElementById('gFb').className='gfb';
  document.getElementById('gNext').style.display='none';
  gChips();
  clearInterval(G.timer);
  G.timer = setInterval(()=>{
    G.t -= 0.1;
    document.getElementById('hT').textContent = Math.max(0,G.t).toFixed(0);
    document.getElementById('tFill').style.width = Math.max(0,G.t/20*100)+'%';
    if(G.t<=0){ clearInterval(G.timer); gAnswer(-1); }
  },100);
}
function gAnswer(pick){
  if(G.answered) return;
  G.answered = true; clearInterval(G.timer);
  const ans = G.cur.a, ok = pick===ans;
  document.querySelectorAll('.gopt').forEach((b,i)=>{
    b.disabled=true;
    if(i===ans) b.classList.add('right'); else if(i===pick) b.classList.add('wrong');
  });
  let gain=0, sb=0, tb=0;
  if(ok){
    G.streak++; G.best=Math.max(G.best,G.streak);
    sb = Math.min(5, G.streak-1); tb = Math.min(5, Math.floor(G.t/4));
    gain = 10+sb+tb; G.score += gain;
  } else { G.streak = 0; }
  document.getElementById('hSc').textContent = G.score;
  document.getElementById('hStk').textContent = G.streak;
  const fb = document.getElementById('gFb');
  fb.className = 'gfb on '+(ok?'ok':'no');
  fb.innerHTML = (ok? `✅ <b>答對！+${gain} 分</b>（基礎10 + 連擊${sb} + 速度${tb}）<br>`
                    : (pick===-1?'⏰ <b>時間到！</b><br>':'❌ <b>答錯了</b><br>')) + G.cur.e;
  document.getElementById('gNext').style.display='inline-block';
  document.getElementById('gNext').textContent = (G.lv>=GAME.length-1)?'看成績 🏁':'下一關 ▶';
}
function gFinish(){
  clearInterval(G.timer);
  const max = GAME.length*20, pct = Math.round(G.score/max*100);
  const rank = pct>=85?['🏆','數論大師']:pct>=70?['🥇','高手']:pct>=50?['🥈','不錯']:['📖','再加油'];
  document.getElementById('gRank').textContent = rank[0];
  document.getElementById('gFinal').innerHTML = `<b class="hl">${G.score}</b> / ${max} 分　·　${rank[1]}`;
  document.getElementById('gStats').innerHTML = `最高連擊 <b class="hl">${G.best}</b>　·　完成 ${GAME.length} 關`;
  gShow('gEnd');
}
document.getElementById('gGo').addEventListener('click', ()=>{ G.lv=0;G.score=0;G.streak=0;G.best=0; gShow('gPlay'); gLoad(); });
document.getElementById('gAgain').addEventListener('click', ()=>{ G.lv=0;G.score=0;G.streak=0;G.best=0; gShow('gPlay'); gLoad(); });
document.getElementById('gNext').addEventListener('click', ()=>{ G.lv++; gLoad(); });

/* ===== Canvas ===== */
const VIZ = {}; let DPR=1;

/* ① 簡記轉換器 */
const NOTE=[
  {raw:'3 × x',        s:'3x',      rule:'① 乘號省略',            ok:true},
  {raw:'x × 3',        s:'3x',      rule:'② 數字寫前面（不寫 x3）', ok:true},
  {raw:'1 × x',        s:'x',       rule:'③ 係數 1 省略',          ok:true},
  {raw:'(−1) × x',     s:'−x',      rule:'③ −1 只留負號',          ok:true},
  {raw:'x × x',        s:'x²',      rule:'④ 同因數用次方',          ok:true},
  {raw:'a × b',        s:'ab',      rule:'⑤ 按字母順序',            ok:true},
  {raw:'x ÷ 3',        s:'x/3',     rule:'⑥ 除號寫成分數',          ok:true},
  {raw:'a × 3 × a',    s:'3a²',     rule:'② ＋ ④ 一起用',           ok:true},
  {raw:'1½ × x',       s:'(3/2)x',  rule:'⚠️ 帶分數先化假分數',      ok:true,
   warn:'寫成 1½x 會被讀成 1 + ½x —— 完全不同的意思！'},
  {raw:'x × 3（寫成 x3）', s:'x3',  rule:'⚠️ 這是錯的寫法',          ok:false,
   warn:'x3 看起來像 x³（次方），非常危險 → 永遠寫 3x'},
];
/* ③ 代數磚塊：(a1·x + c1) + (a2·x + c2) */
function initViz(cv){
  const si=+cv.dataset.si, kind=cv.dataset.viz;
  const ctx=cv.getContext('2d');
  const st = VIZ[si] = {kind, cv, ctx};
  const ctrl = document.querySelector(`[data-ctrl="${si}"]`);
  if(kind==='notate'){
    st.i=0;
    ctrl.innerHTML = `<div class="readout" id="ro-${si}"></div>
      <button class="btn" data-t="prev" data-si="${si}">◀ 上一個</button>
      <button class="btn" data-t="next" data-si="${si}" style="background:rgba(242,217,121,.2);border-color:var(--yellow);color:var(--yellow);font-weight:700;">下一個 ▶</button>`;
  } else if(kind==='digits'){
    st.a=3; st.b=7;
    ctrl.innerHTML = `<div class="readout" id="ro-${si}"></div>
      <button class="btn" data-t="ap" data-si="${si}">十位 a +1</button>
      <button class="btn" data-t="bp" data-si="${si}">個位 b +1</button>
      <button class="btn" data-t="rnd" data-si="${si}">🎲 隨機</button>`;
  } else {                       // tiles
    st.a1=3; st.c1=2; st.a2=-1; st.c2=4;
    ctrl.innerHTML = `<div class="readout" id="ro-${si}"></div>
      <button class="btn" data-t="a1" data-si="${si}">第1式 x 係數 ±</button>
      <button class="btn" data-t="c1" data-si="${si}">第1式 常數 ±</button>
      <button class="btn" data-t="a2" data-si="${si}">第2式 x 係數 ±</button>
      <button class="btn" data-t="c2" data-si="${si}">第2式 常數 ±</button>`;
  }
  draw(si);
}

function drawNotate(st, ctx, w, h, ro){
  const N=NOTE[st.i];
  ctx.textAlign='center';
  ctx.fillStyle='rgba(242,217,121,.85)'; ctx.font='bold 13px "Noto Sans TC"';
  ctx.fillText(`第 ${st.i+1} / ${NOTE.length} 個`, w/2, 18);
  // 原式
  ctx.fillStyle='#98c9dc'; ctx.font='bold 26px "Noto Serif TC"';
  ctx.fillText(N.raw, w*0.27, 62);
  ctx.fillStyle='rgba(243,239,226,.4)'; ctx.font='12px "Noto Sans TC"';
  ctx.fillText('原式', w*0.27, 82);
  // 箭頭
  ctx.strokeStyle='#f2d979'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(w*0.44, 54); ctx.lineTo(w*0.56, 54); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(w*0.56, 54); ctx.lineTo(w*0.56-9, 49); ctx.moveTo(w*0.56, 54); ctx.lineTo(w*0.56-9, 59); ctx.stroke();
  // 簡記
  ctx.fillStyle= N.ok?'#a6d6a0':'#eda0a8'; ctx.font='bold 30px "Noto Serif TC"';
  ctx.fillText(N.s, w*0.73, 62);
  ctx.fillStyle='rgba(243,239,226,.4)'; ctx.font='12px "Noto Sans TC"';
  ctx.fillText(N.ok?'簡記':'✗ 錯誤寫法', w*0.73, 82);
  // 規則
  ctx.fillStyle='rgba(242,217,121,.2)';
  ctx.strokeStyle='rgba(242,217,121,.6)'; ctx.lineWidth=1.5;
  const rw=Math.min(w-40, 300);
  ctx.beginPath(); ctx.roundRect((w-rw)/2, 96, rw, 28, 8); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#f2d979'; ctx.font='bold 15px "Noto Sans TC"';
  ctx.fillText(N.rule, w/2, 115);
  // 警語
  if(N.warn){
    ctx.fillStyle='#eda0a8'; ctx.font='13px "Noto Sans TC"';
    const maxw=w-40; let line='', ly=146;
    for(const ch of N.warn){
      if(ctx.measureText(line+ch).width>maxw){ ctx.fillText(line, w/2, ly); line=ch; ly+=19; }
      else line+=ch;
    }
    ctx.fillText(line, w/2, ly);
  }
  ro.innerHTML = `<b>${N.raw}</b>　→　<b style="color:${N.ok?'var(--green)':'var(--pink)'}">${N.s}</b>　｜　${N.rule}`
    + (N.warn ? `　<span style="color:var(--pink)">${N.warn}</span>` : '');
}

function drawDigits(st, ctx, w, h, ro){
  const {a,b}=st;
  const num=10*a+b, prod=a*b, rev=10*b+a;
  ctx.textAlign='center';
  ctx.fillStyle='rgba(242,217,121,.85)'; ctx.font='bold 13px "Noto Sans TC"';
  ctx.fillText(`十位數字 a = ${a}　·　個位數字 b = ${b}`, w/2, 17);
  // 位值積木：十位 a 條「10」、個位 b 個「1」
  const bw=Math.min(26, (w*0.4)/Math.max(a,1)-3), bh=15, y=34;
  const lx = w*0.06;
  for(let i=0;i<a;i++){
    const x=lx+i*(bw+3);
    ctx.fillStyle='rgba(152,201,220,.35)'; ctx.strokeStyle='#98c9dc'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.roundRect(x, y, bw, bh*2, 3); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#98c9dc'; ctx.font='bold 10px "Noto Serif TC"';
    ctx.fillText('10', x+bw/2, y+bh+3);
  }
  ctx.fillStyle='rgba(152,201,220,.7)'; ctx.font='12px "Noto Sans TC"';
  ctx.fillText(`十位：${a} 個 10 = ${10*a}`, lx+(a*(bw+3))/2, y+bh*2+16);
  const rx = w*0.56;
  for(let i=0;i<b;i++){
    const x=rx+i*(bw*0.6+3);
    ctx.fillStyle='rgba(242,217,121,.35)'; ctx.strokeStyle='#f2d979'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.roundRect(x, y+bh*0.5, bw*0.6, bh, 3); ctx.fill(); ctx.stroke();
    ctx.fillStyle='#f2d979'; ctx.font='bold 9px "Noto Serif TC"';
    ctx.fillText('1', x+bw*0.3, y+bh*0.5+11);
  }
  ctx.fillStyle='rgba(242,217,121,.7)'; ctx.font='12px "Noto Sans TC"';
  ctx.fillText(`個位：${b} 個 1 = ${b}`, rx+(b*(bw*0.6+3))/2, y+bh*2+16);
  // 對照
  const yy=h-64;
  ctx.fillStyle='#a6d6a0'; ctx.font='bold 19px "Noto Serif TC"';
  ctx.fillText(`10a + b = 10×${a} + ${b} = ${num}`, w*0.30, yy);
  ctx.fillStyle='rgba(166,214,160,.7)'; ctx.font='12px "Noto Sans TC"';
  ctx.fillText('✓ 這才是那個兩位數', w*0.30, yy+18);
  ctx.fillStyle='#eda0a8'; ctx.font='bold 19px "Noto Serif TC"';
  ctx.fillText(`a × b = ${a}×${b} = ${prod}`, w*0.74, yy);
  ctx.fillStyle='rgba(237,160,168,.7)'; ctx.font='12px "Noto Sans TC"';
  ctx.fillText(num===prod ? '⚠️ 這組剛好相等，是巧合！' : '✗ 完全不是那個數', w*0.74, yy+18);
  ctx.strokeStyle='rgba(243,239,226,.16)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(w*0.52, yy-16); ctx.lineTo(w*0.52, yy+24); ctx.stroke();
  ctx.fillStyle='rgba(242,217,121,.8)'; ctx.font='13px "Noto Sans TC"';
  ctx.fillText(`十位個位對調後 = 10b + a = ${rev}`, w/2, h-10);
  ro.innerHTML = `這個兩位數是 <b>${num}</b>　｜　<b style="color:var(--green)">10a+b = ${num}</b> ✓`
    + `　｜　<b style="color:var(--pink)">a×b = ${prod}</b> ✗`
    + `　｜　對調後 <b>10b+a = ${rev}</b>`
    + (num===prod ? '　<span style="color:var(--yellow)">⚠️ 這組剛好相等，是巧合</span>' : '');
}

function drawTiles(st, ctx, w, h, ro){
  const {a1,c1,a2,c2}=st;
  const ax=a1+a2, cx=c1+c2;
  const XW=30, XH=14, UW=14, UH=14, G=4;
  ctx.textAlign='left';
  function row(y, a, c, label, dim){
    ctx.fillStyle='rgba(243,239,226,.62)'; ctx.font='13px "Noto Sans TC"';
    ctx.fillText(label, 8, y+10);
    let x=104;
    for(let i=0;i<Math.abs(a);i++){
      const neg=a<0;
      ctx.fillStyle= neg?'rgba(237,160,168,.30)':'rgba(152,201,220,.35)';
      ctx.strokeStyle= neg?'#eda0a8':'#98c9dc'; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.roundRect(x, y, XW, XH, 3); ctx.fill(); ctx.stroke();
      ctx.fillStyle= neg?'#eda0a8':'#98c9dc'; ctx.font='bold 10px "Noto Serif TC"';
      ctx.textAlign='center'; ctx.fillText((neg?'−':'')+'x', x+XW/2, y+10); ctx.textAlign='left';
      x+=XW+G;
    }
    if(a!==0) x+=8;
    for(let i=0;i<Math.abs(c);i++){
      const neg=c<0;
      ctx.fillStyle= neg?'rgba(237,160,168,.30)':'rgba(242,217,121,.32)';
      ctx.strokeStyle= neg?'#eda0a8':'#f2d979'; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.roundRect(x, y, UW, UH, 3); ctx.fill(); ctx.stroke();
      ctx.fillStyle= neg?'#eda0a8':'#f2d979'; ctx.font='bold 9px "Noto Serif TC"';
      ctx.textAlign='center'; ctx.fillText(neg?'−1':'1', x+UW/2, y+10); ctx.textAlign='left';
      x+=UW+G;
    }
    if(a===0&&c===0){ ctx.fillStyle='rgba(243,239,226,.3)'; ctx.font='13px "Noto Sans TC"'; ctx.fillText('（空）', 104, y+10); }
  }
  const t=(a,c)=>{
    const p=[];
    if(a!==0) p.push((a===1?'':(a===-1?'−':a))+'x');
    if(c!==0) p.push(c>0&&p.length?'+ '+c:(c<0&&p.length?'− '+Math.abs(c):''+c));
    return p.length?p.join(' '):'0';
  };
  row(24, a1, c1, `第 1 式：${t(a1,c1)}`);
  row(58, a2, c2, `第 2 式：${t(a2,c2)}`);
  ctx.strokeStyle='rgba(243,239,226,.22)'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(8, 84); ctx.lineTo(w-8, 84); ctx.stroke();
  ctx.fillStyle='rgba(242,217,121,.8)'; ctx.font='bold 12px "Noto Sans TC"';
  ctx.fillText('↓ 同形狀的疊在一起（相同顏色相消）', 104, 100);
  row(112, ax, cx, `合併後：${t(ax,cx)}`);
  ctx.textAlign='center';
  ctx.fillStyle='#a6d6a0'; ctx.font='bold 17px "Noto Serif TC"';
  ctx.fillText(`(${t(a1,c1)}) + (${t(a2,c2)}) = ${t(ax,cx)}`, w/2, 152);
  ctx.fillStyle='rgba(243,239,226,.55)'; ctx.font='12px "Noto Sans TC"';
  ctx.fillText(`x 的係數：${a1} ${a2>=0?'+':'−'} ${Math.abs(a2)} = ${ax}　·　常數：${c1} ${c2>=0?'+':'−'} ${Math.abs(c2)} = ${cx}`, w/2, 172);
  ctx.fillStyle='rgba(242,217,121,.75)'; ctx.font='12px "Noto Sans TC"';
  ctx.fillText('長條（x）只能跟長條疊，方塊（1）只能跟方塊疊 —— 這就是「同類項」', w/2, h-8);
  ro.innerHTML = `<b>(${t(a1,c1)}) + (${t(a2,c2)}) = ${t(ax,cx)}</b>`
    + `　｜　x 係數 ${a1}+(${a2}) = <b>${ax}</b>；常數 ${c1}+(${c2}) = <b>${cx}</b>`
    + (ax===0 ? '　<span style="color:var(--yellow)">⚠️ x 項剛好抵消，只剩常數！</span>' : '');
}

function draw(si){
  const st=VIZ[si]; if(!st) return;
  const {cv,ctx,kind}=st, w=cv.width/DPR, h=cv.height/DPR;
  ctx.clearRect(0,0,w,h);
  const ro=document.getElementById('ro-'+si);
  if(kind==='notate') drawNotate(st,ctx,w,h,ro);
  else if(kind==='digits') drawDigits(st,ctx,w,h,ro);
  else if(kind==='tiles') drawTiles(st,ctx,w,h,ro);
}

document.addEventListener('click', e=>{
  const btn=e.target.closest('[data-t]'); if(!btn) return;
  const si=+btn.dataset.si, st=VIZ[si]; if(!st) return;
  const t=btn.dataset.t;
  if(t==='next') st.i=(st.i+1)%NOTE.length;
  if(t==='prev') st.i=(st.i-1+NOTE.length)%NOTE.length;
  if(t==='ap') st.a = st.a>=9 ? 1 : st.a+1;
  if(t==='bp') st.b = st.b>=9 ? 0 : st.b+1;
  if(t==='rnd'){ st.a=Math.floor(Math.random()*9)+1; st.b=Math.floor(Math.random()*10); }
  const bump=v=>{ v++; if(v>4) v=-4; return v; };
  if(t==='a1') st.a1=bump(st.a1);
  if(t==='c1') st.c1=bump(st.c1);
  if(t==='a2') st.a2=bump(st.a2);
  if(t==='c2') st.c2=bump(st.c2);
  draw(si);
});

function resizeAll(){
  DPR = Math.min(2, window.devicePixelRatio||1);
  document.querySelectorAll('canvas.viz').forEach(cv=>{
    const w = cv.clientWidth || cv.parentElement.clientWidth;
    const h = (cv.dataset.viz==='tiles') ? 190 : (cv.dataset.viz==='digits' ? 200 : 178);
    cv.width=w*DPR; cv.height=h*DPR; cv.style.height=h+'px';
    cv.getContext('2d').setTransform(DPR,0,0,DPR,0,0);
  });
  Object.keys(VIZ).forEach(k=>draw(+k));
}
document.querySelectorAll('canvas.viz').forEach(initViz);
window.addEventListener('resize', resizeAll);
resizeAll();
</script>
