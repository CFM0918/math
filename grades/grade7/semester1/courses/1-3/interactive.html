<script>
const GOALS = [
  '能判斷乘除結果的正負號（同號得正、異號得負）',
  '能用「數負號個數」快速判斷連乘的符號',
  '理解乘法在數線上的意義（重複相加）',
  '知道 0÷a = 0（合法）與 a÷0 無意義（不合法）的區別',
  '知道除法沒有結合律，連除要由左往右',
  '能執行含正負號與括號的四則混合運算',
];

const DATA = [
{ key:'signs', viz:'signs', vizTitle:'數負號判定器 —— 翻轉符號、增減因數，看奇偶怎麼決定正負',
  slides:[
    {eb:'細目 ①', h:'乘法的意義：重複相加', html:`
      <div class="box y" style="text-align:center;font-size:19px;">
        <span class="fm">(−2) × 3 = (−2) + (−2) + (−2) = <span class="hl">−6</span></span></div>
      <div class="box">在數線上：從 0 出發，<span class="hl">往左跳 3 次，每次 2 格</span> → 停在 −6</div>
      <div class="box g"><b>所以乘法不是新東西</b> —— 它是<span class="hl">加法的縮寫</span>。
        「(−2) 加 3 次」寫成 (−2)×3，就這樣而已。</div>
      <div class="teach"><b>為什麼要先講這個？</b>因為等一下的符號規則不是規定，是<b>從這裡推出來的</b>：
        往左跳，當然會跑到負的那邊。</div>`},
    {eb:'細目 ①', h:'符號規則：同號得正，異號得負', html:`
      <table class="tbl">
        <tr><th style="width:34%;">算式</th><th style="width:24%;">結果</th><th>說明</th></tr>
        <tr><td class="fm">(+4) × (+3)</td><td class="fm hl-g">+12</td><td>同號 → 正</td></tr>
        <tr><td class="fm">(+4) × (−3)</td><td class="fm hl-r">−12</td><td>異號 → 負</td></tr>
        <tr><td class="fm">(−4) × (+3)</td><td class="fm hl-r">−12</td><td>異號 → 負</td></tr>
        <tr><td class="fm">(−4) × (−3)</td><td class="fm hl-g">+12</td><td>同號 → 正</td></tr>
      </table>
      <div class="box y" style="text-align:center;font-size:19px;">
        口訣：<span class="hl">同號得正，異號得負</span><br>
        <span style="font-size:14px;color:var(--soft)">先定符號，再算絕對值相乘</span></div>
      <div class="box g"><b>0 的特殊性：</b><span class="fm">0 × (−7) = 0</span> —— 0 乘以任何數都是 0。</div>`},
    {eb:'細目 ① 技巧', h:'連乘的符號：數負號個數', html:`
      <div class="box y" style="text-align:center;font-size:18px;">
        負號個數是 <span class="hl">偶數</span> 個 → 結果為 <span class="hl-g">正</span><br>
        負號個數是 <span class="hl">奇數</span> 個 → 結果為 <span class="hl-r">負</span></div>
      <table class="tbl">
        <tr><th style="width:40%;">算式</th><th style="width:18%;">負號</th><th style="width:16%;">奇偶</th><th>結果</th></tr>
        <tr><td class="fm">(−2)×(−3)×(−1)×(−4)</td><td class="hl">4 個</td><td class="hl-g">偶數</td><td class="fm hl-g">+24</td></tr>
        <tr><td class="fm">(−2)×(−3)×(−5)</td><td class="hl">3 個</td><td class="hl-r">奇數</td><td class="fm hl-r">−30</td></tr>
        <tr><td class="fm">(−4)⁴×(−1)</td><td class="hl">5 個</td><td class="hl-r">奇數</td><td class="fm hl-r">−256</td></tr>
      </table>
      <div class="box g" style="text-align:center;">這比「<b>兩兩配對慢慢算</b>」<span class="hl">快得多，也不容易錯</span>。</div>`},
    {eb:'例題 1 ★☆☆', h:'乘法符號', html:`
      <div class="exq" data-a="2">
        <div class="exq-q"><span class="hl">Q</span>　計算 <span class="fm">(−4) × (−3)</span></div>
        <button class="exo" data-i="0">−12</button>
        <button class="exo" data-i="1">−7</button>
        <button class="exo" data-i="2">+12</button>
        <button class="exo" data-i="3">+7</button>
        <div class="exlock">🔒 答對才會顯示詳解</div>
        <div class="exsol">
          <div class="st"><b>Step 1 定符號</b>：兩個都是負 → <b>同號 → 得正</b></div>
          <div class="st fm"><b>Step 2 絕對值相乘</b>：4 × 3 = 12</div>
          <div class="st fm"><b>Step 3</b>：+12</div>
          <div class="st">(B) −7 和 (D) +7 是把<b>乘法算成加法</b>了（−4 + −3 = −7）—— 看清楚符號！</div>
          <div class="an">答：+12</div>
        </div>
      </div>`},
    {eb:'例題 2 ★★☆', h:'連乘數負號', html:`
      <div class="exq" data-a="0">
        <div class="exq-q"><span class="hl">Q</span>　計算 <span class="fm">(−2)×(−3)×(−1)×(−4)</span></div>
        <button class="exo" data-i="0">+24</button>
        <button class="exo" data-i="1">−24</button>
        <button class="exo" data-i="2">+10</button>
        <button class="exo" data-i="3">−10</button>

    {eb:'細目 ② ⚠️', h:'連除要由左往右', html:`

          <div class="st fm">0 ÷ 5 = 0　→　<b>合法</b>（0 分給 5 個人，每人 0）</div>
          <div class="st fm">5 ÷ 0　→　<b>無意義</b>，不存在結果</div>
          <div class="st"><b>為什麼？</b>除法定義：<b>a ÷ b = k ⟺ k × b = a</b><br>
            「5 ÷ 0 = k」要找 <b>k × 0 = 5</b> —— 任何數乘 0 都是 0，<b>永遠不可能等於 5</b>。</div>
          <div class="st">所以不是「算不出來」，是<b>根本不存在</b>。兩者不能混為一談。</div>
          <div class="st">💡 那 <b>0 ÷ 0</b> 呢？要找 k × 0 = 0 —— <b>所有 k 都成立</b> → 答案不唯一 → 也是無意義。</div>
          <div class="an">答：錯。0÷5=0（合法）；5÷0 無意義</div>
        </div>
      </div>`},
    {eb:'例題 4 ★★☆', h:'連除', html:`

        </div>
      </div>`}

const cur = DATA.map(()=>0);
function showSlide(si, i){
  const deck = document.querySelector(`[data-deck="${si}"]`);
  const sl = deck.querySelectorAll('.sl');
  i = Math.max(0, Math.min(sl.length-1, i));
  cur[si] = i;
  sl.forEach((s,k)=>s.classList.toggle('on', k===i));
  document.getElementById('pg-'+si).textContent = `${i+1} / ${sl.length}`;
  document.querySelectorAll(`#dots-${si} .dot`).forEach((d,k)=>d.classList.toggle('on', k===i));
}
document.addEventListener('click', e=>{
  const n = e.target.closest('[data-nav]');
  if(n){ const si=+n.dataset.s; showSlide(si, cur[si] + (n.dataset.nav==='next'?1:-1)); return; }
  const d = e.target.closest('.dot');
  if(d){ showSlide(+d.dataset.s, +d.dataset.i); return; }
});
document.addEventListener('keydown', e=>{
  const p = document.querySelector('.panel.on'); if(!p) return;
  const si = +p.dataset.p; if(si>=DATA.length) return;
  if(e.key==='ArrowRight') showSlide(si, cur[si]+1);
  if(e.key==='ArrowLeft') showSlide(si, cur[si]-1);
});
document.addEventListener('click', e=>{
  const o = e.target.closest('.opt[data-si]'); if(!o) return;
  const si=+o.dataset.si, qi=+o.dataset.qi, oi=+o.dataset.oi;
  const f = DATA[si].fa[qi];
  const box = document.querySelector(`[data-fa="${si}-${qi}"]`);
  box.querySelectorAll('.opt').forEach((b,k)=>{
    b.disabled = true;
    if(k===f.a) b.classList.add('right'); else if(k===oi) b.classList.add('wrong');
  });
  const fb = document.getElementById(`fb-${si}-${qi}`);
  const ok = oi===f.a;
  fb.className = 'fb on ' + (ok?'ok':'no');
  fb.innerHTML = (ok?'✅ <b>答對了！</b> ':'❌ <b>再想想。</b> ') + f.e;
});
document.addEventListener('click', e=>{
  const o = e.target.closest('.exo');
  if(o && !o.disabled){
    const box = o.closest('.exq');
    const ans = +box.dataset.a, pick = +o.dataset.i;
    if(pick === ans){
      box.querySelectorAll('.exo').forEach(b=>{ b.disabled=true; if(+b.dataset.i===ans) b.classList.add('right'); });
      box.querySelector('.exsol').classList.add('on');
      box.querySelector('.exlock').classList.add('hide');
    } else {
      o.classList.add('wrong','shake');
      setTimeout(()=>o.classList.remove('shake'), 420);
      o.disabled = true;
      const lock = box.querySelector('.exlock');
      lock.innerHTML = '🔒 再想想 —— 答對才會顯示詳解'; lock.style.color='var(--pink)';
    }
  }
});
document.addEventListener('click', e=>{
  const o = e.target.closest('.opt[data-quiz]'); if(!o) return;
  const i = +o.dataset.quiz;
  o.parentElement.querySelectorAll('.opt').forEach(b=>b.classList.remove('right','wrong'));
  o.classList.add('right'); o.dataset.sel='1';
  o.parentElement.querySelectorAll('.opt').forEach(b=>{ if(b!==o) delete b.dataset.sel; });
});
document.getElementById('gradeBtn').addEventListener('click', ()=>{
  let right=0;
  QUIZ.forEach((q,i)=>{
    const fb = document.getElementById('qfb-'+i);
    let ok=false, picked=null;
    if(q.type==='fill'){
      const inp = document.querySelector(`.fill[data-quiz="${i}"]`);
      const v = (inp.value||'').trim().replace(/−/g,'-').replace(/\s/g,'');
      ok = q.a.some(a=>a.replace(/−/g,'-').replace(/\s/g,'')===v);
      inp.style.borderBottomColor = ok?'var(--green)':'var(--pink)';
    } else {
      const sel = document.querySelector(`.opt[data-quiz="${i}"][data-sel="1"]`);
      if(sel){ picked=+sel.dataset.oi; ok = (q.type==='tf') ? (picked===1)===q.a : picked===q.a; }
      document.querySelectorAll(`.opt[data-quiz="${i}"]`).forEach(b=>{
        b.classList.remove('right','wrong');
        const bi=+b.dataset.oi;
        const isAns = (q.type==='tf') ? ((bi===1)===q.a) : (bi===q.a);
        if(isAns) b.classList.add('right'); else if(picked===bi) b.classList.add('wrong');
      });
    }
    if(ok) right++;
    fb.className='fb on '+(ok?'ok':'no');
    fb.innerHTML = (ok?'✅ <b>正確</b> ':'❌ <b>錯誤</b> ') + q.e;
  });
  const s = document.getElementById('score');
  const pct = Math.round(right/QUIZ.length*100);
  s.style.display='block';
  s.innerHTML = `成績：<b>${right} / ${QUIZ.length}</b>　（${pct} 分）　${pct>=80?'🏆 很棒！':pct>=60?'💪 再加油':'📖 建議重看重點'}`;
});
document.getElementById('resetQuiz').addEventListener('click', ()=>{
  document.querySelectorAll('.opt[data-quiz]').forEach(b=>{b.classList.remove('right','wrong'); delete b.dataset.sel;});
  document.querySelectorAll('.fill').forEach(i=>{i.value=''; i.style.borderBottomColor='var(--yellow)';});
  document.querySelectorAll('[id^="qfb-"]').forEach(f=>f.className='fb');
  document.getElementById('score').style.display='none';
});

  document.getElementById('hSc').textContent = G.score;
  document.getElementById('hStk').textContent = G.streak;
  document.getElementById('gQ').innerHTML = `<span style="color:var(--blue);font-size:15px;">第 ${G.lv+1} 關 · ${GAME[G.lv].name}</span><br>${G.cur.q}`;
  document.getElementById('gO').innerHTML = G.cur.o.map((o,i)=>
    `<button class="gopt" data-g="${i}">${'ABCD'[i]}. ${o}</button>`).join('');
  document.getElementById('gFb').className='gfb';
  document.getElementById('gNext').style.display='none';
  gChips();
  clearInterval(G.timer);
  G.timer = setInterval(()=>{
    G.t -= 0.1;
    document.getElementById('hT').textContent = Math.max(0,G.t).toFixed(0);
    document.getElementById('tFill').style.width = Math.max(0,G.t/20*100)+'%';
    if(G.t<=0){ clearInterval(G.timer); gAnswer(-1); }
  },100);
}
function gAnswer(pick){
  if(G.answered) return;
  G.answered = true; clearInterval(G.timer);
  const ans = G.cur.a, ok = pick===ans;
  document.querySelectorAll('.gopt').forEach((b,i)=>{
    b.disabled=true;
    if(i===ans) b.classList.add('right'); else if(i===pick) b.classList.add('wrong');
  });
  let gain=0, sb=0, tb=0;
  if(ok){
    G.streak++; G.best=Math.max(G.best,G.streak);
    sb = Math.min(5, G.streak-1); tb = Math.min(5, Math.floor(G.t/4));
    gain = 10+sb+tb; G.score += gain;
  } else { G.streak = 0; }
  document.getElementById('hSc').textContent = G.score;
  document.getElementById('hStk').textContent = G.streak;
  const fb = document.getElementById('gFb');
  fb.className = 'gfb on '+(ok?'ok':'no');
  fb.innerHTML = (ok? `✅ <b>答對！+${gain} 分</b>（基礎10 + 連擊${sb} + 速度${tb}）<br>`
                    : (pick===-1?'⏰ <b>時間到！</b><br>':'❌ <b>答錯了</b><br>')) + G.cur.e;
  document.getElementById('gNext').style.display='inline-block';
  document.getElementById('gNext').textContent = (G.lv>=GAME.length-1)?'看成績 🏁':'下一關 ▶';
}
function gFinish(){
  clearInterval(G.timer);
  const max = GAME.length*20, pct = Math.round(G.score/max*100);
  const rank = pct>=85?['🏆','數論大師']:pct>=70?['🥇','高手']:pct>=50?['🥈','不錯']:['📖','再加油'];
  document.getElementById('gRank').textContent = rank[0];
  document.getElementById('gFinal').innerHTML = `<b class="hl">${G.score}</b> / ${max} 分　·　${rank[1]}`;
  document.getElementById('gStats').innerHTML = `最高連擊 <b class="hl">${G.best}</b>　·　完成 ${GAME.length} 關`;
  gShow('gEnd');
}
document.getElementById('gGo').addEventListener('click', ()=>{ G.lv=0;G.score=0;G.streak=0;G.best=0; gShow('gPlay'); gLoad(); });
document.getElementById('gAgain').addEventListener('click', ()=>{ G.lv=0;G.score=0;G.streak=0;G.best=0; gShow('gPlay'); gLoad(); });
document.getElementById('gNext').addEventListener('click', ()=>{ G.lv++; gLoad(); });
document.addEventListener('click', e=>{ const b=e.target.closest('.gopt'); if(!b||b.disabled) return; gAnswer(+b.dataset.g); });

/* ===== Canvas ===== */
const VIZ = {}; let DPR=1;

/* ① 數負號個數判定器 */
function initSigns(st){ st.f=[-2,-3,-1,-4]; }

/* ② 除以 0 對照器 */
const ZERO=[
  {q:'0 ÷ 5', ok:true,  val:'0',    why:'把 0 平分給 5 個人 → 每人拿到 0。合法！', bad:''},
  {q:'5 ÷ 0', ok:false, val:'無意義', why:'「5 要平分給 0 個人」—— 這句話沒有意義。', bad:'找不到任何數 k 使得 k × 0 = 5'},
  {q:'0 ÷ 0', ok:false, val:'無意義', why:'任何數 × 0 都等於 0 → 答案不唯一。', bad:'k × 0 = 0 對「所有」k 都成立 → 無法決定'},
  {q:'(−12) ÷ 3', ok:true, val:'−4', why:'把 −12 平分成 3 組 → 每組 −4。異號得負。', bad:''},
  {q:'(−12) ÷ (−3)', ok:true, val:'+4', why:'同號得正 → +4。', bad:''},
];

/* ③ 四則運算逐步器 */
const ORD=[
 {name:'先乘除後加減', fr:[
   {t:'(−3) + 4×(−2) − (−6)÷2', hi:null, note:'有乘也有除 → 先把它們算完，加減最後做'},
   {t:'(−3) + 4×(−2) − (−6)÷2', hi:[2,4], note:'① 先乘：4×(−2)　異號得負 → −8'},
   {t:'(−3) + (−8) − (−6)÷2', hi:[4,6], note:'① 再除：(−6)÷2　異號得負 → −3'},
   {t:'(−3) + (−8) − (−3)', hi:[0,2], note:'② 加減由左往右：(−3)+(−8) = −11'},
   {t:'(−11) − (−3)', hi:[0,2], note:'減去一個負數 = 加上正數 → −11 + 3'},
   {t:'−8', hi:[0,0], note:'✓ 答案：−8'}
 ]},
 {name:'括號最優先', fr:[
   {t:'(6−10) × (−3) + 8÷(−4)', hi:null, note:'有括號 → 括號最優先'},
   {t:'(6−10) × (−3) + 8÷(−4)', hi:[0,0], note:'① 括號：6−10 = −4'},
   {t:'(−4) × (−3) + 8÷(−4)', hi:[0,2], note:'② 乘：(−4)×(−3)　同號得正 → +12'},
   {t:'12 + 8÷(−4)', hi:[2,4], note:'② 除：8÷(−4)　異號得負 → −2'},
   {t:'12 + (−2)', hi:[0,2], note:'③ 最後才做加減'},
   {t:'10', hi:[0,0], note:'✓ 答案：10'}
 ]},
 {name:'⚠️ 連除由左往右', fr:[
   {t:'(−18) ÷ (−2) ÷ (−3)', hi:null, note:'三個數連除 —— 順序不能亂！除法沒有結合律'},
   {t:'(−18) ÷ (−2) ÷ (−3)', hi:[0,2], note:'① 由左往右：(−18)÷(−2)　同號得正 → 9'},
   {t:'9 ÷ (−3)', hi:[0,2], note:'② 再除：9÷(−3)　異號得負 → −3'},
   {t:'−3', hi:[0,0], note:'✓ 答案：−3　（若先算 (−2)÷(−3) 會得到完全不同的答案 → 錯！）'}
 ]}
];

function initViz(cv){
  const si=+cv.dataset.si, kind=cv.dataset.viz;
  const ctx=cv.getContext('2d');
  const st = VIZ[si] = {kind, cv, ctx};
  const ctrl = document.querySelector(`[data-ctrl="${si}"]`);
  if(kind==='signs'){
    initSigns(st);
    ctrl.innerHTML = `<div class="readout" id="ro-${si}"></div>
      <button class="btn" data-t="flip" data-si="${si}" style="background:rgba(242,217,121,.2);border-color:var(--yellow);color:var(--yellow);font-weight:700;">± 翻轉最後一個符號</button>
      <button class="btn" data-t="add" data-si="${si}">＋ 加一個因數</button>
      <button class="btn" data-t="del" data-si="${si}">− 拿掉一個</button>
      <button class="btn" data-t="rnd" data-si="${si}">🎲 隨機</button>`;
  } else if(kind==='zero'){
    st.i=0;
    ctrl.innerHTML = `<div class="readout" id="ro-${si}"></div>
      <button class="btn" data-t="next" data-si="${si}" style="background:rgba(242,217,121,.2);border-color:var(--yellow);color:var(--yellow);font-weight:700;">下一個 ▶</button>
      <button class="btn" data-t="prev" data-si="${si}">◀ 上一個</button>`;
  } else {
    st.ei=0; st.fi=0;
    ctrl.innerHTML = `<div class="readout" id="ro-${si}"></div>
      <button class="btn" data-t="next" data-si="${si}" style="background:rgba(242,217,121,.2);border-color:var(--yellow);color:var(--yellow);font-weight:700;">下一步 ▶</button>
      <button class="btn" data-t="rst" data-si="${si}">↩ 重設</button>
      <button class="btn" data-t="swap" data-si="${si}">🔀 換一題</button>`;
  }
  draw(si);
}

function drawSigns(st, ctx, w, h, ro){
  const f=st.f;
  const neg=f.filter(v=>v<0).length;
  const even=neg%2===0;
  const abs=f.reduce((a,b)=>a*Math.abs(b),1);
  const val=even?abs:-abs;
  ctx.textAlign='center';
  ctx.fillStyle='rgba(242,217,121,.85)'; ctx.font='bold 13px "Noto Sans TC"';
  ctx.fillText('數負號個數 —— 比兩兩配對慢慢算快得多', w/2, 15);
  // 因數列
  const gap=Math.min(72, (w-40)/f.length);
  const sx=w/2-(f.length-1)*gap/2;
  f.forEach((v,i)=>{
    const x=sx+i*gap, y=48;
    const isN=v<0;
    ctx.fillStyle= isN?'rgba(237,160,168,.18)':'rgba(152,201,220,.18)';
    ctx.strokeStyle= isN?'#eda0a8':'#98c9dc'; ctx.lineWidth=1.6;
    ctx.beginPath(); ctx.roundRect(x-26, y-17, 52, 30, 7); ctx.fill(); ctx.stroke();
    ctx.fillStyle= isN?'#eda0a8':'#98c9dc'; ctx.font='bold 16px "Noto Serif TC"';
    ctx.fillText((v<0?'−':'+')+Math.abs(v), x, y+4);
    if(i<f.length-1){ ctx.fillStyle='rgba(243,239,226,.6)'; ctx.font='15px "Noto Serif TC"';
      ctx.fillText('×', x+gap/2, y+4); }
    // 負號打勾
    if(isN){ ctx.fillStyle='#eda0a8'; ctx.font='bold 13px "Noto Sans TC"';
      ctx.fillText('▼', x, y-22); }
  });
  ctx.fillStyle='rgba(237,160,168,.85)'; ctx.font='bold 14px "Noto Sans TC"';
  ctx.fillText(`負號共 ${neg} 個`, w/2, 88);
  // 奇偶判定
  const col = even?'#a6d6a0':'#eda0a8';
  ctx.fillStyle= even?'rgba(166,214,160,.16)':'rgba(237,160,168,.16)';
  ctx.strokeStyle=col; ctx.lineWidth=1.6;
  const bw=Math.min(w-60, 260);
  ctx.beginPath(); ctx.roundRect((w-bw)/2, 98, bw, 30, 8); ctx.fill(); ctx.stroke();
  ctx.fillStyle=col; ctx.font='bold 15px "Noto Sans TC"';
  ctx.fillText(`${neg} 是${even?'偶':'奇'}數　→　結果為 ${even?'正':'負'}`, w/2, 118);
  // 答案
  ctx.fillStyle='rgba(243,239,226,.6)'; ctx.font='13px "Noto Serif TC"';
  ctx.fillText(`絕對值相乘：${f.map(v=>Math.abs(v)).join(' × ')} = ${abs}`, w/2, 146);
  ctx.fillStyle='#f2d979'; ctx.font='bold 20px "Noto Serif TC"';
  ctx.fillText(`= ${val>0?'+':'−'}${abs}`, w/2, 172);
  ro.innerHTML = `<b>${f.map(v=>'('+(v<0?'−':'+')+Math.abs(v)+')').join(' × ')}</b>`
    + `　｜　負號 <b style="color:var(--pink)">${neg}</b> 個（${even?'偶':'奇'}數）→ 結果為 <b style="color:${even?'var(--green)':'var(--pink)'}">${even?'正':'負'}</b>`
    + `　｜　<b>= ${val>0?'+':'−'}${abs}</b>`;
}

function drawZero(st, ctx, w, h, ro){
  const E=ZERO[st.i];
  ctx.textAlign='center';
  ctx.fillStyle='rgba(242,217,121,.85)'; ctx.font='bold 13px "Noto Sans TC"';
  ctx.fillText(`第 ${st.i+1} / ${ZERO.length} 個　·　這個除法合法嗎？`, w/2, 15);
  ctx.fillStyle='#f3efe2'; ctx.font='bold 27px "Noto Serif TC"';
  ctx.fillText(E.q, w/2, 52);
  const col = E.ok?'#a6d6a0':'#eda0a8';
  ctx.fillStyle= E.ok?'rgba(166,214,160,.18)':'rgba(237,160,168,.18)';
  ctx.strokeStyle=col; ctx.lineWidth=2;
  const bw=Math.min(w-60, 200);
  ctx.beginPath(); ctx.roundRect((w-bw)/2, 66, bw, 32, 8); ctx.fill(); ctx.stroke();
  ctx.fillStyle=col; ctx.font='bold 17px "Noto Serif TC"';
  ctx.fillText((E.ok?'✓ = ':'✗ ')+E.val, w/2, 88);
  ctx.fillStyle='rgba(243,239,226,.78)'; ctx.font='14px "Noto Sans TC"';
  let line='', ly=118; const maxw=w-40;
  for(const ch of E.why){
    if(ctx.measureText(line+ch).width>maxw){ ctx.fillText(line, w/2, ly); line=ch; ly+=20; }
    else line+=ch;
  }
  ctx.fillText(line, w/2, ly);
  if(E.bad){
    ctx.fillStyle='#eda0a8'; ctx.font='12px "Noto Serif TC"';
    ctx.fillText(E.bad, w/2, ly+22);
  }
  ctx.fillStyle='rgba(242,217,121,.55)'; ctx.font='11px "Noto Sans TC"';
  ctx.fillText('除法的定義：a ÷ b = k　⟺　k × b = a', w/2, h-8);
  ro.innerHTML = `<b>${E.q}</b>　→　<b style="color:${E.ok?'var(--green)':'var(--pink)'}">${E.ok?'✓ 合法，= '+E.val:'✗ '+E.val}</b>　｜　${E.why}`
    + (E.bad ? `　<span style="color:var(--pink)">${E.bad}</span>` : '');
}

function drawOrd(st, ctx, w, h, ro){
  const E=ORD[st.ei], F=E.fr[st.fi];
  ctx.textAlign='center';
  ctx.fillStyle='rgba(242,217,121,.85)'; ctx.font='bold 13px "Noto Sans TC"';
  ctx.fillText(`第 ${st.ei+1} 題 · ${E.name}　（步驟 ${st.fi+1} / ${E.fr.length}）`, w/2, 15);
  const toks=F.t.split(' ');
  ctx.font='bold 20px "Noto Serif TC"';
  const gap=9, ws=toks.map(t=>ctx.measureText(t).width);
  const total=ws.reduce((a,b)=>a+b,0)+gap*(toks.length-1);
  let x=(w-total)/2; const Y=58;
  if(F.hi){
    let hx=(w-total)/2, s=0, e=0;
    for(let i=0;i<toks.length;i++){ if(i===F.hi[0]) s=hx; hx+=ws[i]+gap; if(i===F.hi[1]) e=hx-gap; }
    ctx.fillStyle='rgba(242,217,121,.22)';
    ctx.strokeStyle='rgba(242,217,121,.7)'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(s-8, Y-25, e-s+16, 37, 8); ctx.fill(); ctx.stroke();
  }
  toks.forEach((t,i)=>{
    const inHi = F.hi && i>=F.hi[0] && i<=F.hi[1];
    ctx.fillStyle = inHi ? '#f2d979' : 'rgba(243,239,226,.82)';
    ctx.font = (inHi?'bold ':'')+'20px "Noto Serif TC"';
    ctx.textAlign='left'; ctx.fillText(t, x, Y);
    x+=ws[i]+gap;
  });
  ctx.textAlign='center';
  ctx.fillStyle= F.note.indexOf('⚠')>=0 ? '#eda0a8' : 'rgba(243,239,226,.8)';
  ctx.font='14px "Noto Sans TC"';
  let line='', ly=94; const maxw=w-44;
  for(const ch of F.note){
    if(ctx.measureText(line+ch).width>maxw){ ctx.fillText(line, w/2, ly); line=ch; ly+=20; }
    else line+=ch;
  }
  ctx.fillText(line, w/2, ly);
  const n=E.fr.length, dx=14, sx=w/2-(n-1)*dx/2;
  for(let i=0;i<n;i++){
    ctx.beginPath(); ctx.arc(sx+i*dx, h-14, 4.5, 0, 7);
    ctx.fillStyle = i<=st.fi ? '#f2d979' : 'rgba(243,239,226,.22)'; ctx.fill();
  }
  ro.innerHTML = `<b>${E.name}</b>　｜　步驟 ${st.fi+1}/${E.fr.length}：<b>${F.t}</b>　—　${F.note}`;
}

function draw(si){
  const st=VIZ[si]; if(!st) return;
  const {cv,ctx,kind}=st, w=cv.width/DPR, h=cv.height/DPR;
  ctx.clearRect(0,0,w,h);
  const ro=document.getElementById('ro-'+si);
  if(kind==='signs') drawSigns(st,ctx,w,h,ro);
  else if(kind==='zero') drawZero(st,ctx,w,h,ro);
  else if(kind==='ord') drawOrd(st,ctx,w,h,ro);
}

document.addEventListener('click', e=>{
  const btn=e.target.closest('[data-t]'); if(!btn) return;
  const si=+btn.dataset.si, st=VIZ[si]; if(!st) return;
  const t=btn.dataset.t;
  if(st.kind==='signs'){
    if(t==='flip' && st.f.length) st.f[st.f.length-1] *= -1;
    if(t==='add' && st.f.length<6) st.f.push((Math.floor(Math.random()*4)+2) * (Math.random()<0.5?-1:1));
    if(t==='del' && st.f.length>2) st.f.pop();
    if(t==='rnd'){
      const n=Math.floor(Math.random()*3)+3;
      st.f=[]; for(let i=0;i<n;i++) st.f.push((Math.floor(Math.random()*4)+2)*(Math.random()<0.5?-1:1));
    }
  } else if(st.kind==='zero'){
    if(t==='next') st.i=(st.i+1)%ZERO.length;
    if(t==='prev') st.i=(st.i-1+ZERO.length)%ZERO.length;
  } else {
    if(t==='next') st.fi=Math.min(ORD[st.ei].fr.length-1, st.fi+1);
    if(t==='rst')  st.fi=0;
    if(t==='swap'){ st.ei=(st.ei+1)%ORD.length; st.fi=0; }
  }
  draw(si);
});

function resizeAll(){
  DPR = Math.min(2, window.devicePixelRatio||1);
  document.querySelectorAll('canvas.viz').forEach(cv=>{
    const w = cv.clientWidth || cv.parentElement.clientWidth;
    const h = (cv.dataset.viz==='signs') ? 192 : (cv.dataset.viz==='zero' ? 180 : 174);
    cv.width=w*DPR; cv.height=h*DPR; cv.style.height=h+'px';
    cv.getContext('2d').setTransform(DPR,0,0,DPR,0,0);
  });
  Object.keys(VIZ).forEach(k=>draw(+k));
}
document.querySelectorAll('canvas.viz').forEach(initViz);
window.addEventListener('resize', resizeAll);
resizeAll();
</script>
